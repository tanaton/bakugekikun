<script>

   爆撃くん — GOD'S EYE STRIKE

// ---------- シード付き乱数 ----------
function xfnv1a(str){ let h = 2166136261 >>> 0;
  for(let i = 0; i < str.length; i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0; }
function mulberry32(a){ return function(){
  a |= 0; a = a + 0x6D2B79F5 | 0;
  let t = Math.imul(a ^ a >>> 15, 1 | a);
  t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
  return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }

// ---------- 定数 ----------
const CITY_HALF = 2500;          // 街の半径 (m) → 5km四方
const CAR_VALUE = 3000000;       // 車1台の被害額
const FLOOR_H = 3.5;             // 1フロアの高さ
const VALUE_PER_M2_FLOOR = 300000; // 床面積1m2あたりの資産額

// ---------- 地形(シード付き値ノイズ) ----------
const TG_N = 33, TG_SPAN = 6400;
let tGrid = null, tAmp = 0;
let cityCore = { x: 0, z: 0 };   // 都心(ビル群)の位置。シードでずれる
let cityHouseTh = 0.6;           // 住宅街になる都心距離のしきい値。小さいほど住宅街が多い
let cornerFeats = [];            // 四隅の地形 {type:'m'(山)|'r'(川), x, z, r, amp|w}
function buildTerrain(rng){
  tGrid = new Float32Array(TG_N * TG_N);
  for(let i = 0; i < tGrid.length; i++) tGrid[i] = rng();
  tAmp = 45 + rng() * 55;        // 起伏の強さもシードで変わる
}
function tSample(gx, gz){
  gx = Math.max(0, Math.min(TG_N - 1.001, gx));
  gz = Math.max(0, Math.min(TG_N - 1.001, gz));
  const x0 = Math.floor(gx), z0 = Math.floor(gz);
  let fx = gx - x0, fz = gz - z0;
  fx = fx * fx * (3 - 2 * fx); fz = fz * fz * (3 - 2 * fz);
  const i = z0 * TG_N + x0;
  const a = tGrid[i], b = tGrid[i + 1], c = tGrid[i + TG_N], d = tGrid[i + TG_N + 1];
  return a + (b - a) * fx + (c - a) * fz + (a - b - c + d) * fx * fz;
}
function terrainH(x, z){
  if(!tGrid) return 0;
  const u = (x + TG_SPAN / 2) / TG_SPAN * (TG_N - 1);
  const v = (z + TG_SPAN / 2) / TG_SPAN * (TG_N - 1);
  const c1 = tSample(u * 0.28 + 2.3, v * 0.28 + 4.1);   // 大きなうねり
  const c2 = tSample(u, v);                              // 細かい起伏
  const h = (c1 - 0.5) * 1.6 + (c2 - 0.5) * 0.5;
  const distC = Math.hypot(x - cityCore.x, z - cityCore.z) / CITY_HALF;
  const flat = 0.25 + 0.75 * Math.min(1, Math.max(0, (distC - 0.15) / 0.75)); // 都心部は平坦
  let hh = h * tAmp * flat;
  // 地形フィーチャ: 山は隆起、水域は固定水面レベルへ平坦化ブレンド
  let wb = 0;   // 水面ブレンド率(1=完全な水面)
  for(const f of cornerFeats){
    if(f.kind === 'band'){
      const du = bandDu(f, x, z);                        // 縁からの内向き距離
      if(f.type === 'm'){
        if(du < f.depth){ const k = 1 - du / f.depth; hh += f.amp * k * k; }
      } else if(du < f.off + 90){
        wb = Math.max(wb, Math.min(1, (f.off + 90 - du) / 140));
      }
      continue;
    }
    const d = Math.hypot(x - f.x, z - f.z);
    if(f.type === 'm'){
      const t = d / f.r;
      if(t < 1){ const k = 1 - t * t; hh += f.amp * k * k; }
    } else if(d < f.r + 90){
      wb = Math.max(wb, Math.min(1, (f.r + 90 - d) / 140));
    }
  }
  if(wb > 0) hh = hh * (1 - wb) + (-12) * wb;   // 水面は起伏の影響を受けず平坦
  return hh;
}
// 帯状フィーチャにおける、地図の縁からの内向き距離
function bandDu(f, x, z){
  return 2500 - (f.axis === 'x' ? x * f.side : z * f.side);
}
// フィーチャfの影響領域に点が入っているか
function featRegion(f, x, z){
  if(f.kind === 'band'){
    const du = bandDu(f, x, z);
    return f.type === 'm' ? du < f.depth : du < f.off + 30;
  }
  const d = Math.hypot(x - f.x, z - f.z);
  return f.type === 'm' ? d < f.r : d < f.r + 30;
}
// 候補フィーチャが既存の「逆タイプ」(山⇔水)と重なるか。同種同士の連なりは許可
function featConflicts(cand){
  const pts = [];
  if(cand.kind === 'disc'){
    pts.push([cand.x, cand.z]);
    for(let i = 0; i < 16; i++){
      const a = i / 16 * Math.PI * 2;
      pts.push([cand.x + Math.cos(a) * cand.r * 0.55, cand.z + Math.sin(a) * cand.r * 0.55]);
      pts.push([cand.x + Math.cos(a) * cand.r * 0.98, cand.z + Math.sin(a) * cand.r * 0.98]);
    }
  } else {
    const dep = cand.type === 'm' ? cand.depth : cand.off + 20;
    for(let t = -2500; t <= 2500; t += 250){
      for(const du of [10, dep * 0.5, dep * 0.95]){
        pts.push(cand.axis === 'x' ? [cand.side * (2500 - du), t] : [t, cand.side * (2500 - du)]);
      }
    }
  }
  for(const f of cornerFeats){
    if(f.type === cand.type) continue;
    for(const [px, pz] of pts){
      if(Math.abs(px) > 2700 || Math.abs(pz) > 2700) continue;
      if(featRegion(f, px, pz)) return true;
    }
  }
  return false;
}
// 地形フィーチャで建物が建てられない場所か(山腹・水辺)
function cornerBlocked(x, z){
  for(const f of cornerFeats){
    if(f.kind === 'band'){
      const du = bandDu(f, x, z);
      if(f.type === 'm'){ if(du < f.depth * 0.8) return true; }
      else if(du < f.off + 16) return true;
      continue;
    }
    const d = Math.hypot(x - f.x, z - f.z);
    if(f.type === 'm'){ if(d < f.r * 0.8) return true; }
    else if(d < f.r + 16) return true;
  }
  return false;
}
// 山の中か(道路も通さない)
function inMountain(x, z){
  for(const f of cornerFeats){
    if(f.type !== 'm') continue;
    if(f.kind === 'band'){ if(bandDu(f, x, z) < f.depth * 0.82) return true; }
    else if(Math.hypot(x - f.x, z - f.z) < f.r * 0.82) return true;
  }
  return false;
}
// 道路を通せない場所(山の中・水の中)
function roadBlocked(x, z){
  return inMountain(x, z) || inWater(x, z);
}
// 山・水にかかった道路を刈り取り、通れる区間だけ残す
function cullMountainRoads(){
  const out = [];
  for(const rp of roadPaths){
    let cut = false, run = [];
    const runs = [];
    for(const p of rp.pts){
      if(roadBlocked(p.x, p.z)){
        cut = true;
        if(run.length) runs.push(run);
        run = [];
      } else run.push(p);
    }
    if(run.length) runs.push(run);
    if(!cut){ out.push(rp); continue; }
    // 環状道路は始点・終点の区間が地続きなので繋ぎ直す
    if(rp.loop && runs.length >= 2 &&
       !roadBlocked(rp.pts[0].x, rp.pts[0].z) &&
       !roadBlocked(rp.pts[rp.pts.length - 1].x, rp.pts[rp.pts.length - 1].z)){
      runs[0] = runs.pop().concat(runs[0]);
    }
    for(const r2 of runs) if(r2.length >= 3) out.push({ pts: r2, w: rp.w, major: rp.major, loop: false });
  }
  roadPaths = out;
}
// 山・水にかかった路地は丸ごと消す
function cullMountainAlleys(){
  alleyPaths = alleyPaths.filter(al => {
    for(let i = 0; i < al.pts.length - 1; i++){
      const a = al.pts[i], b = al.pts[i + 1];
      const n = Math.max(1, Math.ceil(Math.hypot(b.x - a.x, b.z - a.z) / 40));
      for(let k = 0; k <= n; k++){
        if(roadBlocked(a.x + (b.x - a.x) * k / n, a.z + (b.z - a.z) * k / n)) return false;
      }
    }
    return true;
  });
}
// 水面の中か(木も生えない)。湾は隅の円内、帯は縁側すべてが水
function inWater(x, z){
  for(const f of cornerFeats){
    if(f.type !== 'r') continue;
    if(f.kind === 'band'){ if(bandDu(f, x, z) < f.off - 6) return true; }
    else if(Math.hypot(x - f.x, z - f.z) < f.r - 6) return true;
  }
  return false;
}
// 建物の接地高さ: 敷地の最も低い点に合わせて基礎を埋める
function groundLevel(x, z, sx, sz){
  const hx = sx / 2, hz = sz / 2;
  return Math.min(terrainH(x, z),
    terrainH(x - hx, z - hz), terrainH(x + hx, z - hz),
    terrainH(x - hx, z + hz), terrainH(x + hx, z + hz));
}

// ---------- カメラ操作 ----------
const cam = { focus: new THREE.Vector3(0, 0, 0), yaw: 0.7, pitch: 0.95, dist: 950 };
let shake = 0;
const keys = {};
addEventListener('keydown', e => { if(e.target.tagName !== 'INPUT') keys[e.code] = true; });
addEventListener('keyup',   e => { keys[e.code] = false; });

let dragging = false, lastX = 0, lastY = 0;
canvas.addEventListener('pointerdown', e => {
  if(e.button === 0){ dragging = true; lastX = e.clientX; lastY = e.clientY; canvas.setPointerCapture(e.pointerId); }
  if(e.button === 2){ requestStrike(e.clientX, e.clientY); }
  initAudio();
});
addEventListener('pointerup', () => dragging = false);
addEventListener('pointermove', e => {
  if(!dragging) return;
  cam.yaw   -= (e.clientX - lastX) * 0.005;
  cam.pitch += (e.clientY - lastY) * 0.004;
  cam.pitch = Math.max(0.28, Math.min(1.5, cam.pitch));
  lastX = e.clientX; lastY = e.clientY;
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  cam.dist *= Math.exp(e.deltaY * 0.0011);
  cam.dist = Math.max(120, Math.min(4200, cam.dist));
}, { passive: false });
addEventListener('contextmenu', e => e.preventDefault());

function updateCamera(dt){
  const sp = cam.dist * 0.9 * dt * (keys.ShiftLeft || keys.ShiftRight ? 2.4 : 1);
  const fx = Math.sin(cam.yaw), fz = Math.cos(cam.yaw);
  if(keys.KeyW){ cam.focus.x -= fx * sp; cam.focus.z -= fz * sp; }
  if(keys.KeyS){ cam.focus.x += fx * sp; cam.focus.z += fz * sp; }
  if(keys.KeyA){ cam.focus.x -= fz * sp; cam.focus.z += fx * sp; }
  if(keys.KeyD){ cam.focus.x += fz * sp; cam.focus.z -= fx * sp; }
  cam.focus.x = Math.max(-2700, Math.min(2700, cam.focus.x));
  cam.focus.z = Math.max(-2700, Math.min(2700, cam.focus.z));
  cam.focus.y = terrainH(cam.focus.x, cam.focus.z);      // 注視点は地形に追従

  const cp = Math.cos(cam.pitch), sinP = Math.sin(cam.pitch);
  camera.position.set(
    cam.focus.x + fx * cp * cam.dist,
    cam.focus.y + sinP * cam.dist,
    cam.focus.z + fz * cp * cam.dist);
  const minY = terrainH(camera.position.x, camera.position.z) + 12;  // 山にめり込まない
  if(camera.position.y < minY) camera.position.y = minY;
  camera.lookAt(cam.focus);
  shake = Math.min(shake, 36);
  if(shake > 0.001){
    const t = performance.now() * 0.05;
    camera.position.x += Math.sin(t * 1.3) * shake;
    camera.position.y += Math.sin(t * 1.7 + 2) * shake * 0.6;
    camera.position.z += Math.cos(t * 1.1) * shake;
    shake *= Math.exp(-4.5 * dt);
  }
}

// ---------- テクスチャ生成 ----------
function texPair(w, h, draw){
  const face = document.createElement('canvas'); face.width = w; face.height = h;
  const emis = document.createElement('canvas'); emis.width = w; emis.height = h;
  draw(face.getContext('2d'), emis.getContext('2d'), w, h);
  const t1 = new THREE.CanvasTexture(face), t2 = new THREE.CanvasTexture(emis);
  for(const t of [t1, t2]){ t.wrapS = t.wrapT = THREE.RepeatWrapping; t.anisotropy = 4; }
  return { map: t1, emissiveMap: t2 };
}

// コンクリート系オフィスビル: 床スラブの影 + 窓抜き + ブラインド
function makeConcreteTexture(rng){
  const t = texPair(256, 256, (fc, ec, W, H) => {
    fc.fillStyle = '#a9a49b'; fc.fillRect(0, 0, W, H);
    for(let i = 0; i < 700; i++){                        // 壁面の汚れ
      fc.fillStyle = `rgba(60,55,50,${(rng() * 0.08).toFixed(3)})`;
      fc.fillRect(rng() * W, rng() * H, 2 + rng() * 5, 2 + rng() * 5);
    }
    ec.fillStyle = '#000'; ec.fillRect(0, 0, W, H);
    const rows = 16, cols = 8, ch = H / rows, cw = W / cols;
    for(let r = 0; r < rows; r++){
      fc.fillStyle = 'rgba(0,0,0,0.22)';                 // スラブ下の影
      fc.fillRect(0, r * ch, W, 2);
      for(let c = 0; c < cols; c++){
        const x = c * cw + 3, y = r * ch + 4, w = cw - 6, h = ch - 7;
        const sky = 30 + (1 - r / rows) * 22 + rng() * 14;   // 上階ほど空が映る
        fc.fillStyle = `hsl(212, 18%, ${sky.toFixed(0)}%)`;
        fc.fillRect(x, y, w, h);
        if(rng() < 0.18){ fc.fillStyle = 'rgba(226,220,205,0.85)'; fc.fillRect(x, y, w, h * 0.5); } // ブラインド
        if(rng() < 0.38){
          ec.fillStyle = `rgba(255,196,128,${(0.45 + rng() * 0.55).toFixed(2)})`;
          ec.fillRect(x, y, w, h);
        }
      }
    }
  });
  t.map.repeat.set(1.5, 4); t.emissiveMap.repeat.set(1.5, 4);
  return t;
}

// ガラスカーテンウォール: 細いマリオン + 空の反射グラデーション
function makeGlassTexture(rng){
  const t = texPair(256, 256, (fc, ec, W, H) => {
    fc.fillStyle = '#1d2733'; fc.fillRect(0, 0, W, H);   // マリオン
    ec.fillStyle = '#000'; ec.fillRect(0, 0, W, H);
    const rows = 22, cols = 12, ch = H / rows, cw = W / cols;
    for(let r = 0; r < rows; r++) for(let c = 0; c < cols; c++){
      const x = c * cw + 1, y = r * ch + 1.5, w = cw - 2, h = ch - 3;
      const l = 24 + (1 - r / rows) * 26 + rng() * 16;   // 上ほど明るい空の反射
      fc.fillStyle = `hsl(${(205 + rng() * 14).toFixed(0)}, ${(24 + rng() * 14).toFixed(0)}%, ${l.toFixed(0)}%)`;
      fc.fillRect(x, y, w, h);
      if(rng() < 0.08){ fc.fillStyle = 'rgba(235,240,245,0.9)'; fc.fillRect(x, y, w, h); } // 強い反射
      if(rng() < 0.5){
        ec.fillStyle = `rgba(255,206,140,${(0.35 + rng() * 0.6).toFixed(2)})`;
        ec.fillRect(x, y, w, h);
      }
    }
  });
  t.map.repeat.set(1, 3); t.emissiveMap.repeat.set(1, 3);
  return t;
}

// 民家の外壁: 窓 + 玄関 + 軒の影
function makeHouseTexture(rng){
  return texPair(128, 128, (fc, ec, W, H) => {
    fc.fillStyle = '#efece2'; fc.fillRect(0, 0, W, H);
    for(let i = 0; i < 240; i++){
      fc.fillStyle = `rgba(120,110,95,${(rng() * 0.07).toFixed(3)})`;
      fc.fillRect(rng() * W, rng() * H, 2, 2 + rng() * 4);
    }
    fc.fillStyle = 'rgba(0,0,0,0.18)'; fc.fillRect(0, 0, W, 6);   // 軒の影
    ec.fillStyle = '#000'; ec.fillRect(0, 0, W, H);
    const win = (x, y, w, h) => {
      fc.fillStyle = '#f7f5ee'; fc.fillRect(x - 2, y - 2, w + 4, h + 4);  // 窓枠
      fc.fillStyle = '#39434e'; fc.fillRect(x, y, w, h);
      if(rng() < 0.5){ ec.fillStyle = `rgba(255,200,130,${(0.5 + rng() * 0.5).toFixed(2)})`; ec.fillRect(x, y, w, h); }
    };
    win(16, 26, 30, 26); win(82, 26, 30, 26);            // 2階の窓
    win(14, 78, 34, 30);                                  // 1階の窓
    fc.fillStyle = '#6e5644'; fc.fillRect(76, 74, 26, 54); // 玄関ドア
    fc.fillStyle = 'rgba(0,0,0,0.25)'; fc.fillRect(76, 124, 26, 4);
  });
}

// 複数ジオメトリを非インデックスで結合し、順にマテリアルグループを振る
function mergeGroups(geos){
  const pos = [], nor = [], uv = [], groups = [];
  let start = 0;
  geos.forEach((g0, gi) => {
    const g = g0.index ? g0.toNonIndexed() : g0;
    const p = g.getAttribute('position').array, n = g.getAttribute('normal').array;
    const u = g.getAttribute('uv');
    const cnt = p.length / 3;
    for(const x of p) pos.push(x);
    for(const x of n) nor.push(x);
    if(u) for(const x of u.array) uv.push(x); else for(let i = 0; i < cnt * 2; i++) uv.push(0);
    groups.push([start, cnt, gi]);
    start += cnt;
  });
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(nor, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));
  for(const g of groups) geo.addGroup(g[0], g[1], g[2]);
  return geo;
}

// 民家: 壁の箱 + 切妻屋根(高さ-0.5..0.5に正規化、Boxと同じ扱いができる)
function makeHouseGeometry(){
  const walls = new THREE.BoxGeometry(1, 0.62, 1);
  walls.translate(0, -0.19, 0); // -0.5 .. 0.12
  const e = 0.56, ey = 0.12, ry = 0.5;
  const V = [
    [-e,ey, e],[ e,ey, e],[ e,ry, 0],  [-e,ey, e],[ e,ry, 0],[-e,ry, 0],   // +z屋根面
    [ e,ey,-e],[-e,ey,-e],[-e,ry, 0],  [ e,ey,-e],[-e,ry, 0],[ e,ry, 0],   // -z屋根面
    [ e,ey, e],[ e,ey,-e],[ e,ry, 0],                                       // 妻面 +x
    [-e,ey,-e],[-e,ey, e],[-e,ry, 0],                                       // 妻面 -x
  ];
  const NS = [[0,.827,.561],[0,.827,-.561],[1,0,0],[-1,0,0]];
  const cnts = [6, 6, 3, 3];
  const pos = [], nor = [];
  let vi = 0;
  cnts.forEach((c, f) => { for(let k = 0; k < c; k++){ pos.push(...V[vi++]); nor.push(...NS[f]); } });
  const roof = new THREE.BufferGeometry();
  roof.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  roof.setAttribute('normal', new THREE.Float32BufferAttribute(nor, 3));
  return mergeGroups([walls, roof]); // group0=壁 group1=屋根
}

// 木: 幹 + 樹冠(接地面y=0、高さ~1に正規化)。3種類の樹形
function makeTreeGeometries(){
  const mkTrunk = () => {
    const t = new THREE.CylinderGeometry(0.05, 0.09, 0.42, 5);
    t.translate(0, 0.21, 0);
    return t;
  };
  // 0: 広葉樹(丸い樹冠)
  const leaf0 = new THREE.IcosahedronGeometry(0.34, 1);
  leaf0.translate(0, 0.62, 0);
  // 1: 針葉樹(円錐)
  const leaf1 = new THREE.ConeGeometry(0.27, 0.74, 7);
  leaf1.translate(0, 0.6, 0);
  // 2: ポプラ型(縦長の楕円)
  const leaf2 = new THREE.IcosahedronGeometry(0.26, 1);
  leaf2.scale(0.75, 1.55, 0.75);
  leaf2.translate(0, 0.58, 0);
  return [
    mergeGroups([mkTrunk(), leaf0]),   // group0=幹 group1=葉
    mergeGroups([mkTrunk(), leaf1]),
    mergeGroups([mkTrunk(), leaf2]),
  ];
}

// 木を1本登録(w=樹冠の幅係数で個体差を出す)
function pushTree(x, z, s, type, rng){
  if(inWater(x, z)) return;                              // 川の中には生えない
  trees.push({ x, z, s, w: 0.8 + rng() * 0.45, type, alive: true });
}

// オフィスビル: 塔体 + 屋上ペントハウス(高さ-0.5..0.5に正規化)
function makeTowerGeometry(){
  const out = { pos: [], nor: [], uv: [] };
  const push = (geo, from, to) => {
    const p = geo.getAttribute('position').array, n = geo.getAttribute('normal').array, u = geo.getAttribute('uv').array;
    for(let i = from; i < to; i++){
      out.pos.push(p[i*3], p[i*3+1], p[i*3+2]);
      out.nor.push(n[i*3], n[i*3+1], n[i*3+2]);
      out.uv.push(u[i*2], u[i*2+1]);
    }
  };
  const box = new THREE.BoxGeometry(1, 1, 1).toNonIndexed();
  // BoxGeometryの面順: +x,-x,+y,-y,+z,-z (各6頂点)。底面は見えないので省く
  push(box, 0, 12);            // 側面 +x, -x
  push(box, 24, 36);           // 側面 +z, -z
  const sideCount = out.pos.length / 3;
  push(box, 12, 18);           // 屋上面
  const pent = new THREE.BoxGeometry(0.42, 0.07, 0.36).translate(0.12, 0.53, 0.08).toNonIndexed();
  push(pent, 0, 36);           // ペントハウス(機械室)
  const unit = new THREE.BoxGeometry(0.2, 0.09, 0.18).translate(-0.22, 0.54, -0.2).toNonIndexed();
  push(unit, 0, 36);           // 空調ユニット
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(out.pos, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(out.nor, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(out.uv, 2));
  geo.addGroup(0, sideCount, 0);                              // ファサード
  geo.addGroup(sideCount, out.pos.length / 3 - sideCount, 1); // 屋上まわり
  return geo;
}

function gridKey(x, z){ return (Math.floor((x + 2700) / GRID_CELL) * 4096) + Math.floor((z + 2700) / GRID_CELL); }

// ---------- 道路パス(任意形状の道路をポリラインで統一的に扱う) ----------
const ROAD_STEP = 20;    // パス上の点の間隔(m)

// 粗い点列を等間隔ROAD_STEPに打ち直す
function resamplePath(raw, loop){
  const pts = [{ x: raw[0].x, z: raw[0].z }];
  const src = loop ? raw.concat([raw[0]]) : raw;
  let prev = src[0], acc = 0;
  for(let i = 1; i < src.length; i++){
    const cur = src[i];
    let dx = cur.x - prev.x, dz = cur.z - prev.z;
    let segLen = Math.hypot(dx, dz);
    while(segLen > 0 && acc + segLen >= ROAD_STEP){
      const t = (ROAD_STEP - acc) / segLen;
      prev = { x: prev.x + dx * t, z: prev.z + dz * t };
      pts.push({ x: prev.x, z: prev.z });
      dx = cur.x - prev.x; dz = cur.z - prev.z;
      segLen = Math.hypot(dx, dz);
      acc = 0;
    }
    acc += segLen;
    prev = cur;
  }
  return pts;
}

// パス上の距離sにおける位置と進行方向
function carPose(road, s){
  const n = road.pts.length;
  const maxS = (n - 1) * ROAD_STEP;
  s = ((s % maxS) + maxS) % maxS;
  const i = Math.min(n - 2, Math.floor(s / ROAD_STEP));
  const f = s / ROAD_STEP - i;
  const a = road.pts[i], b = road.pts[i + 1];
  let dx = b.x - a.x, dz = b.z - a.z;
  const l = Math.hypot(dx, dz) || 1;
  return { x: a.x + dx * f, z: a.z + dz * f, dx: dx / l, dz: dz / l };
}

// 道路上かどうかの粗い判定マスク(並木を交差点上に植えないため)
const MASK_CELL = 20;
let roadMask = new Set();
function buildRoadMask(){
  roadMask = new Set();
  for(const rp of roadPaths){
    const rad = Math.max(0, Math.floor((rp.w / 2 - 6) / MASK_CELL));
    for(const p of rp.pts){
      const cx = Math.round((p.x + 2700) / MASK_CELL), cz = Math.round((p.z + 2700) / MASK_CELL);
      for(let ax = -rad; ax <= rad; ax++)
        for(let az = -rad; az <= rad; az++)
          roadMask.add((cx + ax) * 8192 + (cz + az));
    }
  }
}
function onRoad(x, z){
  return roadMask.has(Math.round((x + 2700) / MASK_CELL) * 8192 + Math.round((z + 2700) / MASK_CELL));
}

function genRoadLines(rng){
  const lines = [{ c: -CITY_HALF, w: 30, major: true }];
  let c = -CITY_HALF;
  while(true){
    c += 130 + rng() * 150;
    if(c > CITY_HALF - 80) break;
    const major = rng() < 0.22;
    lines.push({ c, w: major ? 32 : 18, major });
  }
  lines.push({ c: CITY_HALF, w: 30, major: true });
  return lines;
}

// ---------- 建物パレットとロット → 建物の変換 ----------
const PAL_CON = [0xcfd2d6, 0xd8d2c6, 0xbac4cc, 0xc9c9c2, 0xaab4be, 0xd6cfc2, 0x9aa6b0,
  0xb9a88f, 0x8f9a8b, 0xa5988a, 0x93a0a8, 0xc2b6a0, 0x847e74, 0xbfae9c];      // ベージュ・煉瓦・緑灰なども
const PAL_GLA = [0xe9eff6, 0xd8e2ec, 0xc6d2e0, 0xe2e8ee, 0xcdd8e2,
  0xbfd8d2, 0xaebfd8, 0xd8e4da, 0x9fb4cf];                                     // ティール・スチールブルー系
const PAL_HOU = [0xf0ead8, 0xe6ddca, 0xdcd6c6, 0xd2d8dc, 0xdde2d2, 0xe8d8c0, 0xcfc8b8,
  0xe8d4d0, 0xd4dde6, 0xd8e4d4, 0xefe2b8, 0xcfc4b2,                            // 淡いピンク・水色・ミントなど
  0xf5f2ea, 0xe0cdb8, 0xd9cfe0, 0xc9d2c2, 0xe4c8b0, 0xd8d8d8, 0xc8bfae, 0xe6d2a8]; // 白・サンド・ラベンダー・セージ・テラコッタ・グレー系
const ROOF_COLS = [0x9a5648, 0x55616c, 0x4a6250, 0x3f4145, 0xa96a3f, 0x6e5a48]; // 屋根: 赤茶/スレート/深緑/炭/オレンジ/焦茶
const HOUSE_K0 = 2;   // bMeshes内で民家メッシュが始まるインデックス

// ロットの縁(建物の隙間)に木を植える。anywhereなら区画全体に
function yardTrees(lot, n, rng, anywhere){
  const cosr = Math.cos(lot.rot), sinr = Math.sin(lot.rot);
  for(let k = 0; k < n; k++){
    let lx, lz;
    if(anywhere){
      lx = (rng() - 0.5) * (lot.availW - 5);
      lz = (rng() - 0.5) * (lot.availD - 5);
    } else if(rng() < 0.5){
      lx = (rng() < 0.5 ? -1 : 1) * (lot.availW / 2 - 2.5);
      lz = (rng() - 0.5) * (lot.availD - 5);
    } else {
      lz = (rng() < 0.5 ? -1 : 1) * (lot.availD / 2 - 2.5);
      lx = (rng() - 0.5) * (lot.availW - 5);
    }
    const x = lot.x + lx * cosr + lz * sinr;
    const z = lot.z - lx * sinr + lz * cosr;
    if(Math.abs(x) > 2600 || Math.abs(z) > 2600) continue;
    pushTree(x, z, 3 + rng() * 4.5, Math.floor(rng() * 3), rng);
  }
}

// プラン生成器が出したロット {x,z,rot,availW,availD,distC,house} を建物にする
function addBuildingLot(lot, rng){
  const { x, z, rot, availW, availD, distC } = lot;
  if(Math.abs(x) > 2600 || Math.abs(z) > 2600) return;
  if(cornerBlocked(x, z)) return;                        // 山腹・川べりには建てない
  if(lot.house){
    if(rng() < 0.14){                                    // 空き地 → 児童公園(緑地 + 密な木)
      lotDecals.push({ x, z, rot, w: Math.max(7, availW - 3), d: Math.max(7, availD - 3), kind: 'park' });
      yardTrees(lot, Math.min(45, Math.max(4, Math.floor(availW * availD / 55))), rng, true);
      return;
    }
    if(rng() < 0.05){                                    // 低層アパート
      const sx = Math.max(8, availW - 4), sz = Math.max(8, availD - 4);
      const h = 9 + rng() * 15;
      buildings.push({ x, z, gy: groundLevel(x, z, sx, sz), sx, sz, h, rot, k: 0,
        value: sx * sz * (h / FLOOR_H) * VALUE_PER_M2_FLOOR,
        color: new THREE.Color(PAL_CON[Math.floor(rng() * PAL_CON.length)]).offsetHSL(0, 0, (rng() - 0.5) * 0.1),
        state: 0 });
    } else {
      const m = 2.5 + rng() * 2;
      const sx = Math.min(12, Math.max(5.5, availW - m * 2));
      const sz = Math.min(12, Math.max(5.5, availD - m * 2));
      const h = 4.5 + rng() * 3.2;
      buildings.push({ x, z, gy: groundLevel(x, z, sx, sz), sx, sz, h,
        rot: rot + (rng() < 0.5 ? 0 : Math.PI / 2) + (rng() - 0.5) * 0.09,
        k: HOUSE_K0 + Math.floor(rng() * ROOF_COLS.length),
        value: sx * sz * 2 * 200000,
        color: new THREE.Color(PAL_HOU[Math.floor(rng() * PAL_HOU.length)]).offsetHSL((rng() - 0.5) * 0.03, 0, (rng() - 0.5) * 0.09),
        state: 0 });
      if(rng() < 0.55) yardTrees(lot, 1 + Math.floor(rng() * 2), rng);  // 庭木
    }
  } else {
    if(rng() < 0.16){                                    // 空地: 駐車場かポケットパーク
      if(rng() < 0.45){
        lotDecals.push({ x, z, rot, w: Math.max(8, availW - 4), d: Math.max(8, availD - 4), kind: 'parking' });
      } else {
        // ビルの隙間の小公園: 緑地 + 森のような植栽
        lotDecals.push({ x, z, rot, w: Math.max(8, availW - 3), d: Math.max(8, availD - 3), kind: 'park' });
        yardTrees(lot, Math.min(45, Math.max(6, Math.floor(availW * availD / 55))), rng, true);
      }
      return;
    }
    const m = 2 + rng() * 3;
    const sx = Math.max(9, Math.min(availW * 0.92, availW - m * 2));
    const sz = Math.max(9, Math.min(availD * 0.92, availD - m * 2));
    const urban = Math.pow(Math.max(0, 1 - distC), 2);
    let h = 10 + Math.pow(rng(), 2.2) * (24 + 300 * urban);
    if(distC < 0.22 && rng() < 0.35) h = 90 + rng() * 190;   // 都心の超高層
    h = Math.min(h, 300);
    const glass = rng() < (h > 55 ? 0.6 : 0.12);         // 高層はガラス張りが多い
    const pal = glass ? PAL_GLA : PAL_CON;
    buildings.push({ x, z, gy: groundLevel(x, z, sx, sz), sx, sz, h, rot, k: glass ? 1 : 0,
      value: sx * sz * (h / FLOOR_H) * VALUE_PER_M2_FLOOR,
      color: new THREE.Color(pal[Math.floor(rng() * pal.length)]).offsetHSL(0, 0, (rng() - 0.5) * 0.1),
      state: 0 });
    if(rng() < 0.4) yardTrees(lot, 1 + Math.floor(rng() * 2), rng);   // 敷地内の植栽
  }
}

// ---------- 都市プラン: 碁盤目 / 有機的(ワープした碁盤目) ----------
function genGridPlan(rng, organic){
  // なめらかな変位場で格子全体を歪ませると、曲がった道路と不定形の街区になる
  const WN = 9;
  const wgx = new Float32Array(WN * WN), wgz = new Float32Array(WN * WN);
  for(let i = 0; i < WN * WN; i++){ wgx[i] = rng(); wgz[i] = rng(); }
  const amp = organic ? 110 + rng() * 130 : 0;
  const wSamp = (gr, u, v) => {
    u = Math.max(0, Math.min(WN - 1.001, u)); v = Math.max(0, Math.min(WN - 1.001, v));
    const x0 = Math.floor(u), z0 = Math.floor(v);
    let fx = u - x0, fz = v - z0;
    fx = fx * fx * (3 - 2 * fx); fz = fz * fz * (3 - 2 * fz);
    const i = z0 * WN + x0;
    const a = gr[i], b = gr[i + 1], c = gr[i + WN], d = gr[i + WN + 1];
    return a + (b - a) * fx + (c - a) * fz + (a - b - c + d) * fx * fz;
  };
  const warp = (u, v) => {
    if(!amp) return { x: u, z: v };
    const fade = Math.max(0, Math.min(1, 1 - (Math.max(Math.abs(u), Math.abs(v)) - 2200) / 300));
    const gu = (u + 3200) / 6400 * (WN - 1), gv = (v + 3200) / 6400 * (WN - 1);
    return { x: u + (wSamp(wgx, gu, gv) - 0.5) * 2 * amp * fade,
             z: v + (wSamp(wgz, gu, gv) - 0.5) * 2 * amp * fade };
  };
  const linesU = genRoadLines(rng), linesV = genRoadLines(rng);
  for(const l of linesU){
    const raw = [];
    for(let v = -CITY_HALF; v <= CITY_HALF + 1; v += 50) raw.push(warp(l.c, v));
    roadPaths.push({ pts: resamplePath(raw, false), w: l.w, major: l.major, loop: false });
  }
  for(const l of linesV){
    const raw = [];
    for(let u = -CITY_HALF; u <= CITY_HALF + 1; u += 50) raw.push(warp(u, l.c));
    roadPaths.push({ pts: resamplePath(raw, false), w: l.w, major: l.major, loop: false });
  }
  // 街区
  for(let i = 0; i < linesU.length - 1; i++){
    for(let j = 0; j < linesV.length - 1; j++){
      const u0 = linesU[i].c + linesU[i].w / 2, u1 = linesU[i + 1].c - linesU[i + 1].w / 2;
      const v0 = linesV[j].c + linesV[j].w / 2, v1 = linesV[j + 1].c - linesV[j + 1].w / 2;
      if(u1 - u0 < 24 || v1 - v0 < 24) continue;
      const wc = warp((u0 + u1) / 2, (v0 + v1) / 2);
      const distC = Math.hypot(wc.x - cityCore.x, wc.z - cityCore.z) / CITY_HALF;
      const park = rng() < 0.03;
      const house = !park && distC > cityHouseTh + (rng() - 0.5) * 0.14;
      // 塗り用ポリゴン(縁を分割してからワープすると曲線に沿う)
      const poly = [], step = 45;
      for(let u = u0; u < u1; u += step) poly.push(warp(u, v0));
      for(let v = v0; v < v1; v += step) poly.push(warp(u1, v));
      for(let u = u1; u > u0; u -= step) poly.push(warp(u, v1));
      for(let v = v1; v > v0; v -= step) poly.push(warp(u0, v));
      groundPolys.push({ pts: poly, kind: park ? 'park' : house ? 'house' : 'block', v: rng() < 0.5 });
      if(park){
        parkTreeJobs.push({ n: Math.min(220, Math.max(30, Math.floor((u1 - u0) * (v1 - v0) / 110))),
          sample: () => warp(u0 + 8 + rng() * (u1 - u0 - 16), v0 + 8 + rng() * (v1 - v0 - 16)) });
        continue;
      }
      // ロット分割
      const w = u1 - u0 - 10, d = v1 - v0 - 10;
      const nx = Math.max(1, house ? Math.floor(w / (15 + rng() * 6)) : Math.min(4, Math.floor(w / (26 + rng() * 26))));
      const nz = Math.max(1, house ? Math.floor(d / (15 + rng() * 6)) : Math.min(4, Math.floor(d / (26 + rng() * 26))));
      const cw = w / nx, cd = d / nz;
      // ロット境界に沿った街区内の路地
      for(let ix = 1; ix < nx; ix++){
        const au = u0 + 5 + cw * ix, raw = [];
        for(let v = v0 + 4; v <= v1 - 4; v += 40) raw.push(warp(au, v));
        raw.push(warp(au, v1 - 4));
        alleyPaths.push({ pts: raw, w: house ? 4 : 5.5 });
      }
      for(let iz = 1; iz < nz; iz++){
        const av = v0 + 5 + cd * iz, raw = [];
        for(let u = u0 + 4; u <= u1 - 4; u += 40) raw.push(warp(u, av));
        raw.push(warp(u1 - 4, av));
        alleyPaths.push({ pts: raw, w: house ? 4 : 5.5 });
      }
      for(let ix = 0; ix < nx; ix++) for(let iz = 0; iz < nz; iz++){
        const cu = u0 + 5 + cw * ix + cw / 2, cv = v0 + 5 + cd * iz + cd / 2;
        const wp = warp(cu, cv);
        const we = warp(cu + 8, cv);
        const rot = Math.atan2(-(we.z - wp.z), we.x - wp.x);  // 局所的な格子の向きに沿わせる
        pendingLots.push({ x: wp.x, z: wp.z, rot, availW: cw, availD: cd, distC, house });
      }
    }
  }
}

// ---------- 都市プラン: 放射環状(環状道路 + 放射道路) ----------
function genRadialPlan(rng){
  // 中心は都心位置に追従(街が地図からはみ出さない範囲で)
  const cx = Math.max(-450, Math.min(450, cityCore.x));
  const cz = Math.max(-450, Math.min(450, cityCore.z));
  const rEdge = CITY_HALF - Math.hypot(cx, cz);
  const rings = [];
  let r = 150 + rng() * 80;
  while(r < rEdge - 60){
    rings.push({ r, w: rng() < 0.3 ? 30 : 18, major: rng() < 0.35 || rings.length === 0 });
    r += 150 + rng() * 170;
  }
  const nSp = 10 + Math.floor(rng() * 8);
  const spokes = [];
  const a0 = rng() * Math.PI * 2;
  for(let k = 0; k < nSp; k++){
    spokes.push({ a: a0 + (k / nSp) * Math.PI * 2 + (rng() - 0.5) * 0.16,
      w: rng() < 0.3 ? 30 : 18, major: rng() < 0.35 });
  }
  spokes.sort((p, q) => p.a - q.a);
  for(const g of rings){
    const raw = [];
    const n = Math.max(24, Math.round(g.r * 2 * Math.PI / 45));
    for(let i = 0; i < n; i++){
      const a = i / n * Math.PI * 2;
      raw.push({ x: cx + Math.cos(a) * g.r, z: cz + Math.sin(a) * g.r });
    }
    roadPaths.push({ pts: resamplePath(raw, true), w: g.w, major: g.major, loop: true });
  }
  // 中心から角度aの方向に、地図の四角い縁までの距離
  const edgeDist = (a) => {
    const ca = Math.cos(a), sa = Math.sin(a);
    let d = Infinity;
    if(ca > 1e-6) d = Math.min(d, (2480 - cx) / ca);
    if(ca < -1e-6) d = Math.min(d, (-2480 - cx) / ca);
    if(sa > 1e-6) d = Math.min(d, (2480 - cz) / sa);
    if(sa < -1e-6) d = Math.min(d, (-2480 - cz) / sa);
    return d;
  };
  const rMin = rings[0].r;
  for(const sp of spokes){
    const raw = [
      { x: cx + Math.cos(sp.a) * rMin * 0.55, z: cz + Math.sin(sp.a) * rMin * 0.55 },
      { x: cx + Math.cos(sp.a) * (edgeDist(sp.a) - 20), z: cz + Math.sin(sp.a) * (edgeDist(sp.a) - 20) }];
    roadPaths.push({ pts: resamplePath(raw, false), w: sp.w, major: sp.major, loop: false });
  }
  // 中央広場は公園
  const plaza = [];
  for(let i = 0; i < 40; i++){
    const a = i / 40 * Math.PI * 2;
    plaza.push({ x: cx + Math.cos(a) * (rMin - 12), z: cz + Math.sin(a) * (rMin - 12) });
  }
  groundPolys.push({ pts: plaza, kind: 'park' });
  parkTreeJobs.push({
    n: Math.min(260, Math.floor(Math.PI * (rMin - 25) * (rMin - 25) / 130)),
    sample: () => {
      const a = rng() * Math.PI * 2, rr = Math.sqrt(rng()) * (rMin - 25);
      return { x: cx + Math.cos(a) * rr, z: cz + Math.sin(a) * rr };
    }});
  // 街区: リング帯 × スポーク区間の扇形。最外帯は地図の縁まで埋める
  for(let ri = 0; ri < rings.length; ri++){
    const outer = ri === rings.length - 1;
    const rIn = rings[ri].r + rings[ri].w / 2 + 5;
    const rOutBand = outer ? 0 : rings[ri + 1].r - rings[ri + 1].w / 2 - 5;
    if(!outer && rOutBand - rIn < 26) continue;
    const rm = outer ? rIn + 150 : (rIn + rOutBand) / 2;
    for(let si = 0; si < spokes.length; si++){
      const s0 = spokes[si], s1 = spokes[(si + 1) % spokes.length];
      const gap = (si === spokes.length - 1 ? s1.a + Math.PI * 2 : s1.a) - s0.a;
      const aA = s0.a + (s0.w / 2 + 5) / rm;
      const aB = s0.a + gap - (s1.w / 2 + 5) / rm;
      if(aB - aA < 24 / rm) continue;

      if(outer){
        // --- 最外帯: 角度列ごとに地図の縁までロットを敷き詰める ---
        const rO = (a) => edgeDist(a) - 14;
        const rOutMid = rO((aA + aB) / 2);
        if(rOutMid - rIn < 26) continue;
        const rmO = (rIn + rOutMid) / 2;
        const houseO = rmO / CITY_HALF > cityHouseTh + (rng() - 0.5) * 0.14;
        const poly = [];
        const nA = Math.max(4, Math.round((aB - aA) * rOutMid / 40));
        for(let k = 0; k <= nA; k++){ const a = aA + (aB - aA) * k / nA; poly.push({ x: cx + Math.cos(a) * rO(a), z: cz + Math.sin(a) * rO(a) }); }
        for(let k = nA; k >= 0; k--){ const a = aA + (aB - aA) * k / nA; poly.push({ x: cx + Math.cos(a) * rIn, z: cz + Math.sin(a) * rIn }); }
        groundPolys.push({ pts: poly, kind: houseO ? 'house' : 'block', v: rng() < 0.5 });
        const lotW = houseO ? 16 + rng() * 5 : 30 + rng() * 20;
        const nt = Math.max(1, Math.floor((aB - aA) * rmO / lotW));
        for(let it = 0; it < nt; it++){
          const ac = aA + (aB - aA) * ((it + 0.5) / nt);
          if(it > 0){                                    // 列境界の路地
            const ab = aA + (aB - aA) * it / nt;
            alleyPaths.push({ pts: [
              { x: cx + Math.cos(ab) * (rIn + 3), z: cz + Math.sin(ab) * (rIn + 3) },
              { x: cx + Math.cos(ab) * (rO(ab) - 3), z: cz + Math.sin(ab) * (rO(ab) - 3) }], w: 5 });
          }
          const depth = rO(ac) - rIn - 6;
          if(depth < 16) continue;
          const lotD = houseO ? 16 + rng() * 5 : 30 + rng() * 20;
          const nrL = Math.max(1, Math.floor(depth / lotD));
          const cdl = depth / nrL;
          for(let jr = 0; jr < nrL; jr++){
            const rc = rIn + 3 + cdl * jr + cdl / 2;
            pendingLots.push({ x: cx + Math.cos(ac) * rc, z: cz + Math.sin(ac) * rc,
              rot: Math.atan2(-Math.cos(ac), -Math.sin(ac)),
              availW: (aB - aA) * rc / nt, availD: cdl,
              distC: rc / CITY_HALF, house: houseO });
          }
        }
        continue;
      }

      const rOut = rOutBand;
      const distC = rm / CITY_HALF;
      const park = rng() < 0.025;
      const house = !park && distC > cityHouseTh + (rng() - 0.5) * 0.14;
      const poly = [];
      const nA = Math.max(4, Math.round((aB - aA) * rOut / 40));
      for(let k = 0; k <= nA; k++){ const a = aA + (aB - aA) * k / nA; poly.push({ x: cx + Math.cos(a) * rOut, z: cz + Math.sin(a) * rOut }); }
      for(let k = nA; k >= 0; k--){ const a = aA + (aB - aA) * k / nA; poly.push({ x: cx + Math.cos(a) * rIn, z: cz + Math.sin(a) * rIn }); }
      groundPolys.push({ pts: poly, kind: park ? 'park' : house ? 'house' : 'block', v: rng() < 0.5 });
      if(park){
        parkTreeJobs.push({ n: Math.min(200, Math.max(30, Math.floor((rOut - rIn) * (aB - aA) * rm / 110))),
          sample: () => { const a = aA + rng() * (aB - aA), rr = rIn + 8 + rng() * (rOut - rIn - 16);
            return { x: cx + Math.cos(a) * rr, z: cz + Math.sin(a) * rr }; } });
        continue;
      }
      // ロット分割(半径方向 × 角度方向)
      const depth = rOut - rIn - 8;
      const nr = Math.max(1, house ? Math.floor(depth / (15 + rng() * 6)) : Math.min(3, Math.floor(depth / (28 + rng() * 22))));
      const cd = depth / nr;
      // 街区内の路地(同心円の弧 + 放射方向)
      for(let jr = 1; jr < nr; jr++){
        const rb = rIn + 4 + cd * jr, raw = [];
        const nA2 = Math.max(4, Math.round((aB - aA) * rb / 30));
        for(let k = 0; k <= nA2; k++){
          const a = aA + (aB - aA) * k / nA2;
          raw.push({ x: cx + Math.cos(a) * rb, z: cz + Math.sin(a) * rb });
        }
        alleyPaths.push({ pts: raw, w: 5 });
      }
      const ntAl = Math.max(1, Math.floor((aB - aA) * rm / 30));
      for(let it = 1; it < ntAl; it++){
        const ab = aA + (aB - aA) * it / ntAl;
        alleyPaths.push({ pts: [
          { x: cx + Math.cos(ab) * (rIn + 3), z: cz + Math.sin(ab) * (rIn + 3) },
          { x: cx + Math.cos(ab) * (rOut - 3), z: cz + Math.sin(ab) * (rOut - 3) }], w: 5 });
      }
      for(let jr = 0; jr < nr; jr++){
        const rc = rIn + 4 + cd * jr + cd / 2;
        const arc = (aB - aA) * rc;
        const nt = Math.max(1, house ? Math.floor(arc / (15 + rng() * 6)) : Math.min(5, Math.floor(arc / (26 + rng() * 26))));
        const cwA = arc / nt;
        for(let it = 0; it < nt; it++){
          const ac = aA + (aB - aA) * ((it + 0.5) / nt);
          const x = cx + Math.cos(ac) * rc, z = cz + Math.sin(ac) * rc;
          const rot = Math.atan2(-Math.cos(ac), -Math.sin(ac));  // 接線(リング)方向に沿わせる
          pendingLots.push({ x, z, rot, availW: cwA, availD: cd, distC, house });
        }
      }
    }
  }
}

function generateCity(seedStr){
  // 旧オブジェクト破棄
  cityGroup.traverse(o => { if(o.geometry) o.geometry.dispose(); if(o.material){ (Array.isArray(o.material) ? o.material : [o.material]).forEach(m => { if(m.map) m.map.dispose(); if(m.emissiveMap) m.emissiveMap.dispose(); m.dispose(); }); } });
  scene.remove(cityGroup);
  cityGroup = new THREE.Group();
  scene.add(cityGroup);
  buildings = []; cars = []; trees = []; grid = new Map();
  roadPaths = []; groundPolys = []; alleyPaths = []; lotDecals = [];
  pendingLots = []; parkTreeJobs = [];
  for(const m of missiles){ scene.remove(m.mesh); scene.remove(m.marker); m.marker.material.dispose(); }
  for(const f of fx){ scene.remove(f.mesh); f.mesh.material.dispose(); }
  missiles.length = 0; fx.length = 0; collapsing.length = 0;
  delayedBooms.length = 0; burnSites.length = 0; burningBldgs.length = 0;
  nukeEmitters.length = 0;
  const nfEl = document.getElementById('nukeFlash');
  nfEl.style.transition = 'none'; nfEl.style.opacity = '0';
  clearDebris();
  for(const L of boomLights) L.intensity = 0;
  fireP.clear(); smokeP.clear();
  stats.bDead = 0; stats.cDead = 0; stats.tDead = 0; stats.mCount = 0; stats.damage = 0; stats.shown = 0;

  const rng = mulberry32(xfnv1a(seedStr));
  // 都心の位置と住宅街の比率もシードで揺らす
  const coreA = rng() * Math.PI * 2, coreR = rng() * 900;
  cityCore = { x: Math.cos(coreA) * coreR, z: Math.sin(coreA) * coreR };
  cityHouseTh = 0.5 + rng() * 0.2;   // 0.5(住宅多め) 〜 0.7(ビル多め)
  // 四隅は山か湾、四辺は1辺全体の山脈か水辺に(それ以外は平地)
  cornerFeats = [];
  const corners = [[-1, -1], [1, -1], [-1, 1], [1, 1]];
  for(const [sx, sz] of corners){
    const roll = rng(), fr = rng(), fp = rng(), ph = rng() * Math.PI * 2;
    let cand = null;
    if(roll < 0.34){
      cand = { type: 'm', kind: 'disc', x: sx * 2500, z: sz * 2500,
        r: 1100 + fr * 650, amp: 170 + fp * 260 };
    } else if(roll < 0.67){
      cand = { type: 'r', kind: 'disc', x: sx * 2500, z: sz * 2500,
        r: 700 + fr * 600, wig: 30 + fp * 50, ph };
    }
    if(cand && !featConflicts(cand)) cornerFeats.push(cand);   // 山と水は重ねない
  }
  const edges = [['z', -1], ['z', 1], ['x', -1], ['x', 1]];   // [軸, どちらの縁か]
  for(const [axis, side] of edges){
    const roll = rng(), fr = rng(), fp = rng(), ph = rng() * Math.PI * 2;
    let cand = null;
    if(roll < 0.22){
      cand = { type: 'm', kind: 'band', axis, side,
        depth: 500 + fr * 450, amp: 170 + fp * 260 };
    } else if(roll < 0.44){
      cand = { type: 'r', kind: 'band', axis, side,
        off: 230 + fr * 300, wig: 30 + fp * 50, ph };
    }
    if(cand && !featConflicts(cand)) cornerFeats.push(cand);
  }
  buildTerrain(rng);               // 起伏もシードで決まる

  // --- 都市プランをシードで選ぶ ---
  const roll = rng();
  cityPlan = roll < 0.34 ? 'grid' : roll < 0.67 ? 'organic' : 'radial';
  if(cityPlan === 'radial') genRadialPlan(rng);
  else genGridPlan(rng, cityPlan === 'organic');
  cullMountainRoads();     // 山にかかった道路・路地は消して森にする
  cullMountainAlleys();

  // --- 地面の質感ノイズ(シードで固定) ---
  noiseCanvas = document.createElement('canvas');
  noiseCanvas.width = noiseCanvas.height = 512;
  const nc = noiseCanvas.getContext('2d');
  for(let i = 0; i < 9000; i++){
    nc.fillStyle = rng() < 0.55
      ? `rgba(0,0,0,${(0.04 + rng() * 0.1).toFixed(3)})`
      : `rgba(255,255,255,${(0.03 + rng() * 0.05).toFixed(3)})`;
    nc.fillRect(rng() * 512, rng() * 512, 1 + rng() * 2.5, 1 + rng() * 2.5);
  }

  // --- 地面テクスチャ(時間帯切り替えで再描画するため drawGround に分離) ---
  if(!gCanvas){
    gCanvas = document.createElement('canvas');
    gCanvas.width = gCanvas.height = 2048;
    gCtx = gCanvas.getContext('2d');
  }
  gTex = new THREE.CanvasTexture(gCanvas);
  gTex.anisotropy = 8;
  const groundGeo = new THREE.PlaneGeometry(5400, 5400, 96, 96);
  groundGeo.rotateX(-Math.PI / 2);
  const gp = groundGeo.getAttribute('position');
  for(let i = 0; i < gp.count; i++) gp.setY(i, terrainH(gp.getX(i), gp.getZ(i)));
  groundGeo.computeVertexNormals();
  ground = new THREE.Mesh(groundGeo, new THREE.MeshLambertMaterial({ map: gTex }));
  cityGroup.add(ground);

  // --- 建物・民家(プラン生成が出したロットから) ---
  for(const lot of pendingLots) addBuildingLot(lot, rng);
  drawGround();   // ポケットパーク等の区画装飾はロット生成で決まるため、この後に描く
  // 通し番号と、種類別メッシュ内の番号を採番
  const counts = new Array(HOUSE_K0 + ROOF_COLS.length).fill(0);
  for(let i = 0; i < buildings.length; i++){
    const b = buildings[i];
    b.i = i;
    b.mi = counts[b.k]++;
  }

  emissiveMats = [];
  const mkFacade = (t, eScale) => {
    const m = new THREE.MeshLambertMaterial({
      map: t.map, emissive: new THREE.Color(0xffc98a),
      emissiveMap: t.emissiveMap, emissiveIntensity: TIMES[timeMode].emissive * eScale });
    m.userData.eScale = eScale;
    emissiveMats.push(m);
    return m;
  };
  const conMat = mkFacade(makeConcreteTexture(rng), 1);
  const glaMat = mkFacade(makeGlassTexture(rng), 1.2);
  const houMat = mkFacade(makeHouseTexture(rng), 0.8);
  const roofTopMat = new THREE.MeshLambertMaterial({ color: 0x484c53 });
  const towerGeo = makeTowerGeometry();
  const houseGeo = makeHouseGeometry();
  bMeshes = [
    new THREE.InstancedMesh(towerGeo, [conMat, roofTopMat], counts[0]),
    new THREE.InstancedMesh(towerGeo, [glaMat, roofTopMat], counts[1]),
    ...ROOF_COLS.map((c, ri) => new THREE.InstancedMesh(houseGeo,
      [houMat, new THREE.MeshLambertMaterial({ color: c })], counts[HOUSE_K0 + ri])),
  ];
  for(const m of bMeshes) m.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  for(const b of buildings){
    setBuildingMatrix(b, 1, 0, 0);
    bMeshes[b.k].setColorAt(b.mi, b.color);
    const k = gridKey(b.x, b.z);
    if(!grid.has(k)) grid.set(k, []);
    grid.get(k).push(b.i);
  }
  for(let t = 0; t < bMeshes.length; t++){
    if(counts[t]) bMeshes[t].instanceColor.needsUpdate = true;
    cityGroup.add(bMeshes[t]);
  }

  // --- 車(道路パスに沿って走る) ---
  const carColors = [0xd0d3d8, 0x30343c, 0xa33a2e, 0x3a5d8f, 0xc2b26a, 0x777d88];
  const N_CARS = 460;
  for(let i = 0; i < N_CARS; i++){
    const ri = Math.floor(rng() * roadPaths.length);
    const rp = roadPaths[ri];
    const dir = rng() < 0.5 ? 1 : -1;
    cars.push({
      road: ri, dir,
      lane: dir * (rp.w / 2 - 4 - rng() * (rp.major ? 6 : 1)),
      s: rng() * (rp.pts.length - 1) * ROAD_STEP,
      speed: 9 + rng() * 12, alive: true, i,
      color: new THREE.Color(carColors[Math.floor(rng() * carColors.length)])
    });
  }
  carMesh = new THREE.InstancedMesh(
    new THREE.BoxGeometry(4.6, 2, 2.2),
    new THREE.MeshLambertMaterial({ color: 0xffffff }), N_CARS);
  carMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  for(const c of cars) carMesh.setColorAt(c.i, c.color);
  carMesh.instanceColor.needsUpdate = true;
  cityGroup.add(carMesh);

  // --- 公園の木と並木(庭木はロット生成時に追加済み) ---
  for(const job of parkTreeJobs){
    for(let k = 0; k < job.n; k++){
      const pt = job.sample();
      pushTree(pt.x, pt.z, 5 + rng() * 8, Math.floor(rng() * 3), rng);
    }
  }
  buildRoadMask();
  for(const rp of roadPaths){
    let spacing, skip;
    if(rp.major){ spacing = 24; skip = 0.15; }
    else if(rng() < 0.45){ spacing = 46; skip = 0.35; }  // 生活道路にもまばらに
    else continue;
    const total = (rp.pts.length - 1) * ROAD_STEP;
    for(let sd = 30; sd < total - 30; sd += spacing + rng() * 14){
      if(rng() < skip) continue;
      const p = carPose(rp, sd);
      const off = rp.w / 2 + 3.5;
      for(const sgn of [1, -1]){
        const tx = p.x + p.dz * off * sgn, tz = p.z - p.dx * off * sgn;
        if(Math.abs(tx) > 2550 || Math.abs(tz) > 2550 || onRoad(tx, tz)) continue;  // 交差点上には植えない
        pushTree(tx, tz, 4.5 + rng() * 4, Math.floor(rng() * 3), rng);  // 樹形は1本ごとにランダム
      }
    }
  }
  // 山は公園以上の密度の森に覆われる(山裾は民家と重ならないよう減衰)
  for(const f of cornerFeats){
    if(f.type !== 'm') continue;
    if(f.kind === 'band'){
      // 1辺全体の山脈の森
      const target = Math.min(20000, Math.round(5300 * f.depth * 0.9 / 105));
      let placed = 0;
      for(let k = 0; k < target * 4 && placed < target; k++){
        const t = -2650 + rng() * 5300;
        const du = rng() * f.depth * 0.95;
        const tn = du / f.depth;   // 0=縁 1=内側の裾
        if(tn > 0.72 && rng() > Math.pow(Math.max(0, 1 - (tn - 0.72) / 0.26), 2)) continue;
        const p = f.axis === 'x' ? { x: f.side * (2500 - du), z: t } : { x: t, z: f.side * (2500 - du) };
        if(Math.abs(p.x) > 2560 || Math.abs(p.z) > 2560 || onRoad(p.x, p.z)) continue;
        pushTree(p.x, p.z, 6 + rng() * 7, Math.floor(rng() * 3), rng);
        placed++;
      }
      continue;
    }
    let inMap = 0;
    for(let k = 0; k < 128; k++){
      const a = rng() * Math.PI * 2, rr = Math.sqrt(rng()) * f.r * 0.95;
      if(Math.abs(f.x + Math.cos(a) * rr) <= 2560 && Math.abs(f.z + Math.sin(a) * rr) <= 2560) inMap++;
    }
    const target = Math.min(20000, Math.round(Math.PI * f.r * f.r * (inMap / 128) / 105));
    let placed = 0;
    for(let k = 0; k < target * 4 && placed < target; k++){
      const a = rng() * Math.PI * 2, rr = Math.sqrt(rng()) * f.r * 0.95;
      // 山裾(民家が建ち始める帯)では密度を外側に向かって減衰させる
      const t = rr / f.r;
      if(t > 0.72 && rng() > Math.pow(Math.max(0, 1 - (t - 0.72) / 0.26), 2)) continue;
      const tx = f.x + Math.cos(a) * rr, tz = f.z + Math.sin(a) * rr;
      if(Math.abs(tx) > 2560 || Math.abs(tz) > 2560 || onRoad(tx, tz)) continue;
      pushTree(tx, tz, 6 + rng() * 7, Math.floor(rng() * 3), rng);
      placed++;
    }
  }
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x6b4f3a });
  const leafCols = [0x4c7a36, 0x2f5a33, 0x53823a];   // 濃い緑(広葉樹 / 針葉樹 / ポプラ型)
  const treeGeos = makeTreeGeometries();
  const tCounts = [0, 0, 0];
  for(const t of trees) t.mi = tCounts[t.type]++;
  treeMeshes = [0, 1, 2].map(ti => {
    const m = new THREE.InstancedMesh(treeGeos[ti],
      [trunkMat, new THREE.MeshLambertMaterial({ color: leafCols[ti] })], tCounts[ti]);
    m.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    return m;
  });
  for(const t of trees){
    t.gy = terrainH(t.x, t.z);
    dummy.position.set(t.x, t.gy - 0.2, t.z);
    dummy.rotation.set(0, rng() * Math.PI * 2, 0);
    dummy.scale.set(t.s * t.w, t.s, t.s * t.w);
    dummy.updateMatrix();
    treeMeshes[t.type].setMatrixAt(t.mi, dummy.matrix);
    treeMeshes[t.type].setColorAt(t.mi, new THREE.Color(1, 1, 1).offsetHSL((rng() - 0.5) * 0.06, 0, (rng() - 0.5) * 0.1 - 0.02));
  }
  for(let ti = 0; ti < 3; ti++){
    if(tCounts[ti]) treeMeshes[ti].instanceColor.needsUpdate = true;
    cityGroup.add(treeMeshes[ti]);
  }

  stats.bTotal = buildings.length;
  document.getElementById('planName').textContent =
    '都市プラン: ' + ({ grid: '碁盤目', organic: '有機的街路', radial: '放射環状' })[cityPlan];
  updateHUD(true);
}

// 地面テクスチャの描画(時間帯トグルで呼び直す)
function drawGround(){
  const TEX = 2048, WORLD = 5400, s = TEX / WORLD;
  const w2c = v => (v + WORLD / 2) * s;
  const G = TIMES[timeMode].ground, g = gCtx;
  g.setLineDash([]);
  g.fillStyle = G.base; g.fillRect(0, 0, TEX, TEX);
  // 街区の塗り分け
  for(const poly of groundPolys){
    g.beginPath();
    poly.pts.forEach((p, i) => i ? g.lineTo(w2c(p.x), w2c(p.z)) : g.moveTo(w2c(p.x), w2c(p.z)));
    g.closePath();
    g.fillStyle = poly.kind === 'park' ? G.park : poly.kind === 'house' ? G.house : (poly.v ? G.block1 : G.block2);
    g.fill();
  }
  // 質感ノイズを全体に重ねる
  if(noiseCanvas) g.drawImage(noiseCanvas, 0, 0, TEX, TEX);
  // 空き区画の装飾(駐車場 / ポケットパーク)
  for(const dcl of lotDecals){
    g.save();
    g.translate(w2c(dcl.x), w2c(dcl.z));
    g.rotate(-dcl.rot);
    g.fillStyle = dcl.kind === 'park' ? G.park : G.asphalt;
    g.fillRect(-dcl.w / 2 * s, -dcl.d / 2 * s, dcl.w * s, dcl.d * s);
    g.restore();
  }
  // 道路: 歩道の帯 → アスファルト → センターライン の順に重ねる
  const strokeRoad = (rp, width, style) => {
    g.strokeStyle = style; g.lineWidth = Math.max(1, width * s);
    g.lineJoin = 'round'; g.lineCap = 'round';
    g.beginPath();
    rp.pts.forEach((p, i) => i ? g.lineTo(w2c(p.x), w2c(p.z)) : g.moveTo(w2c(p.x), w2c(p.z)));
    if(rp.loop) g.closePath();
    g.stroke();
  };
  for(const al of alleyPaths) strokeRoad(al, al.w, G.asphalt);   // 街区内の路地
  // 地形フィーチャ(山の緑 / 湾・水辺)。道路より先に描く
  for(const f of cornerFeats){
    if(f.kind === 'band'){
      // 帯フィーチャの座標変換: t=縁に沿った位置, du=縁からの内向き距離
      const bpt = (t, du) => f.axis === 'x'
        ? { x: f.side * (2500 - du), z: t }
        : { x: t, z: f.side * (2500 - du) };
      if(f.type === 'm'){
        // 1辺全体の山脈: 縁側は不透明、内側の裾でフェード
        const pe = bpt(0, -100), pi = bpt(0, f.depth);
        const grd = g.createLinearGradient(w2c(pe.x), w2c(pe.z), w2c(pi.x), w2c(pi.z));
        grd.addColorStop(0, G.mtn1);
        grd.addColorStop(0.78, G.mtn1);
        grd.addColorStop(1, G.mtn2);
        g.fillStyle = grd;
        const c0 = bpt(-2700, f.depth), c1 = bpt(2700, -200);
        g.fillRect(Math.min(w2c(c0.x), w2c(c1.x)), Math.min(w2c(c0.z), w2c(c1.z)),
          Math.abs(w2c(c1.x) - w2c(c0.x)), Math.abs(w2c(c1.z) - w2c(c0.z)));
      } else {
        // 1辺全体の水辺: 岸線は揺らぎ、縁側は全て水(対岸なし)
        const wig = t => f.wig * (0.5 + 0.5 * Math.sin(t / 380 + f.ph));
        const fillBand = (duFn, color) => {
          g.fillStyle = color;
          g.beginPath();
          for(let t = -2700; t <= 2700; t += 100){
            const p = bpt(t, duFn(t));
            t === -2700 ? g.moveTo(w2c(p.x), w2c(p.z)) : g.lineTo(w2c(p.x), w2c(p.z));
          }
          const e1 = bpt(2700, -300), e0 = bpt(-2700, -300);
          g.lineTo(w2c(e1.x), w2c(e1.z));
          g.lineTo(w2c(e0.x), w2c(e0.z));
          g.closePath(); g.fill();
        };
        fillBand(t => f.off - wig(t) + 14, G.bank);
        fillBand(t => f.off - wig(t), G.water);
      }
      continue;
    }
    const px = w2c(f.x), pz = w2c(f.z);
    if(f.type === 'm'){
      // 道路を削った跡が透けないよう、8割の半径までは完全不透明で塗る
      const grd = g.createRadialGradient(px, pz, f.r * 0.1 * s, px, pz, f.r * s);
      grd.addColorStop(0, G.mtn1);
      grd.addColorStop(0.78, G.mtn1);
      grd.addColorStop(1, G.mtn2);
      g.fillStyle = grd;
      g.beginPath(); g.arc(px, pz, f.r * s, 0, Math.PI * 2); g.fill();
    } else {
      // 湾: 揺らぐ岸線の内側が全て水(対岸なし)
      const wigA = a => f.wig * (0.5 + 0.5 * Math.sin(a * 3 + f.ph));
      const fillBlob = (rFn, color) => {
        g.fillStyle = color;
        g.beginPath();
        for(let i = 0; i <= 64; i++){
          const a = i / 64 * Math.PI * 2, rr = rFn(a);
          const qx = w2c(f.x + Math.cos(a) * rr), qz = w2c(f.z + Math.sin(a) * rr);
          i ? g.lineTo(qx, qz) : g.moveTo(qx, qz);
        }
        g.closePath(); g.fill();
      };
      fillBlob(a => f.r - wigA(a) + 14, G.bank);
      fillBlob(a => f.r - wigA(a), G.water);
    }
  }
  for(const rp of roadPaths) strokeRoad(rp, rp.w + 11, G.sidewalk);
  for(const rp of roadPaths) strokeRoad(rp, rp.w, G.asphalt);
  g.setLineDash([6, 8]);
  g.lineWidth = 1; g.strokeStyle = G.lane;
  for(const rp of roadPaths){
    if(!rp.major) continue;
    g.beginPath();
    rp.pts.forEach((p, i) => i ? g.lineTo(w2c(p.x), w2c(p.z)) : g.moveTo(w2c(p.x), w2c(p.z)));
    if(rp.loop) g.closePath();
    g.stroke();
  }
  g.setLineDash([]);
  gTex.needsUpdate = true;
}

function setBuildingMatrix(b, sy, tiltX, tiltZ){
  dummy.position.set(b.x, b.gy + b.h * sy / 2 - 0.5, b.z);
  dummy.rotation.set(tiltX, b.rot, tiltZ);
  dummy.scale.set(b.sx, Math.max(0.02, b.h * sy), b.sz);

}

// 倒壊: 基部の縁を支点に blast と反対側へ倒れる
const _tv = new THREE.Vector3();
const _tm1 = new THREE.Matrix4(), _tm2 = new THREE.Matrix4();
function toppleMatrix(b, ang, dirx, dirz){
  dummy.position.set(b.x, b.gy + b.h / 2 - 0.5, b.z);
  dummy.rotation.set(0, b.rot, 0);
  dummy.scale.set(b.sx, b.h, b.sz);
  dummy.updateMatrix();
  const ext = (Math.abs(dirx) * b.sx + Math.abs(dirz) * b.sz) / 2;
  const px = b.x + dirx * ext, py = b.gy, pz = b.z + dirz * ext;
  _tv.set(dirz, 0, -dirx).normalize();       // この軸まわりの+回転で頭が dir 方向へ倒れる
  _tm1.makeRotationAxis(_tv, ang);
  _tm2.makeTranslation(-px, -py, -pz);
  _tm1.multiply(_tm2);
  _tm2.makeTranslation(px, py, pz);
  _tm2.multiply(_tm1).multiply(dummy.matrix);
  bMeshes[b.k].setMatrixAt(b.mi, _tm2);
}

// ---------- パーティクル ----------
const P_VERT = `
  attribute float aSize; attribute float aAlpha; attribute vec3 aColor;
  varying float vA; varying vec3 vC;
  void main(){
    vA = aAlpha; vC = aColor;
    vec4 mv = modelViewMatrix * vec4(position, 1.0);
    gl_PointSize = aSize * (760.0 / max(1.0, -mv.z));
    gl_Position = projectionMatrix * mv;
  }`;
const P_FRAG = `
  varying float vA; varying vec3 vC;
  void main(){
    float d = length(gl_PointCoord - 0.5);
    float a = smoothstep(0.5, 0.06, d) * vA;
    if(a < 0.012) discard;
    gl_FragColor = vec4(vC, a);
  }`;

class ParticlePool {
  constructor(max, blending){
    this.max = max; this.parts = []; this.cursor = 0;
    this.pos = new Float32Array(max * 3);
    this.col = new Float32Array(max * 3);
    this.size = new Float32Array(max);
    this.alpha = new Float32Array(max);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(this.pos, 3).setUsage(THREE.DynamicDrawUsage));
    geo.setAttribute('aColor', new THREE.BufferAttribute(this.col, 3).setUsage(THREE.DynamicDrawUsage));
    geo.setAttribute('aSize', new THREE.BufferAttribute(this.size, 1).setUsage(THREE.DynamicDrawUsage));
    geo.setAttribute('aAlpha', new THREE.BufferAttribute(this.alpha, 1).setUsage(THREE.DynamicDrawUsage));
    this.geo = geo;
    this.mesh = new THREE.Points(geo, new THREE.ShaderMaterial({
      vertexShader: P_VERT, fragmentShader: P_FRAG,
      blending, transparent: true, depthWrite: false }));
    this.mesh.frustumCulled = false;
    scene.add(this.mesh);
    this.clear();
  }
  clear(){ this.parts.length = 0; this.alpha.fill(0); this.geo.attributes.aAlpha.needsUpdate = true; }
  spawn(p){ // {x,y,z,vx,vy,vz,life,size,r,g,b,grav,drag,fadeIn}
    p.age = 0; p.slot = this.cursor;
    this.cursor = (this.cursor + 1) % this.max;
    this.parts.push(p);
  }
  update(dt){
    for(let i = this.parts.length - 1; i >= 0; i--){
      const p = this.parts[i];
      p.age += dt;
      if(p.age >= p.life){ this.alpha[p.slot] = 0; this.parts.splice(i, 1); continue; }
      p.vy -= (p.grav || 0) * dt;
      const dr = p.drag ? Math.exp(-p.drag * dt) : 1;
      p.vx *= dr; p.vy *= dr; p.vz *= dr;
      p.x += p.vx * dt; p.y += p.vy * dt; p.z += p.vz * dt;
      const gnd = (p.gy || 0) + 1;
      if(p.y < gnd && p.vy < 0){ p.y = gnd; p.vy *= -0.3; p.vx *= 0.6; p.vz *= 0.6; }
      const k = p.age / p.life;
      const fade = p.fadeIn ? Math.min(1, p.age / p.fadeIn) : 1;
      const s = p.slot;
      this.pos[s*3] = p.x; this.pos[s*3+1] = p.y; this.pos[s*3+2] = p.z;
      this.col[s*3] = p.r; this.col[s*3+1] = p.g; this.col[s*3+2] = p.b;
      this.size[s] = p.size * (p.growth ? (1 + k * p.growth) : 1);
      this.alpha[s] = (1 - k) * fade * (p.baseAlpha || 1);
    }
    const at = this.geo.attributes;
    at.position.needsUpdate = at.aColor.needsUpdate = at.aSize.needsUpdate = at.aAlpha.needsUpdate = true;
  }
}

// 回転しながら飛び散る3D瓦礫
const DEBRIS_N = 340;
const debrisMesh = new THREE.InstancedMesh(
  new THREE.BoxGeometry(1, 1, 1),
  new THREE.MeshLambertMaterial({ color: 0xffffff }), DEBRIS_N);
debrisMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
debrisMesh.frustumCulled = false;
scene.add(debrisMesh);
const debrisList = [];
let debrisCursor = 0;
const debrisCols = [0x4a4a4e, 0x6a655c, 0x8a857a, 0x3a3d44, 0x7a5a48];
function clearDebris(){
  debrisList.length = 0;
  dummy.position.set(0, -100, 0); dummy.rotation.set(0, 0, 0);
  dummy.scale.set(0.001, 0.001, 0.001); dummy.updateMatrix();
  for(let i = 0; i < DEBRIS_N; i++) debrisMesh.setMatrixAt(i, dummy.matrix);
  debrisMesh.instanceMatrix.needsUpdate = true;
}
clearDebris();
function spawnDebris(x, y, z, pow){
  const a = Math.random() * Math.PI * 2, sp = (0.3 + Math.random() * 0.7) * pow;
  const d = {
    slot: debrisCursor, x, y, z,
    vx: Math.cos(a) * sp, vy: pow * (0.5 + Math.random() * 0.9), vz: Math.sin(a) * sp,
    rx: Math.random() * 3, ry: Math.random() * 3, rz: Math.random() * 3,
    rvx: (Math.random() - 0.5) * 12, rvz: (Math.random() - 0.5) * 12,
    size: 0.9 + Math.random() * 3.2, life: 2.2 + Math.random() * 2.4, age: 0
  };
  debrisMesh.setColorAt(d.slot, new THREE.Color(debrisCols[Math.floor(Math.random() * debrisCols.length)]));
  debrisCursor = (debrisCursor + 1) % DEBRIS_N;
  const old = debrisList.findIndex(o => o.slot === d.slot);  // スロットを奪われた古い瓦礫は消す
  if(old >= 0) debrisList.splice(old, 1);
  debrisList.push(d);
}
function updateDebris(dt){
  if(!debrisList.length) return;
  for(let i = debrisList.length - 1; i >= 0; i--){
    const d = debrisList[i];
    d.age += dt;
    if(d.age >= d.life){
      dummy.position.set(0, -100, 0); dummy.rotation.set(0, 0, 0);
      dummy.scale.set(0.001, 0.001, 0.001); dummy.updateMatrix();
      debrisMesh.setMatrixAt(d.slot, dummy.matrix);
      debrisList.splice(i, 1);
      continue;
    }
    d.vy -= 260 * dt;
    d.x += d.vx * dt; d.y += d.vy * dt; d.z += d.vz * dt;
    const gnd = terrainH(d.x, d.z) + d.size / 2;
    if(d.y < gnd && d.vy < 0){
      d.y = gnd; d.vy *= -0.34;
      d.vx *= 0.6; d.vz *= 0.6; d.rvx *= 0.5; d.rvz *= 0.5;
    }
    d.rx += d.rvx * dt; d.rz += d.rvz * dt;
    const fade = Math.min(1, (d.life - d.age) / 0.4);   // 最後は縮んで消える
    dummy.position.set(d.x, d.y, d.z);
    dummy.rotation.set(d.rx, d.ry, d.rz);
    dummy.scale.set(d.size * fade, d.size * fade, d.size * fade);
    dummy.updateMatrix();
    debrisMesh.setMatrixAt(d.slot, dummy.matrix);
  }
  debrisMesh.instanceMatrix.needsUpdate = true;
  if(debrisMesh.instanceColor) debrisMesh.instanceColor.needsUpdate = true;
}

const missileGeo = new THREE.ConeGeometry(2.2, 16, 8);

const raycaster = new THREE.Raycaster();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

let weapon = 'single';           // 'single' | 'cluster'
function requestStrike(px, py){
  const ndc = new THREE.Vector2((px / innerWidth) * 2 - 1, -(py / innerHeight) * 2 + 1);
  raycaster.setFromCamera(ndc, camera);
  let hit = null;
  if(ground){                                            // 起伏のある地面と交差判定
    const hits = raycaster.intersectObject(ground);
    if(hits.length) hit = hits[0].point.clone();
  }
  if(!hit){
    hit = new THREE.Vector3();
    if(!raycaster.ray.intersectPlane(groundPlane, hit)) return;
  }
  hit.x = Math.max(-2700, Math.min(2700, hit.x));
  hit.z = Math.max(-2700, Math.min(2700, hit.z));
  hit.y = terrainH(hit.x, hit.z);

  const nuke = weapon === 'nuke';
  const a = Math.random() * Math.PI * 2;
  const start = new THREE.Vector3(hit.x + Math.cos(a) * 480, hit.y + 1600, hit.z + Math.sin(a) * 480);
  const vel = hit.clone().sub(start).normalize().multiplyScalar(nuke ? 440 : 620);
  const mesh = new THREE.Mesh(missileGeo, missileMat);
  if(nuke) mesh.scale.setScalar(2);
  mesh.position.copy(start);
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), vel.clone().normalize());
  scene.add(mesh);

  // 着弾点マーカー
  const marker = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({
    color: nuke ? 0xff2200 : 0xff5533, transparent: true, opacity: 0.9, side: THREE.DoubleSide, depthWrite: false }));
  marker.rotation.x = -Math.PI / 2;
  marker.position.set(hit.x, hit.y + 2.5, hit.z);
  scene.add(marker);

  missiles.push({ pos: start, vel, target: hit, impactY: hit.y, mesh, marker, trailT: 0,
    cluster: weapon === 'cluster', nuke, split: false, sub: false });
  stats.mCount++;
  playWhoosh();
  document.getElementById('hint').classList.add('gone');
}

function updateMissiles(dt){
  for(let i = missiles.length - 1; i >= 0; i--){
    const m = missiles[i];
    m.pos.addScaledVector(m.vel, dt);
    m.mesh.position.copy(m.pos);
    // 噴射トレイル
    m.trailT += dt;
    while(m.trailT > 0.008){
      m.trailT -= 0.008;
      fireP.spawn({ x: m.pos.x + (Math.random()-0.5)*3, y: m.pos.y + (Math.random()-0.5)*3, z: m.pos.z + (Math.random()-0.5)*3,
        vx: 0, vy: 0, vz: 0, life: 0.5 + Math.random()*0.3, size: 9 + Math.random()*7,
        r: 1, g: 0.62, b: 0.25, baseAlpha: 0.8 });
      smokeP.spawn({ x: m.pos.x, y: m.pos.y, z: m.pos.z, vx: (Math.random()-0.5)*4, vy: 2, vz: (Math.random()-0.5)*4,
        life: 2.2, size: 14, growth: 2.5, r: 0.32, g: 0.32, b: 0.35, baseAlpha: 0.4 });
    }
    // マーカー点滅
    if(m.marker){
      m.marker.material.opacity = 0.5 + 0.45 * Math.sin(performance.now() * 0.02);
      const sc = 14 + 6 * Math.sin(performance.now() * 0.01);
      m.marker.scale.set(sc, sc, 1);
    }
    // クラスター弾: 上空で子弾に分裂
    if(m.cluster && !m.split && m.pos.y <= m.impactY + 380){
      m.split = true;
      scene.remove(m.mesh);
      if(m.marker){ scene.remove(m.marker); m.marker.material.dispose(); }
      for(let j = 0; j < 24; j++){                       // 分裂の閃光
        const a = Math.random() * Math.PI * 2, sp = 20 + Math.random() * 60;
        fireP.spawn({ x: m.pos.x, y: m.pos.y, z: m.pos.z,
          vx: Math.cos(a) * sp, vy: (Math.random() - 0.5) * 40, vz: Math.sin(a) * sp,
          life: 0.35 + Math.random() * 0.3, size: 7 + Math.random() * 8,
          r: 1, g: 0.8, b: 0.45 });
      }
      playPop();
      const n = 7 + Math.floor(Math.random() * 3);
      for(let j = 0; j < n; j++){
        const a = Math.random() * Math.PI * 2, rr = 25 + Math.random() * 150;
        const tx = Math.max(-2700, Math.min(2700, m.target.x + Math.cos(a) * rr));
        const tz = Math.max(-2700, Math.min(2700, m.target.z + Math.sin(a) * rr));
        const ty = terrainH(tx, tz);
        const sm = new THREE.Mesh(missileGeo, missileMat);
        sm.scale.set(0.5, 0.5, 0.5);
        const vel = new THREE.Vector3(tx - m.pos.x, ty - m.pos.y, tz - m.pos.z).normalize().multiplyScalar(560);
        sm.position.copy(m.pos);
        sm.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), vel.clone().normalize());
        scene.add(sm);
        missiles.push({ pos: m.pos.clone(), vel, target: new THREE.Vector3(tx, ty, tz), impactY: ty,
          mesh: sm, marker: null, trailT: Math.random() * 0.008, cluster: false, split: false, sub: true });
      }
      missiles.splice(i, 1);
      continue;
    }
    if(m.pos.y <= m.impactY + 2){
      scene.remove(m.mesh);
      if(m.marker){ scene.remove(m.marker); m.marker.material.dispose(); }
      missiles.splice(i, 1);
      const ip = new THREE.Vector3(m.target.x, m.impactY, m.target.z);
      if(m.nuke) detonateNuke(ip);
      else detonate(ip, m.sub ? 55 : 105);
    }
  }
}

  scene.add(mesh);

}

function updateNukeEmitters(dt){
  for(let i = nukeEmitters.length - 1; i >= 0; i--){
    const e = nukeEmitters[i];
    e.t += dt;
    if(e.t >= e.dur){ nukeEmitters.splice(i, 1); continue; }
    const k = e.t / e.dur;
    // 柱(ステム): 熱で吸い上げられる土煙
    const nStem = e.t < e.dur * 0.7 ? 3 : 1;

        r: 1, g: 0.5, b: 0.16, baseAlpha: 0.55 });

  }

// 建物を破壊状態にして崩壊(倒壊 or 圧壊)を開始する。delayで崩壊ウェーブを表現
function startCollapse(b, dirx, dirz, canTopple, delay = 0){
  b.state = 1;
  stats.bDead++;
  stats.damage += b.value;
  const base = { b, t: 0, delay: delay > 0 ? delay : 0.0001 };
  if(canTopple && b.h > 32 && Math.random() < 0.6){
    collapsing.push({ ...base, mode: 't', dur: 0.9 + Math.random() * 0.7,
      dirx, dirz, amax: Math.PI / 2 * (0.85 + Math.random() * 0.12) });
  } else {
    collapsing.push({ ...base, mode: 'c', dur: 0.7 + Math.random() * 0.5,
      ax: (Math.random() - 0.5) * 0.3, az: (Math.random() - 0.5) * 0.3 });
  }
  if(burnSites.length < 140 && Math.random() < 0.55)   // 跡地がしばらく燃え続ける
    burnSites.push({ x: b.x, z: b.z, gy: b.gy, until: simT + delay + 5 + Math.random() * 7, next: simT + delay + Math.random() * 0.4 });
}

function destroyAround(p, R, depth = 0, wave = 0){
  // 建物(空間ハッシュで近傍のみ走査)
  const R2 = R * 1.55;
  const c0x = Math.floor((p.x - R2 + 2700) / GRID_CELL), c1x = Math.floor((p.x + R2 + 2700) / GRID_CELL);
  const c0z = Math.floor((p.z - R2 + 2700) / GRID_CELL), c1z = Math.floor((p.z + R2 + 2700) / GRID_CELL);
  for(let cx = c0x; cx <= c1x; cx++) for(let cz = c0z; cz <= c1z; cz++){
    const cell = grid.get(cx * 4096 + cz);
    if(!cell) continue;
    for(const idx of cell){
      const b = buildings[idx];
      if(b.state !== 0 && b.state !== 3) continue;       // 3=延焼中は直撃なら壊せる
      const d = Math.hypot(b.x - p.x, b.z - p.z);
      if(d <= R || (d <= R2 && Math.random() < 0.45)){
        const dd = d || 1;
        // 爆心から遠い高層ビルは反対側へ倒れ込む(巻き添え倒壊は倒れない)
        startCollapse(b, (b.x - p.x) / dd, (b.z - p.z) / dd,
          depth === 0 && d > R * 0.3, wave ? d / wave : 0);
      } else if(b.state === 0 && depth === 0 && d <= R2 * 1.35 &&
                Math.random() < 0.4 && burningBldgs.length < 70){
        // 爆風の外縁: 炎上して時間差で崩れる
        b.state = 3;
        burningBldgs.push({ b, collapseAt: simT + 2 + Math.random() * 5, next: simT });
      }
    }
  }
  // 車
  const CR = R * 1.25;
  for(const c of cars){
    if(!c.alive) continue;
    const pose = carPose(roadPaths[c.road], c.s);
    const px = pose.x + pose.dz * c.lane;
    const pz = pose.z - pose.dx * c.lane;
    if(Math.hypot(px - p.x, pz - p.z) <= CR){
      c.alive = false;
      dummy.position.set(0, -50, 0); dummy.scale.set(0.001, 0.001, 0.001); dummy.rotation.set(0, 0, 0);
      dummy.updateMatrix();
      carMesh.setMatrixAt(c.i, dummy.matrix);
      stats.cDead++;
      stats.damage += CAR_VALUE;
    }
  }
  // 木
  const TR = R * 1.2;
  const treeHit = [false, false, false];
  for(const t of trees){
    if(!t.alive) continue;
    if(Math.hypot(t.x - p.x, t.z - p.z) <= TR){
      t.alive = false;
      dummy.position.set(0, -50, 0); dummy.rotation.set(0, 0, 0);
      dummy.scale.set(0.001, 0.001, 0.001);
      dummy.updateMatrix();
      treeMeshes[t.type].setMatrixAt(t.mi, dummy.matrix);
      treeHit[t.type] = true;
      stats.tDead++;
    }
  }
  treeHit.forEach((h, ti) => { if(h) treeMeshes[ti].instanceMatrix.needsUpdate = true; });
}

function updateCollapses(dt){
  if(!collapsing.length) return;
  const rubble = new THREE.Color(0x35312c);
  const fallen = new THREE.Color(0x5c564e);
  for(let i = collapsing.length - 1; i >= 0; i--){
    const c = collapsing[i];
    const b = c.b;
    if(c.delay > 0){                            // 崩壊ウェーブ: 到達するまで待つ
      c.delay -= dt;
      if(c.delay > 0) continue;
      collapseDust(b);
    }
    c.t += dt / c.dur;
    if(c.mode === 't'){
      // 倒壊: 基部を支点に加速しながら傾く
      if(c.t >= 1){
        toppleMatrix(b, c.amax, c.dirx, c.dirz);
        b.state = 2;
        const mesh = bMeshes[b.k];
        mesh.setColorAt(b.mi, fallen);
        mesh.instanceColor.needsUpdate = true;
        // 着地の粉塵が倒れた方向に走る
        for(let j = 0; j < 16; j++){
          const dd = b.h * (0.15 + Math.random() * 0.85);
          const px = b.x + c.dirx * dd + (Math.random() - 0.5) * b.sx * 1.5;
          const pz = b.z + c.dirz * dd + (Math.random() - 0.5) * b.sz * 1.5;
          const py = terrainH(px, pz);
          smokeP.spawn({ x: px, y: py + 2, z: pz, gy: py,
            vx: (Math.random() - 0.5) * 30, vy: 10 + Math.random() * 24, vz: (Math.random() - 0.5) * 30,
            life: 2.5 + Math.random() * 2, size: 18 + Math.random() * 20, growth: 2.4, drag: 0.6, fadeIn: 0.15,
            r: 0.42, g: 0.38, b: 0.32, baseAlpha: 0.6 });
        }
        const ix = b.x + c.dirx * b.h * 0.55, iz = b.z + c.dirz * b.h * 0.55;
        const iy = terrainH(ix, iz);
        for(let j = 0; j < 10; j++)
          spawnDebris(ix + (Math.random() - 0.5) * 20, iy + 3, iz + (Math.random() - 0.5) * 20, 50 + Math.random() * 60);
        shake += Math.min(4, b.h * 0.02);
        if(Math.random() < 0.2) playPop();     // 大量倒壊時に音が飽和しないよう間引く
        destroyAround({ x: ix, z: iz }, Math.min(45, b.h * 0.35), 1);  // 倒れ込んだ先を巻き添え
        collapsing.splice(i, 1);
        continue;
      }
      toppleMatrix(b, c.amax * c.t * c.t, c.dirx, c.dirz);
    } else {
      // 圧壊: その場に沈む
      if(c.t >= 1){
        b.state = 2;
        setBuildingMatrix(b, 0.045, 0, 0);
        const mesh = bMeshes[b.k];
        mesh.setColorAt(b.mi, rubble);
        mesh.instanceColor.needsUpdate = true;
        collapsing.splice(i, 1);
        continue;
      }
      const k = c.t * c.t;                      // 加速しながら崩れる
      const jitter = Math.sin(c.t * 40) * 0.02 * (1 - c.t);
      setBuildingMatrix(b, Math.max(0.045, 1 - k * 0.96), c.ax * k + jitter, c.az * k + jitter);
    }
  }
  for(const m of bMeshes) m.instanceMatrix.needsUpdate = true;
}

// 炎上中の建物: 燃えながら、時間が来たら崩れ落ちる
const burningBldgs = [];
function updateBurningBldgs(){
  for(let i = burningBldgs.length - 1; i >= 0; i--){
    const s = burningBldgs[i], b = s.b;
    if(b.state !== 3){ burningBldgs.splice(i, 1); continue; }  // 先に別の爆撃で破壊された
    if(simT >= s.collapseAt){
      burningBldgs.splice(i, 1);
      const a = Math.random() * Math.PI * 2;
      startCollapse(b, Math.cos(a), Math.sin(a), true);        // ランダムな方向に倒壊
      playPop();
      continue;
    }
    if(simT < s.next) continue;
    s.next = simT + 0.09 + Math.random() * 0.18;
    // 壁面のあちこちから火の手
    const ex = b.x + (Math.random() - 0.5) * b.sx * 1.05;
    const ez = b.z + (Math.random() - 0.5) * b.sz * 1.05;
    const ey = b.gy + b.h * (0.25 + Math.random() * 0.75);
    fireP.spawn({ x: ex, y: ey, z: ez, gy: b.gy,
      vx: (Math.random() - 0.5) * 5, vy: 10 + Math.random() * 18, vz: (Math.random() - 0.5) * 5,
      life: 0.4 + Math.random() * 0.5, size: 7 + Math.random() * 10,
      r: 1, g: 0.55 + Math.random() * 0.25, b: 0.14, baseAlpha: 0.9 });
    if(Math.random() < 0.5)
      smokeP.spawn({ x: b.x + (Math.random() - 0.5) * b.sx * 0.5, y: b.gy + b.h + 3,
        z: b.z + (Math.random() - 0.5) * b.sz * 0.5, gy: b.gy,
        vx: (Math.random() - 0.5) * 4, vy: 14 + Math.random() * 16, vz: (Math.random() - 0.5) * 4,
        life: 2.5 + Math.random() * 2.5, size: 12 + Math.random() * 16, growth: 2.6, drag: 0.2, fadeIn: 0.3,
        r: 0.16, g: 0.15, b: 0.15, baseAlpha: 0.6 });
  }
}

function updateFx(dt){
  for(let i = fx.length - 1; i >= 0; i--){
    const f = fx[i];
    f.age += dt;
    if(f.age >= f.life){
      scene.remove(f.mesh);
      if(f.mesh.material) f.mesh.material.dispose();   // PointLight等はmaterialなし
      fx.splice(i, 1);
      continue;
    }
    f.update(f.mesh, f.age / f.life);
  }
}

// ---------- 車の走行(道路パスに沿う) ----------
function updateCars(dt){
  for(const c of cars){
    if(!c.alive) continue;
    c.s += c.speed * c.dir * dt;
    const p = carPose(roadPaths[c.road], c.s);
    const px = p.x + p.dz * c.lane, pz = p.z - p.dx * c.lane;   // 進行方向の横にレーンオフセット
    dummy.position.set(px, terrainH(px, pz) + 1.1, pz);
    dummy.rotation.set(0, Math.atan2(-p.dz * c.dir, p.dx * c.dir), 0);
    dummy.scale.set(1, 1, 1);
    dummy.updateMatrix();
    carMesh.setMatrixAt(c.i, dummy.matrix);
  }
  carMesh.instanceMatrix.needsUpdate = true;
}

// ---------- サウンド(WebAudioで合成) ----------
let actx = null, soundOn = true;
function initAudio(){
  if(!actx){
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  }
  if(actx && actx.state === 'suspended') actx.resume();
}
function playBoom(dist){
  if(!actx || !soundOn) return;
  const vol = Math.min(0.55, 220 / Math.max(150, dist));
  const t = actx.currentTime;
  // ノイズバースト
  const len = actx.sampleRate * 1.6;
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.2);
  const src = actx.createBufferSource(); src.buffer = buf;
  const lp = actx.createBiquadFilter(); lp.type = 'lowpass';
  lp.frequency.setValueAtTime(900, t); lp.frequency.exponentialRampToValueAtTime(70, t + 1.4);
  const gn = actx.createGain(); gn.gain.setValueAtTime(vol, t);
  gn.gain.exponentialRampToValueAtTime(0.001, t + 1.6);
  src.connect(lp).connect(gn).connect(actx.destination); src.start(t);
  // 低音のドン
  const osc = actx.createOscillator(); osc.type = 'sine';
  osc.frequency.setValueAtTime(72, t); osc.frequency.exponentialRampToValueAtTime(26, t + 0.9);
  const og = actx.createGain(); og.gain.setValueAtTime(vol * 1.2, t);
  og.gain.exponentialRampToValueAtTime(0.001, t + 1);
  osc.connect(og).connect(actx.destination); osc.start(t); osc.stop(t + 1.05);
}
function playNuke(dist){
  if(!actx || !soundOn) return;
  const vol = Math.min(0.85, 2000 / Math.max(300, dist));
  const t = actx.currentTime;
  const noise = (start, dur, f0, f1, g0, decayPow) => {
    const len = Math.floor(actx.sampleRate * dur);
    const buf = actx.createBuffer(1, len, actx.sampleRate);
    const d = buf.getChannelData(0);
    for(let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decayPow);
    const src = actx.createBufferSource(); src.buffer = buf;
    const lp = actx.createBiquadFilter(); lp.type = 'lowpass';
    lp.frequency.setValueAtTime(f0, t + start);
    lp.frequency.exponentialRampToValueAtTime(f1, t + start + dur * 0.9);
    const gn = actx.createGain(); gn.gain.setValueAtTime(g0, t + start);
    gn.gain.exponentialRampToValueAtTime(0.001, t + start + dur);
    src.connect(lp).connect(gn).connect(actx.destination);
    src.start(t + start);
  };
  noise(0, 0.25, 6000, 1200, vol * 0.7, 1.5);        // 鋭いクラック
  noise(0.02, 4.5, 550, 40, vol, 2.0);               // 主爆音
  noise(1.1, 3.5, 220, 50, vol * 0.45, 1.5);         // 遅れてくる残響
  const osc = actx.createOscillator(); osc.type = 'sine';   // 地鳴りのサブベース
  osc.frequency.setValueAtTime(52, t);
  osc.frequency.exponentialRampToValueAtTime(14, t + 3.2);
  const og = actx.createGain(); og.gain.setValueAtTime(vol * 1.5, t);
  og.gain.exponentialRampToValueAtTime(0.001, t + 3.4);
  osc.connect(og).connect(actx.destination); osc.start(t); osc.stop(t + 3.5);
}
function playPop(){
  if(!actx || !soundOn) return;
  const t = actx.currentTime;
  const len = actx.sampleRate * 0.5;
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 3);
  const src = actx.createBufferSource(); src.buffer = buf;
  const lp = actx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1400;
  const gn = actx.createGain(); gn.gain.setValueAtTime(0.16, t);
  gn.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
  src.connect(lp).connect(gn).connect(actx.destination); src.start(t);
}
function playWhoosh(){
  if(!actx || !soundOn) return;
  const t = actx.currentTime;
  const len = actx.sampleRate * 1.2;
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (i / len);
  const src = actx.createBufferSource(); src.buffer = buf;
  const bp = actx.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.2;
  bp.frequency.setValueAtTime(400, t); bp.frequency.exponentialRampToValueAtTime(2400, t + 1.1);
  const gn = actx.createGain(); gn.gain.setValueAtTime(0.0001, t);
  gn.gain.exponentialRampToValueAtTime(0.12, t + 1.0);
  gn.gain.exponentialRampToValueAtTime(0.0001, t + 1.25);
  src.connect(bp).connect(gn).connect(actx.destination); src.start(t);
}
document.getElementById('soundBtn').addEventListener('click', e => {
  soundOn = !soundOn;
  e.target.textContent = soundOn ? 'SOUND: ON' : 'SOUND: OFF';
  initAudio();
});

// ---------- HUD ----------
const $ = id => document.getElementById(id);
function yen(v){
  if(v >= 1e12) return '¥' + (v / 1e12).toFixed(2) + '兆';
  if(v >= 1e8)  return '¥' + (v / 1e8).toFixed(1) + '億';
  if(v >= 1e4)  return '¥' + Math.round(v / 1e4).toLocaleString() + '万';
  return '¥' + Math.round(v).toLocaleString();
}
function updateHUD(force){
  stats.shown += (stats.damage - stats.shown) * 0.08;
  if(stats.damage - stats.shown < 1e5) stats.shown = stats.damage;
  $('bDead').textContent = stats.bDead.toLocaleString();
  $('bTotal').textContent = stats.bTotal.toLocaleString();
  $('cDead').textContent = stats.cDead.toLocaleString();
  $('tDead').textContent = stats.tDead.toLocaleString();
  $('mCount').textContent = stats.mCount.toLocaleString();
  $('dmgTotal').textContent = yen(stats.shown);
}
$('regen').addEventListener('click', () => generateCity($('seed').value || 'DEFAULT'));
$('timeBtn').addEventListener('click', () => applyTime(timeMode === 'day' ? 'dusk' : 'day'));
const WEAPONS = [
  ['single', '弾種: 単弾頭ミサイル'],
  ['cluster', '弾種: クラスター弾'],
  ['nuke', '弾種: 戦術核 ☢'],
];
let weaponIdx = 0;
$('weaponBtn').addEventListener('click', e => {
  weaponIdx = (weaponIdx + 1) % WEAPONS.length;
  weapon = WEAPONS[weaponIdx][0];
  e.target.textContent = WEAPONS[weaponIdx][1];
  const hot = weapon === 'nuke';
  e.target.style.color = hot ? 'var(--red)' : '';
  e.target.style.borderColor = hot ? 'var(--red)' : '';
});
$('rand').addEventListener('click', () => {
  const s = 'CITY-' + Math.floor(Math.random() * 99999).toString().padStart(5, '0');
  $('seed').value = s;
  generateCity(s);
});
$('seed').addEventListener('keydown', e => { if(e.key === 'Enter') generateCity(e.target.value || 'DEFAULT'); });

// ---------- メインループ ----------
function resize(){
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
}
addEventListener('resize', resize);
resize();

generateCity(document.getElementById('seed').value);

let last = performance.now();
function loop(now){
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  simT += dt;
  updateCamera(dt);
  updateCars(dt);
  updateMissiles(dt);
  for(let i = delayedBooms.length - 1; i >= 0; i--){   // 二次爆発の発火
    if(simT >= delayedBooms[i].t){
      const d = delayedBooms[i];
      delayedBooms.splice(i, 1);
      miniBoom(d);
    }
  }
  updateBurning();
  updateBurningBldgs();
  updateNukeEmitters(dt);
  updateCollapses(dt);
  updateFx(dt);
  updateDebris(dt);
  updateBoomLights(dt);
  fireP.update(dt);
  smokeP.update(dt);
  updateHUD();
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
