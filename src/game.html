<script>
'use strict';

// ---------- シード付き乱数 ----------
function xfnv1a(str){ let h = 2166136261 >>> 0;
  for(let i = 0; i < str.length; i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0; }
function mulberry32(a){ return function(){
  a |= 0; a = a + 0x6D2B79F5 | 0;
  let t = Math.imul(a ^ a >>> 15, 1 | a);
  t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
  return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }

// ---------- 定数 ----------
const CITY_HALF = 2500;          // 街の半径 (m) → 5km四方
const MAP_HALF = 2700;           // 余白込みの世界半径。カメラ移動・着弾クランプ・空間ハッシュの原点
const CAR_VALUE = 3000000;       // 車1台の被害額
const FLOOR_H = 3.5;             // 1フロアの高さ
const VALUE_PER_M2_FLOOR = 300000; // 床面積1m2あたりの資産額
const HOUSE_FLOORS = 2;              // 民家は2階建て想定
const HOUSE_VALUE_PER_M2_FLOOR = 200000; // 民家の床面積1m2あたりの資産額
// ビル・アパートの資産額(延床面積 × 単価)
const floorValue = (sx, sz, h) => sx * sz * (h / FLOOR_H) * VALUE_PER_M2_FLOOR;
// 地図の縁からのマージン込みの配置可能範囲(±)。対象ごとにマージンが異なる
const PLACE_LOT = 2600, PLACE_TREE = 2550, PLACE_FOREST = 2560;
const inMap = (x, z, half) => Math.abs(x) <= half && Math.abs(z) <= half;
// 配列からランダムに1要素選ぶ(rは rng か Math.random)
const pick = (arr, r) => arr[Math.floor(r() * arr.length)];

// ---------- 地形(シード付き値ノイズ) ----------
const TG_N = 33, TG_SPAN = 6400;
let tGrid = null, tAmp = 0;
let cityCore = { x: 0, z: 0 };   // 都心(ビル群)の位置。シードでずれる
let cityHouseTh = 0.6;           // 住宅街になる都心距離のしきい値。小さいほど住宅街が多い
let cornerFeats = [];            // 四隅の地形 {type:'m'(山)|'r'(川), x, z, r, amp|w}
function buildTerrain(rng){
  tGrid = new Float32Array(TG_N * TG_N);
  for(let i = 0; i < tGrid.length; i++) tGrid[i] = rng();
  tAmp = 45 + rng() * 55;        // 起伏の強さもシードで変わる
}
// smoothstep補間付きバイリニア格子サンプラ(地形グリッドと街路ワープ場で共用)
function gridSample(gr, N, u, v){
  u = THREE.MathUtils.clamp(u, 0, N - 1.001);
  v = THREE.MathUtils.clamp(v, 0, N - 1.001);
  const x0 = Math.floor(u), z0 = Math.floor(v);
  let fx = u - x0, fz = v - z0;
  fx = fx * fx * (3 - 2 * fx); fz = fz * fz * (3 - 2 * fz);
  const i = z0 * N + x0;
  const a = gr[i], b = gr[i + 1], c = gr[i + N], d = gr[i + N + 1];
  return a + (b - a) * fx + (c - a) * fz + (a - b - c + d) * fx * fz;
}
function terrainH(x, z){
  if(!tGrid) return 0;
  const u = (x + TG_SPAN / 2) / TG_SPAN * (TG_N - 1);
  const v = (z + TG_SPAN / 2) / TG_SPAN * (TG_N - 1);
  const c1 = gridSample(tGrid, TG_N, u * 0.28 + 2.3, v * 0.28 + 4.1);   // 大きなうねり
  const c2 = gridSample(tGrid, TG_N, u, v);                              // 細かい起伏
  const h = (c1 - 0.5) * 1.6 + (c2 - 0.5) * 0.5;
  const distC = Math.hypot(x - cityCore.x, z - cityCore.z) / CITY_HALF;
  const flat = 0.25 + 0.75 * THREE.MathUtils.clamp((distC - 0.15) / 0.75, 0, 1); // 都心部は平坦
  let hh = h * tAmp * flat;
  // 地形フィーチャ: 山は隆起、水域は固定水面レベルへ平坦化ブレンド
  let wb = 0;   // 水面ブレンド率(1=完全な水面)
  for(const f of cornerFeats){
    if(f.type === 'm'){
      const tn = mtnNorm(f, x, z);
      // 高さプロファイルは意図的に band=線形の肩 / disc=釣鐘型 で異なる
      if(tn < 1){ const k = f.kind === 'band' ? 1 - tn : 1 - tn * tn; hh += f.amp * k * k; }
    } else {
      const pen = waterPen(f, x, z);
      if(pen > -90) wb = Math.max(wb, Math.min(1, (pen + 90) / 140));
    }
  }
  if(wb > 0) hh = THREE.MathUtils.lerp(hh, -12, wb);   // 水面は起伏の影響を受けず平坦
  return hh;
}
// 帯状フィーチャにおける、地図の縁からの内向き距離
function bandDu(f, x, z){
  return CITY_HALF - (f.axis === 'x' ? x * f.side : z * f.side);
}
// 帯状フィーチャ: (縁沿い位置t, 内向き距離du) → 世界座標(bandDuの逆変換)
function bandPt(f, t, du){
  return f.axis === 'x' ? { x: f.side * (CITY_HALF - du), z: t } : { x: t, z: f.side * (CITY_HALF - du) };
}
// 岸線の揺らぎ。3D水面メッシュと2D地面描画が同じ岸線を描くための共用定義
function bandWig(f, t){ return f.wig * (0.5 + 0.5 * Math.sin(t / 380 + f.ph)); }
function discWig(f, a){ return f.wig * (0.5 + 0.5 * Math.sin(a * 3 + f.ph)); }
// 水域フィーチャ内側への侵入量(正=水側)。band/discの形状差を吸収する
function waterPen(f, x, z){
  return f.kind === 'band' ? f.off - bandDu(f, x, z) : f.r - Math.hypot(x - f.x, z - f.z);
}
// 山フィーチャの正規化距離(0=中心・縁, 1=裾)
function mtnNorm(f, x, z){
  return f.kind === 'band' ? bandDu(f, x, z) / f.depth : Math.hypot(x - f.x, z - f.z) / f.r;
}
// フィーチャfの影響領域に点が入っているか
function featRegion(f, x, z){
  return f.type === 'm' ? mtnNorm(f, x, z) < 1 : waterPen(f, x, z) > -30;
}
// 候補フィーチャが既存の「逆タイプ」(山⇔水)と重なるか。同種同士の連なりは許可
function featConflicts(cand){
  const pts = [];
  if(cand.kind === 'disc'){
    pts.push([cand.x, cand.z]);
    for(let i = 0; i < 16; i++){
      const a = i / 16 * Math.PI * 2;
      pts.push([cand.x + Math.cos(a) * cand.r * 0.55, cand.z + Math.sin(a) * cand.r * 0.55]);
      pts.push([cand.x + Math.cos(a) * cand.r * 0.98, cand.z + Math.sin(a) * cand.r * 0.98]);
    }
  } else {
    const dep = cand.type === 'm' ? cand.depth : cand.off + 20;
    for(let t = -CITY_HALF; t <= CITY_HALF; t += 250){
      for(const du of [10, dep * 0.5, dep * 0.95]){
        const q = bandPt(cand, t, du);
        pts.push([q.x, q.z]);
      }
    }
  }
  for(const f of cornerFeats){
    if(f.type === cand.type) continue;
    for(const [px, pz] of pts){
      if(Math.abs(px) > MAP_HALF || Math.abs(pz) > MAP_HALF) continue;
      if(featRegion(f, px, pz)) return true;
    }
  }
  return false;
}
// 地形フィーチャで建物が建てられない場所か(山腹・水辺)
function cornerBlocked(x, z){
  for(const f of cornerFeats){
    if(f.type === 'm'){ if(mtnNorm(f, x, z) < 0.8) return true; }
    else if(waterPen(f, x, z) > -16) return true;
  }
  return false;
}
// 山の中か(道路も通さない)
function inMountain(x, z){
  for(const f of cornerFeats){
    if(f.type === 'm' && mtnNorm(f, x, z) < 0.82) return true;
  }
  return false;
}
// 道路を通せない場所(山の中・水の中)
function roadBlocked(x, z){
  return inMountain(x, z) || inWater(x, z);
}
// 山・水にかかった道路を刈り取り、通れる区間だけ残す
function cullMountainRoads(){
  const out = [];
  for(const rp of roadPaths){
    let cut = false, run = [];
    const runs = [];
    for(const p of rp.pts){
      if(roadBlocked(p.x, p.z)){
        cut = true;
        if(run.length) runs.push(run);
        run = [];
      } else run.push(p);
    }
    if(run.length) runs.push(run);
    if(!cut){ out.push(rp); continue; }
    // 環状道路は始点・終点の区間が地続きなので繋ぎ直す
    if(rp.loop && runs.length >= 2 &&
       !roadBlocked(rp.pts[0].x, rp.pts[0].z) &&
       !roadBlocked(rp.pts[rp.pts.length - 1].x, rp.pts[rp.pts.length - 1].z)){
      runs[0] = runs.pop().concat(runs[0]);
    }
    for(const r2 of runs) if(r2.length >= 3) out.push({ pts: r2, w: rp.w, major: rp.major, loop: false });
  }
  roadPaths = out;
}
// 山・水にかかった路地は丸ごと消す
function cullMountainAlleys(){
  alleyPaths = alleyPaths.filter(al => {
    for(let i = 0; i < al.pts.length - 1; i++){
      const a = al.pts[i], b = al.pts[i + 1];
      const n = Math.max(1, Math.ceil(Math.hypot(b.x - a.x, b.z - a.z) / 40));
      for(let k = 0; k <= n; k++){
        if(roadBlocked(a.x + (b.x - a.x) * k / n, a.z + (b.z - a.z) * k / n)) return false;
      }
    }
    return true;
  });
}
// 水面の中か(木も生えない)。湾は隅の円内、帯は縁側すべてが水
function inWater(x, z){
  for(const f of cornerFeats){
    if(f.type === 'r' && waterPen(f, x, z) > 6) return true;
  }
  return false;
}
// 建物の接地高さ: 敷地の最も低い点に合わせて基礎を埋める
function groundLevel(x, z, sx, sz){
  const hx = sx / 2, hz = sz / 2;
  return Math.min(terrainH(x, z),
    terrainH(x - hx, z - hz), terrainH(x + hx, z - hz),
    terrainH(x - hx, z + hz), terrainH(x + hx, z + hz));
}

// ---------- レンダラ / シーン ----------
const $ = id => document.getElementById(id);
const canvas = $('gl');
// r147当時の配色を維持するためカラーマネジメントは無効(hex値をそのまま使う旧パイプライン)
THREE.ColorManagement.enabled = false;
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.75));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8ec4f0);
scene.fog = new THREE.Fog(0x8ec4f0, 1600, 9000);

const camera = new THREE.PerspectiveCamera(55, 1, 2, 14000);

// 環境光(時間帯で切り替え)
// r155以降ライト強度が物理単位になった(旧実装の内部π倍が廃止)ため、π倍して旧来の明るさを保つ
const LIGHT_SCALE = Math.PI;
const hemi = new THREE.HemisphereLight(0xbdd5ee, 0x8a8578, 1.05 * LIGHT_SCALE);
scene.add(hemi);
const sun = new THREE.DirectionalLight(0xfff1d6, 1.35 * LIGHT_SCALE);
sun.position.set(-900, 2000, 700);
scene.add(sun);
scene.add(sun.target);

// 太陽の影。影カメラは注視点に毎フレーム追従させ、カバー半径はズーム距離に合わせて
// 段階的に広げる(近景=狭く精細な影、遠景=画面内をほぼ覆う粗い影)。位置と注視先を
// 同じ量だけ動かすので光の向きは変わらず、シェーダー再コンパイルも起きない
const SHADOW_MAP_RES = 4096;
const sunOff = new THREE.Vector3().copy(sun.position);   // 注視点から見た太陽の相対位置
sun.castShadow = true;
sun.shadow.mapSize.set(SHADOW_MAP_RES, SHADOW_MAP_RES);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 8000;      // 夕暮れは太陽が低く、影カメラの奥行きが伸びるぶんの余裕
sun.shadow.bias = -0.00005;   // far=8000mでは深度1単位が大きく、過大な負値は接地面を一様に影へ倒す
let shadowR = 0;                   // 現在のカバー半径(updateSunShadowが管理)
const _sDir = new THREE.Vector3(), _sRight = new THREE.Vector3(),
      _sUp = new THREE.Vector3(), _sFocus = new THREE.Vector3(), _sWorldUp = new THREE.Vector3(0, 1, 0);
function updateSunShadow(){
  // カバー半径はカメラ距離の1.15倍を150m刻みに量子化(毎フレームの投影行列更新を避ける)。
  // 下限300mまで絞ると最接近時のテクセルは約0.15mになり、車や木の幹の影も判別できる
  const r = THREE.MathUtils.clamp(Math.ceil(cam.dist * 1.15 / 150) * 150, 300, 3000);
  if(r !== shadowR){
    shadowR = r;
    const c = sun.shadow.camera;
    c.left = -r; c.right = r; c.top = r; c.bottom = -r;
    c.updateProjectionMatrix();
    // アクネ対策の法線オフセット。この値のぶんだけ背の低い遮蔽物(木の幹など)の影が
    // 相殺されて消えるため、夕暮れの斜光でも縞が出ない最小限に抑える
    sun.shadow.normalBias = 0.3 + r / 1500;
  }
  // 注視点を光に直交する平面上でテクセル単位にスナップし、移動時の影エッジのちらつきを抑える
  const texel = r * 2 / SHADOW_MAP_RES;
  _sDir.copy(sunOff).normalize();
  _sRight.crossVectors(_sWorldUp, _sDir).normalize();
  _sUp.crossVectors(_sDir, _sRight);
  _sFocus.copy(cam.focus);
  _sFocus.addScaledVector(_sRight, Math.round(_sFocus.dot(_sRight) / texel) * texel - _sFocus.dot(_sRight));
  _sFocus.addScaledVector(_sUp,    Math.round(_sFocus.dot(_sUp)    / texel) * texel - _sFocus.dot(_sUp));
  sun.position.copy(_sFocus).add(sunOff);
  sun.target.position.copy(_sFocus);
}

// 時間帯プリセット
let timeMode = 'day';
const TIMES = {
  day: {
    fog: 0x8ec4f0, fogNear: 1600, fogFar: 9000,
    hemiSky: 0xbdd5ee, hemiGnd: 0x8a8578, hemiInt: 1.05,

    ground: { base: '#6e6f68', asphalt: '#54575d', sidewalk: '#83858a', block1: '#72747a', block2: '#7a7c7f',
      park: '#385c3a', house: '#7f7c6d', lane: 'rgba(245,225,150,0.85)',
      water: '#3d6d95', waterSurf: '#487fab', waterSpec: '#a8bccc', waterShine: 120,
      bank: '#83816b', mtn1: '#46603c', mtn2: 'rgba(80,96,72,0)', crater: '#5b5142' }
  },
  dusk: {
    fog: 0x1c2438, fogNear: 1400, fogFar: 7500,
    hemiSky: 0x3a5480, hemiGnd: 0x241a12, hemiInt: 0.95,
    sunCol: 0xff9a5a, sunInt: 0.75, sunPos: [-1600, 700, 900], emissive: 0.85,
    ground: { base: '#1f211d', asphalt: '#191b20', sidewalk: '#33363c', block1: '#26282e', block2: '#2b2c31',
      park: '#22392a', house: '#2a2822', lane: 'rgba(190,175,120,0.5)',
      water: '#14222f', waterSurf: '#1b3044', waterSpec: '#ffb066', waterShine: 45,
      bank: '#26261e', mtn1: '#1a2a1a', mtn2: 'rgba(26,36,24,0)', crater: '#242019' }
  }
};
function applyTime(mode){
  timeMode = mode;
  const T = TIMES[mode];
  scene.fog.color.setHex(T.fog); scene.fog.near = T.fogNear; scene.fog.far = T.fogFar;
  scene.background.setHex(T.fog);
  hemi.color.setHex(T.hemiSky); hemi.groundColor.setHex(T.hemiGnd); hemi.intensity = T.hemiInt * LIGHT_SCALE;
  sun.color.setHex(T.sunCol); sun.intensity = T.sunInt * LIGHT_SCALE;
  sunOff.set(...T.sunPos); updateSunShadow();   // 太陽角度の変更は影の向きにもそのまま反映される
  for(const m of emissiveMats) m.emissiveIntensity = T.emissive * (m.userData.eScale || 1);
  if(gCtx && groundPolys.length) drawGround();
  if(waterMat){
    waterMat.color.set(T.ground.waterSurf);
    waterMat.specular.set(T.ground.waterSpec);
    waterMat.shininess = T.ground.waterShine;
  }
  $('timeBtn').textContent = mode === 'day' ? '時間帯: 昼' : '時間帯: 夕暮れ';
}

// ---------- カメラ操作 ----------
const cam = { focus: new THREE.Vector3(0, 0, 0), yaw: 0.7, pitch: 0.95, dist: 950 };
let shake = 0;
const keys = {};
addEventListener('keydown', e => { if(e.target.tagName !== 'INPUT') keys[e.code] = true; });
addEventListener('keyup',   e => { keys[e.code] = false; });

let dragging = false, lastX = 0, lastY = 0;
canvas.addEventListener('pointerdown', e => {
  if(e.button === 0){ dragging = true; lastX = e.clientX; lastY = e.clientY; canvas.setPointerCapture(e.pointerId); }
  if(e.button === 2){ requestStrike(e.clientX, e.clientY); }
  initAudio();
});
addEventListener('pointerup', () => dragging = false);
addEventListener('pointermove', e => {
  if(!dragging) return;
  cam.yaw   -= (e.clientX - lastX) * 0.005;
  cam.pitch += (e.clientY - lastY) * 0.004;
  cam.pitch = THREE.MathUtils.clamp(cam.pitch, 0.28, 1.5);
  lastX = e.clientX; lastY = e.clientY;
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  cam.dist *= Math.exp(e.deltaY * 0.0011);
  cam.dist = THREE.MathUtils.clamp(cam.dist, 120, 4200);
}, { passive: false });
addEventListener('contextmenu', e => e.preventDefault());

function updateCamera(dt){
  const sp = cam.dist * 0.9 * dt * (keys.ShiftLeft || keys.ShiftRight ? 2.4 : 1);
  const fwx = Math.sin(cam.yaw), fwz = Math.cos(cam.yaw);
  if(keys.KeyW){ cam.focus.x -= fwx * sp; cam.focus.z -= fwz * sp; }
  if(keys.KeyS){ cam.focus.x += fwx * sp; cam.focus.z += fwz * sp; }
  if(keys.KeyA){ cam.focus.x -= fwz * sp; cam.focus.z += fwx * sp; }
  if(keys.KeyD){ cam.focus.x += fwz * sp; cam.focus.z -= fwx * sp; }
  cam.focus.x = THREE.MathUtils.clamp(cam.focus.x, -MAP_HALF, MAP_HALF);
  cam.focus.z = THREE.MathUtils.clamp(cam.focus.z, -MAP_HALF, MAP_HALF);
  cam.focus.y = terrainH(cam.focus.x, cam.focus.z);      // 注視点は地形に追従
  updateSunShadow();                                     // 影カメラも注視点に追従

  const cp = Math.cos(cam.pitch), sinP = Math.sin(cam.pitch);
  camera.position.set(
    cam.focus.x + fwx * cp * cam.dist,
    cam.focus.y + sinP * cam.dist,
    cam.focus.z + fwz * cp * cam.dist);
  const minY = terrainH(camera.position.x, camera.position.z) + 12;  // 山にめり込まない
  if(camera.position.y < minY) camera.position.y = minY;
  camera.lookAt(cam.focus);
  shake = Math.min(shake, 36);
  if(shake > 0.001){
    const t = performance.now() * 0.05;
    camera.position.x += Math.sin(t * 1.3) * shake;
    camera.position.y += Math.sin(t * 1.7 + 2) * shake * 0.6;
    camera.position.z += Math.cos(t * 1.1) * shake;
    shake *= Math.exp(-4.5 * dt);
  }
}

// ---------- テクスチャ生成 ----------
function texPair(w, h, draw){
  const face = document.createElement('canvas'); face.width = w; face.height = h;
  const emis = document.createElement('canvas'); emis.width = w; emis.height = h;
  draw(face.getContext('2d'), emis.getContext('2d'), w, h);
  const t1 = new THREE.CanvasTexture(face), t2 = new THREE.CanvasTexture(emis);
  for(const t of [t1, t2]){ t.wrapS = t.wrapT = THREE.RepeatWrapping; t.anisotropy = 4; }
  return { map: t1, emissiveMap: t2 };
}

// コンクリート系オフィスビル: 床スラブの影 + 窓抜き + ブラインド
function makeConcreteTexture(rng){
  const t = texPair(256, 256, (fc, ec, W, H) => {
    fc.fillStyle = '#a9a49b'; fc.fillRect(0, 0, W, H);
    for(let i = 0; i < 700; i++){                        // 壁面の汚れ
      fc.fillStyle = `rgba(60,55,50,${(rng() * 0.08).toFixed(3)})`;
      fc.fillRect(rng() * W, rng() * H, 2 + rng() * 5, 2 + rng() * 5);
    }
    ec.fillStyle = '#000'; ec.fillRect(0, 0, W, H);
    const rows = 16, cols = 8, ch = H / rows, cw = W / cols;
    for(let r = 0; r < rows; r++){
      fc.fillStyle = 'rgba(0,0,0,0.22)';                 // スラブ下の影
      fc.fillRect(0, r * ch, W, 2);
      for(let c = 0; c < cols; c++){
        const x = c * cw + 3, y = r * ch + 4, w = cw - 6, h = ch - 7;
        const sky = 30 + (1 - r / rows) * 22 + rng() * 14;   // 上階ほど空が映る
        fc.fillStyle = `hsl(212, 18%, ${sky.toFixed(0)}%)`;
        fc.fillRect(x, y, w, h);
        if(rng() < 0.18){ fc.fillStyle = 'rgba(226,220,205,0.85)'; fc.fillRect(x, y, w, h * 0.5); } // ブラインド
        if(rng() < 0.38){
          ec.fillStyle = `rgba(255,196,128,${(0.45 + rng() * 0.55).toFixed(2)})`;
          ec.fillRect(x, y, w, h);
        }
      }
    }
  });
  t.map.repeat.set(1.5, 4); t.emissiveMap.repeat.set(1.5, 4);
  return t;
}

// ガラスカーテンウォール: 細いマリオン + 空の反射グラデーション
function makeGlassTexture(rng){
  const t = texPair(256, 256, (fc, ec, W, H) => {
    fc.fillStyle = '#1d2733'; fc.fillRect(0, 0, W, H);   // マリオン
    ec.fillStyle = '#000'; ec.fillRect(0, 0, W, H);

    for(let r = 0; r < rows; r++) for(let c = 0; c < cols; c++){
      const x = c * cw + 1, y = r * ch + 1.5, w = cw - 2, h = ch - 3;
      const l = 24 + (1 - r / rows) * 26 + rng() * 16;   // 上ほど明るい空の反射

// 複数ジオメトリを非インデックスで結合し、順にマテリアルグループを振る
function mergeGroups(geos){
  const pos = [], nor = [], uv = [], groups = [];
  let start = 0;
  geos.forEach((g0, gi) => {
    const g = g0.index ? g0.toNonIndexed() : g0;
    const p = g.getAttribute('position').array, n = g.getAttribute('normal').array;
    const u = g.getAttribute('uv');
    const cnt = p.length / 3;
    for(const x of p) pos.push(x);
    for(const x of n) nor.push(x);
    if(u) for(const x of u.array) uv.push(x); else for(let i = 0; i < cnt * 2; i++) uv.push(0);
    groups.push([start, cnt, gi]);
    start += cnt;
  });
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(nor, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));
  for(const g of groups) geo.addGroup(g[0], g[1], g[2]);
  return geo;
}

// 民家: 壁の箱 + 切妻屋根(高さ-0.5..0.5に正規化、Boxと同じ扱いができる)
function makeHouseGeometry(){
  const walls = new THREE.BoxGeometry(1, 0.62, 1);
  walls.translate(0, -0.19, 0); // -0.5 .. 0.12
  const e = 0.56, ey = 0.12, ry = 0.5;
  const V = [
    [-e,ey, e],[ e,ey, e],[ e,ry, 0],  [-e,ey, e],[ e,ry, 0],[-e,ry, 0],   // +z屋根面
    [ e,ey,-e],[-e,ey,-e],[-e,ry, 0],  [ e,ey,-e],[-e,ry, 0],[ e,ry, 0],   // -z屋根面
    [ e,ey, e],[ e,ey,-e],[ e,ry, 0],                                       // 妻面 +x
    [-e,ey,-e],[-e,ey, e],[-e,ry, 0],                                       // 妻面 -x
  ];
  const NS = [[0,.827,.561],[0,.827,-.561],[1,0,0],[-1,0,0]];
  const cnts = [6, 6, 3, 3];
  const pos = [], nor = [];
  let vi = 0;
  cnts.forEach((c, f) => { for(let k = 0; k < c; k++){ pos.push(...V[vi++]); nor.push(...NS[f]); } });
  const roof = new THREE.BufferGeometry();
  roof.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  roof.setAttribute('normal', new THREE.Float32BufferAttribute(nor, 3));
  return mergeGroups([walls, roof]); // group0=壁 group1=屋根
}

// 木: 幹 + 樹冠(接地面y=0、高さ~1に正規化)。4種類の樹形。
// 樹冠は低ポリのブロブを複数束ね、頂点を座標ハッシュでわずかに揺らして真球のCG感を消す
// (乱数でなくハッシュなので決定的で、同一座標の頂点は同じ変位になり面が割れない)
function makeTreeGeometries(){
  const wobble = (geo, amp) => {
    const p = geo.getAttribute('position');
    for(let i = 0; i < p.count; i++){
      const x = p.getX(i), y = p.getY(i), z = p.getZ(i);
      const n = k => { const v = Math.sin(x * 127.1 + y * 311.7 + z * 74.7 + k * 53.3) * 43758.5453; return v - Math.floor(v) - 0.5; };
      p.setXYZ(i, x + n(1) * amp, y + n(2) * amp * 0.7, z + n(3) * amp);
    }
    geo.computeVertexNormals();
    return geo;
  };
  const blob = (r, x, y, z, sy = 1) => {
    const g = new THREE.IcosahedronGeometry(r, 0);
    g.scale(1, sy, 1);
    g.translate(x, y, z);
    return g;
  };
  const mkTrunk = (rTop, rBot, h) => {
    const t = new THREE.CylinderGeometry(rTop, rBot, h, 5);
    t.translate(0, h / 2, 0);
    return t;
  };
  // 樹冠ブロブ群を1ジオメトリに畳んでから幹と結合する(group0=幹 group1=葉)
  const canopy = (amp, ...blobs) => wobble(mergeGroups(blobs), amp);
  const tree = (trunk, leaf) => mergeGroups([trunk, leaf]);
  return [
    // 0: 広葉樹(丸い樹冠をブロブ3つで)
    tree(mkTrunk(0.05, 0.09, 0.42), canopy(0.06,
      blob(0.30, 0, 0.62, 0), blob(0.20, 0.20, 0.50, 0.07), blob(0.19, -0.17, 0.55, -0.10))),
    // 1: 針葉樹(円錐の2段重ね)
    tree(mkTrunk(0.035, 0.06, 0.35), canopy(0.035,
      new THREE.ConeGeometry(0.28, 0.50, 6).translate(0, 0.50, 0),
      new THREE.ConeGeometry(0.19, 0.42, 6).translate(0, 0.82, 0))),
    // 2: ポプラ型(縦長の楕円を2つ重ねる)
    tree(mkTrunk(0.04, 0.06, 0.25), canopy(0.05,
      blob(0.22, 0, 0.50, 0, 1.8), blob(0.15, 0, 0.85, 0, 1.5))),
    // 3: ケヤキ型(短い幹から傘状に広がる樹冠)
    tree(mkTrunk(0.05, 0.08, 0.50), canopy(0.06,
      blob(0.34, 0, 0.66, 0, 0.62), blob(0.24, 0.18, 0.58, 0.12, 0.68), blob(0.22, -0.20, 0.60, -0.08, 0.65))),
  ];
}

// オフィスビル: 塔体 + 屋上ペントハウス(高さ-0.5..0.5に正規化)
function makeTowerGeometry(){
  const out = { pos: [], nor: [], uv: [] };
  const push = (geo, from, to) => {
    const p = geo.getAttribute('position').array, n = geo.getAttribute('normal').array, u = geo.getAttribute('uv').array;
    for(let i = from; i < to; i++){
      out.pos.push(p[i*3], p[i*3+1], p[i*3+2]);
      out.nor.push(n[i*3], n[i*3+1], n[i*3+2]);
      out.uv.push(u[i*2], u[i*2+1]);
    }
  };
  const box = new THREE.BoxGeometry(1, 1, 1).toNonIndexed();
  // BoxGeometryの面順: +x,-x,+y,-y,+z,-z (各6頂点)
  push(box, 0, 12);            // 側面 +x, -x
  push(box, 24, 36);           // 側面 +z, -z
  const sideCount = out.pos.length / 3;
  push(box, 12, 18);           // 屋上面
  push(box, 18, 24);           // 底面(直立時はカリングで消えるが、倒壊時に見える)
  const pent = new THREE.BoxGeometry(0.42, 0.07, 0.36).translate(0.12, 0.53, 0.08).toNonIndexed();
  push(pent, 0, 36);           // ペントハウス(機械室)
  const unit = new THREE.BoxGeometry(0.2, 0.09, 0.18).translate(-0.22, 0.54, -0.2).toNonIndexed();
  push(unit, 0, 36);           // 空調ユニット
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(out.pos, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(out.nor, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(out.uv, 2));
  geo.addGroup(0, sideCount, 0);                              // ファサード
  geo.addGroup(sideCount, out.pos.length / 3 - sideCount, 1); // 屋上まわり
  return geo;
}

// 空間ハッシュのセル座標とキー(登録側・検索側で必ずこれを使う)
const cellOf = v => Math.floor((v + MAP_HALF) / GRID_CELL);
const cellKey = (cx, cz) => cx * 4096 + cz;
function gridKey(x, z){ return cellKey(cellOf(x), cellOf(z)); }
function hashInsert(hash, x, z, obj){
  const k = gridKey(x, z);
  if(!hash.has(k)) hash.set(k, []);
  hash.get(k).push(obj);
}
// (x,z)を中心に半径rのセル範囲を走査し、各要素にfnを呼ぶ(距離判定はfn側で行う)
function forEachNear(hash, x, z, r, fn){
  const c0x = cellOf(x - r), c1x = cellOf(x + r);
  const c0z = cellOf(z - r), c1z = cellOf(z + r);
  for(let cx = c0x; cx <= c1x; cx++) for(let cz = c0z; cz <= c1z; cz++){
    const cell = hash.get(cellKey(cx, cz));
    if(cell) for(const o of cell) fn(o);
  }
}

// ---------- 道路パス(任意形状の道路をポリラインで統一的に扱う) ----------
const ROAD_STEP = 20;    // パス上の点の間隔(m)

// 粗い点列を等間隔ROAD_STEPに打ち直す
function resamplePath(raw, loop){
  const pts = [{ x: raw[0].x, z: raw[0].z }];
  const src = loop ? raw.concat([raw[0]]) : raw;
  let prev = src[0], acc = 0;
  for(let i = 1; i < src.length; i++){
    const cur = src[i];
    let dx = cur.x - prev.x, dz = cur.z - prev.z;
    let segLen = Math.hypot(dx, dz);
    while(segLen > 0 && acc + segLen >= ROAD_STEP){
      const t = (ROAD_STEP - acc) / segLen;
      prev = { x: prev.x + dx * t, z: prev.z + dz * t };
      pts.push({ x: prev.x, z: prev.z });
      dx = cur.x - prev.x; dz = cur.z - prev.z;
      segLen = Math.hypot(dx, dz);
      acc = 0;
    }
    acc += segLen;
    prev = cur;
  }
  return pts;
}

// パス上の距離sにおける位置と進行方向(h/hs/dx/dzはbakeRoadHeightsで事前計算済み)。
// 戻り値は共有スクラッチ(毎フレーム全車で呼ぶためアロケーションしない)。呼び出しをまたいで保持しないこと
const _pose = { x: 0, z: 0, dx: 0, dz: 0, h: 0, hs: 0 };
function carPose(road, s){
  const n = road.pts.length;
  const maxS = (n - 1) * ROAD_STEP;
  s = ((s % maxS) + maxS) % maxS;
  const i = Math.min(n - 2, Math.floor(s / ROAD_STEP));
  const f = s / ROAD_STEP - i;
  const a = road.pts[i], b = road.pts[i + 1];
  _pose.x = a.x + (b.x - a.x) * f; _pose.z = a.z + (b.z - a.z) * f;
  _pose.dx = a.dx; _pose.dz = a.dz;
  _pose.h = a.h + (b.h - a.h) * f; _pose.hs = a.hs + (b.hs - a.hs) * f;
  return _pose;
}

// 道路点ごとの路面高・横断勾配・進行方向を事前計算(updateCarsの毎フレームterrainH/hypot呼び出しを排除)
function bakeRoadHeights(){
  for(const rp of roadPaths){
    const n = rp.pts.length, w2 = rp.w / 2;
    for(let i = 0; i < n; i++){
      const p = rp.pts[i];
      let dx, dz;
      if(i + 1 < n){ dx = rp.pts[i + 1].x - p.x; dz = rp.pts[i + 1].z - p.z; }
      else if(rp.loop){ dx = rp.pts[0].x - p.x; dz = rp.pts[0].z - p.z; }
      else { dx = p.x - rp.pts[i - 1].x; dz = p.z - rp.pts[i - 1].z; }   // 終端は手前の区間の向きを使う
      const l = Math.hypot(dx, dz) || 1;
      p.dx = dx / l; p.dz = dz / l;
      p.h = terrainH(p.x, p.z);
      // 進行方向の横(レーンオフセットと同じ向き)に道路半幅ぶん離れた点との高低差
      p.hs = (terrainH(p.x + p.dz * w2, p.z - p.dx * w2) - p.h) / w2;
    }
  }
}

// 道路上かどうかの粗い判定マスク(並木を交差点上に植えないため)
const MASK_CELL = 20;
let roadMask = new Set();
const maskCellOf = v => Math.round((v + MAP_HALF) / MASK_CELL);
const maskKey = (cx, cz) => cx * 8192 + cz;
function buildRoadMask(){
  roadMask = new Set();
  for(const rp of roadPaths){
    const rad = Math.max(0, Math.floor((rp.w / 2 - 6) / MASK_CELL));
    for(const p of rp.pts){
      const cx = maskCellOf(p.x), cz = maskCellOf(p.z);
      for(let ax = -rad; ax <= rad; ax++)
        for(let az = -rad; az <= rad; az++)
          roadMask.add(maskKey(cx + ax, cz + az));
    }
  }
}
function onRoad(x, z){
  return roadMask.has(maskKey(maskCellOf(x), maskCellOf(z)));
}

function genRoadLines(rng){
  const lines = [{ c: -CITY_HALF, w: 30, major: true }];
  let c = -CITY_HALF;
  while(true){
    c += 130 + rng() * 150;
    if(c > CITY_HALF - 80) break;
    const major = rng() < 0.22;
    lines.push({ c, w: major ? 32 : 18, major });
  }
  lines.push({ c: CITY_HALF, w: 30, major: true });
  return lines;
}

// ロットの縁(建物の隙間)に木を植える。anywhereなら区画全体に
function yardTrees(lot, n, rng, anywhere){
  const cosr = Math.cos(lot.rot), sinr = Math.sin(lot.rot);
  for(let k = 0; k < n; k++){
    let lx, lz;
    if(anywhere){
      lx = (rng() - 0.5) * (lot.availW - 5);
      lz = (rng() - 0.5) * (lot.availD - 5);
    } else if(rng() < 0.5){
      lx = (rng() < 0.5 ? -1 : 1) * (lot.availW / 2 - 2.5);
      lz = (rng() - 0.5) * (lot.availD - 5);
    } else {
      lz = (rng() < 0.5 ? -1 : 1) * (lot.availD / 2 - 2.5);
      lx = (rng() - 0.5) * (lot.availW - 5);
    }
    const x = lot.x + lx * cosr + lz * sinr;
    const z = lot.z - lx * sinr + lz * cosr;
    if(!inMap(x, z, PLACE_LOT)) continue;
    pushTree(x, z, 4.5 + rng() * 4, rng);
  }
}

// 空き区画をポケットパーク(緑地デカール + 密植)にする
function makePocketPark(lot, rng, minWD, minTrees){
  lotDecals.push({ x: lot.x, z: lot.z, rot: lot.rot,
    w: Math.max(minWD, lot.availW - 3), d: Math.max(minWD, lot.availD - 3), kind: 'park' });
  yardTrees(lot, Math.min(45, Math.max(minTrees, Math.floor(lot.availW * lot.availD / 55))), rng, true);
}

// 建物レコードの共通部分(接地高さ・初期状態)を埋めて登録する
function pushBuilding(x, z, sx, sz, h, rot, k, value, color){
  buildings.push({ x, z, gy: groundLevel(x, z, sx, sz), sx, sz, h, rot, k, value, color, state: 0 });
}
// パレットから1色選び、色相dh・明度dlの幅でジッタをかける(dh=0なら色相のrngは消費しない)
function palColor(pal, rng, dh, dl){
  return new THREE.Color(pick(pal, rng)).offsetHSL(dh ? (rng() - 0.5) * dh : 0, 0, (rng() - 0.5) * dl);
}

// プラン生成器が出したロット {x,z,rot,availW,availD,distC,house} を建物にする
function addBuildingLot(lot, rng){
  const { x, z, rot, availW, availD, distC } = lot;
  if(!inMap(x, z, PLACE_LOT)) return;
  if(cornerBlocked(x, z)) return;                        // 山腹・川べりには建てない
  if(lot.house){
    if(rng() < 0.14){                                    // 空き地 → 児童公園(緑地 + 密な木)
      makePocketPark(lot, rng, 7, 4);
      return;
    }
    if(rng() < 0.05){                                    // 低層アパート
      const sx = Math.max(8, availW - 4), sz = Math.max(8, availD - 4);
      const h = 9 + rng() * 15;
      pushBuilding(x, z, sx, sz, h, rot, 0, floorValue(sx, sz, h), palColor(PAL_CON, rng, 0, 0.1));
    } else {
      const m = 2.5 + rng() * 2;
      const sx = Math.min(12, Math.max(5.5, availW - m * 2));
      const sz = Math.min(12, Math.max(5.5, availD - m * 2));
      const h = 4.5 + rng() * 3.2;
      pushBuilding(x, z, sx, sz, h,
        rot + (rng() < 0.5 ? 0 : Math.PI / 2) + (rng() - 0.5) * 0.09,
        HOUSE_K0 + Math.floor(rng() * ROOF_COLS.length),
        sx * sz * HOUSE_FLOORS * HOUSE_VALUE_PER_M2_FLOOR,
        palColor(PAL_HOU, rng, 0.03, 0.09));
      if(rng() < 0.55) yardTrees(lot, 1 + Math.floor(rng() * 2), rng);  // 庭木
    }
  } else {
    if(rng() < 0.11){                                    // 空地: 駐車場かポケットパーク
      if(rng() < 0.30){
        lotDecals.push({ x, z, rot, w: Math.max(8, availW - 4), d: Math.max(8, availD - 4), kind: 'parking' });
      } else {
        // ビルの隙間の小公園: 緑地 + 森のような植栽
        makePocketPark(lot, rng, 8, 6);
      }
      return;
    }
    const m = 2 + rng() * 3;
    const sx = Math.max(9, Math.min(availW * 0.92, availW - m * 2));
    const sz = Math.max(9, Math.min(availD * 0.92, availD - m * 2));
    const urban = Math.pow(Math.max(0, 1 - distC), 2);
    let h = 10 + Math.pow(rng(), 2.2) * (24 + 300 * urban);
    if(distC < 0.22 && rng() < 0.35) h = 90 + rng() * 190;   // 都心の超高層
    h = Math.min(h, 300);
    const glass = rng() < (h > 55 ? 0.6 : 0.12);         // 高層はガラス張りが多い
    pushBuilding(x, z, sx, sz, h, rot, glass ? 1 : 0, floorValue(sx, sz, h),
      palColor(glass ? PAL_GLA : PAL_CON, rng, 0, 0.1));
    if(rng() < 0.4) yardTrees(lot, 1 + Math.floor(rng() * 2), rng);   // 敷地内の植栽
  }
}

// 都心距離distC(CITY_HALF比)から住宅街になるかを決める。境界はシード乱数で揺らぐ
function isHouseZone(distC, rng){
  return distC > cityHouseTh + (rng() - 0.5) * 0.14;
}

// ---------- 都市プラン: 碁盤目 / 有機的(ワープした碁盤目) ----------
function genGridPlan(rng, organic){
  // なめらかな変位場で格子全体を歪ませると、曲がった道路と不定形の街区になる
  const WN = 9;
  const wgx = new Float32Array(WN * WN), wgz = new Float32Array(WN * WN);
  for(let i = 0; i < WN * WN; i++){ wgx[i] = rng(); wgz[i] = rng(); }
  const amp = organic ? 110 + rng() * 130 : 0;
  const warp = (u, v) => {
    if(!amp) return { x: u, z: v };
    const fade = THREE.MathUtils.clamp(1 - (Math.max(Math.abs(u), Math.abs(v)) - 2200) / 300, 0, 1);
    const gu = (u + 3200) / 6400 * (WN - 1), gv = (v + 3200) / 6400 * (WN - 1);
    return { x: u + (gridSample(wgx, WN, gu, gv) - 0.5) * 2 * amp * fade,
             z: v + (gridSample(wgz, WN, gu, gv) - 0.5) * 2 * amp * fade };
  };
  const linesU = genRoadLines(rng), linesV = genRoadLines(rng);
  for(const l of linesU){
    const raw = [];
    for(let v = -CITY_HALF; v <= CITY_HALF + 1; v += 50) raw.push(warp(l.c, v));
    roadPaths.push({ pts: resamplePath(raw, false), w: l.w, major: l.major, loop: false });
  }
  for(const l of linesV){
    const raw = [];
    for(let u = -CITY_HALF; u <= CITY_HALF + 1; u += 50) raw.push(warp(u, l.c));
    roadPaths.push({ pts: resamplePath(raw, false), w: l.w, major: l.major, loop: false });
  }
  // 街区
  for(let i = 0; i < linesU.length - 1; i++){
    for(let j = 0; j < linesV.length - 1; j++){
      const u0 = linesU[i].c + linesU[i].w / 2, u1 = linesU[i + 1].c - linesU[i + 1].w / 2;
      const v0 = linesV[j].c + linesV[j].w / 2, v1 = linesV[j + 1].c - linesV[j + 1].w / 2;
      if(u1 - u0 < 24 || v1 - v0 < 24) continue;
      const wc = warp((u0 + u1) / 2, (v0 + v1) / 2);
      const distC = Math.hypot(wc.x - cityCore.x, wc.z - cityCore.z) / CITY_HALF;
      const park = rng() < 0.03;
      const house = !park && isHouseZone(distC, rng);
      const w = u1 - u0 - 10, d = v1 - v0 - 10;
      // 塗り用ポリゴン(縁を分割してからワープすると曲線に沿う)
      const poly = [], step = 45;
      for(let u = u0; u < u1; u += step) poly.push(warp(u, v0));
      for(let v = v0; v < v1; v += step) poly.push(warp(u1, v));
      for(let u = u1; u > u0; u -= step) poly.push(warp(u, v1));
      for(let v = v1; v > v0; v -= step) poly.push(warp(u0, v));
      groundPolys.push({ pts: poly, kind: park ? 'park' : house ? 'house' : 'block', v: rng() < 0.5 });
      if(park){
        parkTreeJobs.push({ n: Math.min(220, Math.max(30, Math.floor((u1 - u0) * (v1 - v0) / 110))),
          sample: () => warp(u0 + 8 + rng() * (u1 - u0 - 16), v0 + 8 + rng() * (v1 - v0 - 16)) });
        continue;
      }
      // ロット分割
      const nx = Math.max(1, house ? Math.floor(w / (15 + rng() * 6)) : Math.min(4, Math.floor(w / (26 + rng() * 26))));
      const nz = Math.max(1, house ? Math.floor(d / (15 + rng() * 6)) : Math.min(4, Math.floor(d / (26 + rng() * 26))));
      const cw = w / nx, cd = d / nz;
      // ロット境界に沿った街区内の路地
      for(let ix = 1; ix < nx; ix++){
        const au = u0 + 5 + cw * ix, raw = [];
        for(let v = v0 + 4; v <= v1 - 4; v += 40) raw.push(warp(au, v));
        raw.push(warp(au, v1 - 4));
        alleyPaths.push({ pts: raw, w: house ? 4 : 5.5 });
      }
      for(let iz = 1; iz < nz; iz++){
        const av = v0 + 5 + cd * iz, raw = [];
        for(let u = u0 + 4; u <= u1 - 4; u += 40) raw.push(warp(u, av));
        raw.push(warp(u1 - 4, av));
        alleyPaths.push({ pts: raw, w: house ? 4 : 5.5 });
      }
      for(let ix = 0; ix < nx; ix++) for(let iz = 0; iz < nz; iz++){
        const cu = u0 + 5 + cw * ix + cw / 2, cv = v0 + 5 + cd * iz + cd / 2;
        const wp = warp(cu, cv);
        const we = warp(cu + 8, cv);
        const rot = Math.atan2(-(we.z - wp.z), we.x - wp.x);  // 局所的な格子の向きに沿わせる
        pendingLots.push({ x: wp.x, z: wp.z, rot, availW: cw, availD: cd, distC, house });
      }
    }
  }
}

// ---------- 都市プラン: 放射環状(環状道路 + 放射道路) ----------
function genRadialPlan(rng){
  // 中心は都心位置に追従(街が地図からはみ出さない範囲で)
  const cx = THREE.MathUtils.clamp(cityCore.x, -450, 450);
  const cz = THREE.MathUtils.clamp(cityCore.z, -450, 450);
  // 角度a0→a1をn分割した弧の点列(中心はプランの中心)。rFnは角度→半径。inclで終端を含む
  const arcPts = (rFn, a0, a1, n, incl = true) => {
    const pts = [];
    for(let k = 0; k < n + (incl ? 1 : 0); k++){
      const a = a0 + (a1 - a0) * k / n;
      pts.push({ x: cx + Math.cos(a) * rFn(a), z: cz + Math.sin(a) * rFn(a) });
    }
    return pts;
  };
  // 扇形街区のポリゴン(外周の弧 + 内周の弧の逆順)
  const fanPoly = (rOutFn, rIn, aA, aB, n) =>
    arcPts(rOutFn, aA, aB, n).concat(arcPts(() => rIn, aA, aB, n).reverse());
  const rEdge = CITY_HALF - Math.hypot(cx, cz);
  const rings = [];
  let r = 150 + rng() * 80;
  while(r < rEdge - 60){
    rings.push({ r, w: rng() < 0.3 ? 30 : 18, major: rng() < 0.35 || rings.length === 0 });
    r += 150 + rng() * 170;
  }
  const nSp = 10 + Math.floor(rng() * 8);
  const spokes = [];
  const a0 = rng() * Math.PI * 2;
  for(let k = 0; k < nSp; k++){
    spokes.push({ a: a0 + (k / nSp) * Math.PI * 2 + (rng() - 0.5) * 0.16,
      w: rng() < 0.3 ? 30 : 18, major: rng() < 0.35 });
  }
  spokes.sort((p, q) => p.a - q.a);
  for(const g of rings){
    const n = Math.max(24, Math.round(g.r * 2 * Math.PI / 45));
    const raw = arcPts(() => g.r, 0, Math.PI * 2, n, false);
    roadPaths.push({ pts: resamplePath(raw, true), w: g.w, major: g.major, loop: true });
  }
  // 中心から角度aの方向に、地図の四角い縁(少し内側)までの距離
  const EDGE = CITY_HALF - 20;
  const edgeDist = (a) => {
    const ca = Math.cos(a), sa = Math.sin(a);
    let d = Infinity;
    if(ca > 1e-6) d = Math.min(d, (EDGE - cx) / ca);
    if(ca < -1e-6) d = Math.min(d, (-EDGE - cx) / ca);
    if(sa > 1e-6) d = Math.min(d, (EDGE - cz) / sa);
    if(sa < -1e-6) d = Math.min(d, (-EDGE - cz) / sa);
    return d;
  };
  const rMin = rings[0].r;
  for(const sp of spokes){
    const raw = [
      { x: cx + Math.cos(sp.a) * rMin * 0.55, z: cz + Math.sin(sp.a) * rMin * 0.55 },
      { x: cx + Math.cos(sp.a) * (edgeDist(sp.a) - 20), z: cz + Math.sin(sp.a) * (edgeDist(sp.a) - 20) }];
    roadPaths.push({ pts: resamplePath(raw, false), w: sp.w, major: sp.major, loop: false });
  }
  // 中央広場は公園
  groundPolys.push({ pts: arcPts(() => rMin - 12, 0, Math.PI * 2, 40, false), kind: 'park' });
  parkTreeJobs.push({
    n: Math.min(260, Math.floor(Math.PI * (rMin - 25) * (rMin - 25) / 130)),
    sample: () => {
      const a = rng() * Math.PI * 2, rr = Math.sqrt(rng()) * (rMin - 25);
      return { x: cx + Math.cos(a) * rr, z: cz + Math.sin(a) * rr };
    }});
  // 街区: リング帯 × スポーク区間の扇形。最外帯は地図の縁まで埋める
  for(let ri = 0; ri < rings.length; ri++){
    const outer = ri === rings.length - 1;
    const rIn = rings[ri].r + rings[ri].w / 2 + 5;
    const rOutBand = outer ? 0 : rings[ri + 1].r - rings[ri + 1].w / 2 - 5;
    if(!outer && rOutBand - rIn < 26) continue;
    const rm = outer ? rIn + 150 : (rIn + rOutBand) / 2;
    for(let si = 0; si < spokes.length; si++){
      const s0 = spokes[si], s1 = spokes[(si + 1) % spokes.length];
      const gap = (si === spokes.length - 1 ? s1.a + Math.PI * 2 : s1.a) - s0.a;
      const aA = s0.a + (s0.w / 2 + 5) / rm;
      const aB = s0.a + gap - (s1.w / 2 + 5) / rm;
      if(aB - aA < 24 / rm) continue;

      if(outer){
        // --- 最外帯: 角度列ごとに地図の縁までロットを敷き詰める ---
        const rO = (a) => edgeDist(a) - 14;
        const rOutMid = rO((aA + aB) / 2);
        if(rOutMid - rIn < 26) continue;
        const rmO = (rIn + rOutMid) / 2;
        const houseO = isHouseZone(rmO / CITY_HALF, rng);
        const nA = Math.max(4, Math.round((aB - aA) * rOutMid / 40));
        groundPolys.push({ pts: fanPoly(rO, rIn, aA, aB, nA), kind: houseO ? 'house' : 'block', v: rng() < 0.5 });
        // 半径方向に帯を刻み、帯ごとに角度列を切り直す(外周ほど区画が広がりすぎないように)
        let r0 = rIn;
        while(rOutMid - r0 >= 26){
          const r1 = Math.min(rOutMid, r0 + (houseO ? 110 + rng() * 70 : 150 + rng() * 100));
          const last = rOutMid - r1 < 26;               // 端数は最後の帯に吸収
          const rB = last ? rOutMid : r1;
          if(r0 > rIn){                                  // 帯境界の弧の路地(地図の縁は超えない)
            const nA2 = Math.max(4, Math.round((aB - aA) * r0 / 30));
            alleyPaths.push({ pts: arcPts(a => Math.min(r0, rO(a) - 3), aA, aB, nA2), w: 5 });
          }
          const lotW = houseO ? 16 + rng() * 5 : 30 + rng() * 20;
          const nt = Math.max(1, Math.floor((aB - aA) * ((r0 + rB) / 2) / lotW));
          for(let it = 0; it < nt; it++){
            const ac = aA + (aB - aA) * ((it + 0.5) / nt);
            if(it > 0){                                  // 列境界の路地
              const ab = aA + (aB - aA) * it / nt;
              const rt = Math.min(rB, rO(ab)) - 3;
              if(rt - r0 > 8) alleyPaths.push({ pts: [
                { x: cx + Math.cos(ab) * (r0 + 3), z: cz + Math.sin(ab) * (r0 + 3) },
                { x: cx + Math.cos(ab) * rt, z: cz + Math.sin(ab) * rt }], w: 5 });
            }
            const rTop = last ? rO(ac) - 6 : Math.min(rB - 3, rO(ac) - 6);
            const depth = rTop - r0 - 3;
            if(depth < 16) continue;
            const lotD = houseO ? 16 + rng() * 5 : 30 + rng() * 20;
            const nrL = Math.max(1, Math.floor(depth / lotD));
            const cdl = depth / nrL;
            for(let jr = 0; jr < nrL; jr++){
              const rc = r0 + 3 + cdl * jr + cdl / 2;
              pendingLots.push({ x: cx + Math.cos(ac) * rc, z: cz + Math.sin(ac) * rc,
                rot: Math.atan2(-Math.cos(ac), -Math.sin(ac)),
                availW: (aB - aA) * rc / nt, availD: cdl,
                distC: rc / CITY_HALF, house: houseO });
            }
          }
          if(last) break;
          r0 = r1;
        }
        continue;
      }

      const rOut = rOutBand;
      const distC = rm / CITY_HALF;
      const park = rng() < 0.025;
      const house = !park && isHouseZone(distC, rng);
      const depth = rOut - rIn - 8;
      const nA = Math.max(4, Math.round((aB - aA) * rOut / 40));
      groundPolys.push({ pts: fanPoly(() => rOut, rIn, aA, aB, nA),
        kind: park ? 'park' : house ? 'house' : 'block', v: rng() < 0.5 });
      if(park){
        parkTreeJobs.push({ n: Math.min(200, Math.max(30, Math.floor((rOut - rIn) * (aB - aA) * rm / 110))),
          sample: () => { const a = aA + rng() * (aB - aA), rr = rIn + 8 + rng() * (rOut - rIn - 16);
            return { x: cx + Math.cos(a) * rr, z: cz + Math.sin(a) * rr }; } });
        continue;
      }
      // ロット分割(半径方向 × 角度方向)
      const nr = Math.max(1, house ? Math.floor(depth / (15 + rng() * 6)) : Math.min(3, Math.floor(depth / (28 + rng() * 22))));
      const cd = depth / nr;
      // 街区内の路地(同心円の弧 + 放射方向)
      for(let jr = 1; jr < nr; jr++){
        const rb = rIn + 4 + cd * jr;
        const nA2 = Math.max(4, Math.round((aB - aA) * rb / 30));
        alleyPaths.push({ pts: arcPts(() => rb, aA, aB, nA2), w: 5 });
      }
      const ntAl = Math.max(1, Math.floor((aB - aA) * rm / 30));
      for(let it = 1; it < ntAl; it++){
        const ab = aA + (aB - aA) * it / ntAl;
        alleyPaths.push({ pts: [
          { x: cx + Math.cos(ab) * (rIn + 3), z: cz + Math.sin(ab) * (rIn + 3) },
          { x: cx + Math.cos(ab) * (rOut - 3), z: cz + Math.sin(ab) * (rOut - 3) }], w: 5 });
      }
      for(let jr = 0; jr < nr; jr++){
        const rc = rIn + 4 + cd * jr + cd / 2;
        const arc = (aB - aA) * rc;
        const nt = Math.max(1, house ? Math.floor(arc / (15 + rng() * 6)) : Math.min(5, Math.floor(arc / (26 + rng() * 26))));
        const cwA = arc / nt;
        for(let it = 0; it < nt; it++){
          const ac = aA + (aB - aA) * ((it + 0.5) / nt);
          const x = cx + Math.cos(ac) * rc, z = cz + Math.sin(ac) * rc;
          const rot = Math.atan2(-Math.cos(ac), -Math.sin(ac));  // 接線(リング)方向に沿わせる
          pendingLots.push({ x, z, rot, availW: cwA, availD: cd, distC, house });
        }
      }
    }
  }
}

function generateCity(seedStr){
  // 旧オブジェクト破棄
  cityGroup.traverse(o => { if(o.geometry) o.geometry.dispose(); if(o.material){ (Array.isArray(o.material) ? o.material : [o.material]).forEach(m => { if(m.map) m.map.dispose(); if(m.emissiveMap) m.emissiveMap.dispose(); m.dispose(); }); } });
  scene.remove(cityGroup);
  cityGroup = new THREE.Group();
  scene.add(cityGroup);
  buildings = []; cars = []; trees = []; grid = new Map(); treeGrid = new Map();
  roadPaths = []; groundPolys = []; alleyPaths = []; lotDecals = [];
  pendingLots = []; parkTreeJobs = [];
  for(const m of missiles) removeMissile(m);
  for(const f of fx) releaseFx(f);
  for(const L of boomLights) L.intensity = 0;
  for(const L of nukeLights) L.intensity = 0;
  missiles.length = 0; fx.length = 0; collapsing.length = 0;
  delayedBooms.length = 0; burnSites.length = 0; burningBldgs.length = 0;
  nukeEmitters.length = 0;
  const nfEl = $('nukeFlash');
  nfEl.style.transition = 'none'; nfEl.style.opacity = '0';
  clearDebris();
  // 焦げ跡は実体が旧cityGroupと一緒に破棄済みなので追跡用リストだけ空にする
  scorchList.length = 0; scorchPending.clear();
  scorchBatches.length = 0; scorchBakedCount = 0;
  deadLots.length = 0; deadLotsDrawn = 0;      // 基礎跡・クレーター(テクスチャはdrawGroundが描き直す)
  craters.length = 0; cratersDrawn = 0; groundStampAt = 0;
  for(const L of boomLights) L.intensity = 0;
  fireP.clear(); smokeP.clear();
  stats.bDead = 0; stats.cDead = 0; stats.tDead = 0; stats.mCount = 0; stats.damage = 0; stats.shown = 0;

  const rng = mulberry32(xfnv1a(seedStr));
  // 都心の位置と住宅街の比率もシードで揺らす
  const coreA = rng() * Math.PI * 2, coreR = rng() * 900;
  cityCore = { x: Math.cos(coreA) * coreR, z: Math.sin(coreA) * coreR };
  cityHouseTh = 0.53 + rng() * 0.2;   // 0.53(住宅多め) 〜 0.73(ビル多め)
  // 四隅は山か湾、四辺は1辺全体の山脈か水辺に(それ以外は平地)
  cornerFeats = [];
  const corners = [[-1, -1], [1, -1], [-1, 1], [1, 1]];
  for(const [sx, sz] of corners){
    const roll = rng(), fr = rng(), fp = rng(), ph = rng() * Math.PI * 2;
    let cand = null;
    if(roll < 0.34){
      cand = { type: 'm', kind: 'disc', x: sx * CITY_HALF, z: sz * CITY_HALF,
        r: 1100 + fr * 650, amp: 170 + fp * 260 };
    } else if(roll < 0.67){
      cand = { type: 'r', kind: 'disc', x: sx * CITY_HALF, z: sz * CITY_HALF,
        r: 700 + fr * 600, wig: 30 + fp * 50, ph };
    }
    if(cand && !featConflicts(cand)) cornerFeats.push(cand);   // 山と水は重ねない
  }
  const edges = [['z', -1], ['z', 1], ['x', -1], ['x', 1]];   // [軸, どちらの縁か]
  for(const [axis, side] of edges){
    const roll = rng(), fr = rng(), fp = rng(), ph = rng() * Math.PI * 2;
    let cand = null;
    if(roll < 0.22){
      cand = { type: 'm', kind: 'band', axis, side,
        depth: 500 + fr * 450, amp: 170 + fp * 260 };
    } else if(roll < 0.44){
      cand = { type: 'r', kind: 'band', axis, side,
        off: 230 + fr * 300, wig: 30 + fp * 50, ph };
    }
    if(cand && !featConflicts(cand)) cornerFeats.push(cand);
  }
  buildTerrain(rng);               // 起伏もシードで決まる

  // --- 都市プランをシードで選ぶ ---
  const roll = rng();
  cityPlan = roll < 0.34 ? 'grid' : roll < 0.67 ? 'organic' : 'radial';
  if(cityPlan === 'radial') genRadialPlan(rng);
  else genGridPlan(rng, cityPlan === 'organic');
  cullMountainRoads();     // 山にかかった道路・路地は消して森にする
  cullMountainAlleys();

  // --- 地面の質感ノイズ(シードで固定) ---
  noiseCanvas = document.createElement('canvas');
  noiseCanvas.width = noiseCanvas.height = 512;
  const nc = noiseCanvas.getContext('2d');
  for(let i = 0; i < 9000; i++){
    nc.fillStyle = rng() < 0.55
      ? `rgba(0,0,0,${(0.04 + rng() * 0.1).toFixed(3)})`
      : `rgba(255,255,255,${(0.03 + rng() * 0.05).toFixed(3)})`;
    nc.fillRect(rng() * 512, rng() * 512, 1 + rng() * 2.5, 1 + rng() * 2.5);
  }

  // --- 地面テクスチャ(時間帯切り替えで再描画するため drawGround に分離) ---
  if(!gCanvas){
    gCanvas = document.createElement('canvas');
    gCanvas.width = gCanvas.height = 2048;
    gCtx = gCanvas.getContext('2d');
  }
  gTex = new THREE.CanvasTexture(gCanvas);
  gTex.anisotropy = 8;
  const groundGeo = new THREE.PlaneGeometry(5400, 5400, 96, 96);
  groundGeo.rotateX(-Math.PI / 2);
  const gp = groundGeo.getAttribute('position');
  for(let i = 0; i < gp.count; i++) gp.setY(i, terrainH(gp.getX(i), gp.getZ(i)));
  groundGeo.computeVertexNormals();
  ground = new THREE.Mesh(groundGeo, new THREE.MeshLambertMaterial({ map: gTex }));
  ground.castShadow = ground.receiveShadow = true;   // castは山が街に落とす影のため
  cityGroup.add(ground);
  buildWaterSurface();   // 川があればアニメーションする水面を重ねる

  // --- 建物・民家(プラン生成が出したロットから) ---
  for(const lot of pendingLots) addBuildingLot(lot, rng);
  drawGround();   // ポケットパーク等の区画装飾はロット生成で決まるため、この後に描く
  // 種類別メッシュ内の番号を採番
  const counts = new Array(HOUSE_K0 + ROOF_COLS.length).fill(0);
  for(const b of buildings) b.mi = counts[b.k]++;

  emissiveMats = [];
  const mkFacade = (t, eScale) => {
    const m = new THREE.MeshLambertMaterial({
      map: t.map, emissive: new THREE.Color(0xffc98a),
      emissiveMap: t.emissiveMap, emissiveIntensity: TIMES[timeMode].emissive * eScale });
    m.userData.eScale = eScale;
    emissiveMats.push(m);
    return m;
  };
  const conMat = mkFacade(makeConcreteTexture(rng), 1);
  const glaMat = mkFacade(makeGlassTexture(rng), 1.2);
  const houMat = mkFacade(makeHouseTexture(rng), 0.8);
  const roofTopMat = new THREE.MeshLambertMaterial({ color: 0x484c53 });
  const towerGeo = makeTowerGeometry();
  const houseGeo = makeHouseGeometry();
  bMeshes = [
    new THREE.InstancedMesh(towerGeo, [conMat, roofTopMat], counts[0]),
    new THREE.InstancedMesh(towerGeo, [glaMat, roofTopMat], counts[1]),
    ...ROOF_COLS.map((c, ri) => new THREE.InstancedMesh(houseGeo,
      [houMat, new THREE.MeshLambertMaterial({ color: c })], counts[HOUSE_K0 + ri])),
  ];
  for(const m of bMeshes) m.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  for(const b of buildings){
    setBuildingMatrix(b, 1, 0, 0);
    bMeshes[b.k].setColorAt(b.mi, b.color);
    hashInsert(grid, b.x, b.z, b);
  }
  for(let t = 0; t < bMeshes.length; t++){
    if(counts[t]) bMeshes[t].instanceColor.needsUpdate = true;
    bMeshes[t].castShadow = bMeshes[t].receiveShadow = true;
    cityGroup.add(bMeshes[t]);
  }

  // --- 車(道路パスに沿って走る) ---
  bakeRoadHeights();
  const carColors = [0xd0d3d8, 0x30343c, 0xa33a2e, 0x3a5d8f, 0xc2b26a, 0x777d88];
  const N_CARS = 5000;
  for(let i = 0; i < N_CARS; i++){
    const ri = Math.floor(rng() * roadPaths.length);
    const rp = roadPaths[ri];
    const dir = rng() < 0.5 ? 1 : -1;
    cars.push({
      road: ri, dir,
      lane: dir * (rp.w / 2 - 4 - rng() * (rp.major ? 6 : 1)),
      s: rng() * (rp.pts.length - 1) * ROAD_STEP,
      speed: 9 + rng() * 12, alive: true, i,
      color: new THREE.Color(pick(carColors, rng))
    });
  }
  movingCars = cars.length;
  // 駐車場の停車中の車(動かない)。区画のローカル座標で列に並べる
  for(const dcl of lotDecals){
    if(dcl.kind !== 'parking') continue;
    const cosr = Math.cos(dcl.rot), sinr = Math.sin(dcl.rot);
    for(let lz = -dcl.d / 2 + 3.2; lz <= dcl.d / 2 - 3.2; lz += 11){    // 列: 枠5.5 + 通路
      for(let lx = -dcl.w / 2 + 2; lx <= dcl.w / 2 - 2; lx += 3.4){     // 枠のピッチ
        if(rng() < 0.45) continue;                                      // 空き枠
        const x = dcl.x + lx * cosr + lz * sinr;
        const z = dcl.z - lx * sinr + lz * cosr;
        cars.push({ parked: true, alive: true, i: cars.length, px: x, pz: z,
          rot: dcl.rot + Math.PI / 2, y: terrainH(x, z) + 1,
          color: new THREE.Color(pick(carColors, rng)) });
      }
    }
  }
  carMesh = new THREE.InstancedMesh(
    new THREE.BoxGeometry(4.6, 2, 2.2),
    new THREE.MeshLambertMaterial({ color: 0xffffff }), cars.length);
  carMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  for(const c of cars){
    carMesh.setColorAt(c.i, c.color);
    if(c.parked)                        // 停車中の車は行列を一度だけ焼き込む
      setInstanceAt(carMesh, c.i, c.px, c.y, c.pz, 0, c.rot, 0, 1, 1, 1);
  }
  carMesh.instanceColor.needsUpdate = true;
  carMesh.castShadow = carMesh.receiveShadow = true;
  cityGroup.add(carMesh);

  // --- 公園の木と並木(庭木はロット生成時に追加済み) ---
  for(const job of parkTreeJobs){
    for(let k = 0; k < job.n; k++){
      const pt = job.sample();
      pushTree(pt.x, pt.z, 6.5 + rng() * 7, rng);
    }
  }
  buildRoadMask();
  for(const rp of roadPaths){
    let spacing, skip;
    if(rp.major){ spacing = 24; skip = 0.15; }
    else if(rng() < 0.45){ spacing = 46; skip = 0.35; }  // 生活道路にもまばらに
    else continue;
    const total = (rp.pts.length - 1) * ROAD_STEP;
    for(let sd = 30; sd < total - 30; sd += spacing + rng() * 14){
      if(rng() < skip) continue;
      const p = carPose(rp, sd);
      const off = rp.w / 2 + 3.5;
      for(const sgn of [1, -1]){
        const tx = p.x + p.dz * off * sgn, tz = p.z - p.dx * off * sgn;
        if(!inMap(tx, tz, PLACE_TREE) || onRoad(tx, tz)) continue;  // 交差点上には植えない
        pushTree(tx, tz, 6 + rng() * 4, rng);
      }
    }
  }
  // 山は公園以上の密度の森に覆われる(山裾は民家と重ならないよう減衰)。
  // sample()は {x, z, tn} を返す(tn: 0=縁 1=内側の裾。山裾では密度を外側に向かって減衰させる)
  const plantForest = (target, sample) => {
    let placed = 0;
    for(let k = 0; k < target * 4 && placed < target; k++){
      const s = sample();
      if(s.tn > 0.72 && rng() > Math.pow(Math.max(0, 1 - (s.tn - 0.72) / 0.26), 2)) continue;
      if(!inMap(s.x, s.z, PLACE_FOREST) || onRoad(s.x, s.z)) continue;
      pushTree(s.x, s.z, 7 + rng() * 6.5, rng);
      placed++;
    }
  };
  for(const f of cornerFeats){
    if(f.type !== 'm') continue;
    if(f.kind === 'band'){
      // 1辺全体の山脈の森
      plantForest(Math.min(20000, Math.round(5300 * f.depth * 0.9 / 105)), () => {
        const t = -2650 + rng() * 5300;
        const du = rng() * f.depth * 0.95;
        const p = bandPt(f, t, du);
        return { x: p.x, z: p.z, tn: du / f.depth };
      });
      continue;
    }
    // 湾曲の山: 地図内に入る面積比を見積もってから植える
    let nIn = 0;
    for(let k = 0; k < 128; k++){
      const a = rng() * Math.PI * 2, rr = Math.sqrt(rng()) * f.r * 0.95;
      if(inMap(f.x + Math.cos(a) * rr, f.z + Math.sin(a) * rr, PLACE_FOREST)) nIn++;
    }
    plantForest(Math.min(20000, Math.round(Math.PI * f.r * f.r * (nIn / 128) / 105)), () => {
      const a = rng() * Math.PI * 2, rr = Math.sqrt(rng()) * f.r * 0.95;
      return { x: f.x + Math.cos(a) * rr, z: f.z + Math.sin(a) * rr, tn: rr / f.r };
    });
  }
  const TREE_TYPES = 4;
  // 樹種ごとの幹と葉の色(広葉樹 / 針葉樹 / ポプラ / ケヤキ)
  const trunkCols = [0x6b4f3a, 0x5a4634, 0x7d7060, 0x64503c];
  const trunkMats = trunkCols.map(c => new THREE.MeshLambertMaterial({ color: c }));
  const leafCols = [0x4c7a36, 0x2f5a33, 0x6b8f3c, 0x3f6d38];
  const leafMats = leafCols.map(c => new THREE.MeshLambertMaterial({ color: c }));
  const treeGeos = makeTreeGeometries();
  // 木は空間チャンク×樹種ごとのInstancedMeshに分ける。街全体で1メッシュだと
  // バウンディングスフィアが常に視錐台に入り数万本すべてが毎フレーム描画されるため、
  // チャンク単位のフラスタムカリングで画面外の木のGPU負荷を落とす
  const TREE_CHUNKS = 6;   // 6x6分割 = 900m角
  const chunkOf = v => Math.min(TREE_CHUNKS - 1, Math.max(0,
    Math.floor((v + MAP_HALF) * TREE_CHUNKS / (MAP_HALF * 2))));
  const treeGroups = new Map();   // チャンク×樹種のキー → 本数(採番時はカウンタとして再利用)
  for(const t of trees){
    t.ck = (chunkOf(t.x) * TREE_CHUNKS + chunkOf(t.z)) * TREE_TYPES + t.type;
    treeGroups.set(t.ck, (treeGroups.get(t.ck) || 0) + 1);
  }
  const chunkMeshes = new Map();
  for(const [ck, n] of treeGroups){
    const ty = ck % TREE_TYPES;
    const m = new THREE.InstancedMesh(treeGeos[ty], [trunkMats[ty], leafMats[ty]], n);
    m.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
    chunkMeshes.set(ck, m);
    treeGroups.set(ck, 0);
  }
  const tCol = new THREE.Color();
  for(const t of trees){
    t.mesh = chunkMeshes.get(t.ck);
    t.mi = treeGroups.get(t.ck);
    treeGroups.set(t.ck, t.mi + 1);
    t.gy = terrainH(t.x, t.z);
    setInstanceAt(t.mesh, t.mi, t.x, t.gy - 0.2, t.z, 0, rng() * Math.PI * 2, 0, t.s * t.w, t.s, t.s * t.w2);
    // 個体差: 色相・彩度・明度を広めに振る。針葉樹以外の約12%は紅葉(黄 / 橙 / 赤)の個体にする
    if(t.type !== 1 && rng() < 0.12){
      const a = rng();
      tCol.setRGB(...(a < 0.4 ? [1.9, 1.0, 0.35] : a < 0.75 ? [2.0, 0.72, 0.30] : [1.75, 0.5, 0.32]));
      tCol.offsetHSL((rng() - 0.5) * 0.04, 0, (rng() - 0.5) * 0.1);
    } else {
      tCol.setRGB(1, 1, 1).offsetHSL((rng() - 0.5) * 0.09, (rng() - 0.5) * 0.25, (rng() - 0.5) * 0.14 - 0.02);
    }
    t.mesh.setColorAt(t.mi, tCol);
    hashInsert(treeGrid, t.x, t.z, t);
  }
  treeMeshes = [...chunkMeshes.values()];
  for(const m of treeMeshes){
    m.instanceColor.needsUpdate = true;
    m.castShadow = m.receiveShadow = true;
    cityGroup.add(m);
  }

  stats.bTotal = buildings.length;
  stats.cTotal = cars.length;
  stats.tTotal = trees.length;
  $('planName').textContent =
    '都市プラン: ' + ({ grid: '碁盤目', organic: '有機的街路', radial: '放射環状' })[cityPlan];
  updateHUD();
}

// ---------- 川の水面(アニメーションするオーバーレイメッシュ) ----------
// タイル可能なさざ波テクスチャ(演出なので Math.random でよい)
function makeWaterTexture(){
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const x = c.getContext('2d');
  x.fillStyle = '#c8c8c8'; x.fillRect(0, 0, 256, 256);
  for(let i = 0; i < 220; i++){
    const cx = Math.random() * 256, cy = Math.random() * 256;
    const w = 16 + Math.random() * 46, h = 2 + Math.random() * 5;
    const rot = (Math.random() - 0.5) * 0.5;
    const style = Math.random() < 0.5
      ? `rgba(255,255,255,${(0.05 + Math.random() * 0.10).toFixed(3)})`
      : `rgba(60,72,84,${(0.04 + Math.random() * 0.08).toFixed(3)})`;
    // 3x3で同じ筋を描き、タイル境界を継ぎ目なしにする
    for(const dx of [-256, 0, 256]) for(const dy of [-256, 0, 256]){
      x.save();
      x.translate(cx + dx, cy + dy);
      x.rotate(rot);
      x.fillStyle = style;
      x.beginPath(); x.ellipse(0, 0, w / 2, h / 2, 0, 0, Math.PI * 2); x.fill();
      x.restore();
    }
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}
// 水域と同じ岸線から水面メッシュを作り、平坦化された水底(-12)の少し上に浮かべる
function buildWaterSurface(){
  waterMat = null; waterTex = null;
  const feats = cornerFeats.filter(f => f.type === 'r');
  if(!feats.length) return;
  waterTex = makeWaterTexture();
  waterTex.repeat.set(1 / 230, 1 / 230);
  // Phong+バンプで太陽のスペキュラをさざ波に沿ってきらめかせる(バンプはさざ波テクスチャを共用)
  const TG = TIMES[timeMode].ground;
  waterMat = new THREE.MeshPhongMaterial({
    color: TG.waterSurf, map: waterTex,
    bumpMap: waterTex, bumpScale: 3,
    specular: new THREE.Color(TG.waterSpec), shininess: TG.waterShine
  });
  const S = MAP_HALF, cl = v => THREE.MathUtils.clamp(v, -S, S);
  let li = 0;   // 川同士の重なりでZファイティングしないよう1枚ごとに高さをずらす
  for(const f of feats){
    const shape = new THREE.Shape();
    if(f.kind === 'band'){
      for(let t = -S; t <= S; t += 100){
        const p = bandPt(f, t, f.off - bandWig(f, t));
        t === -S ? shape.moveTo(p.x, -p.z) : shape.lineTo(p.x, -p.z);
      }
      const p1 = bandPt(f, S, -200), p0 = bandPt(f, -S, -200);
      shape.lineTo(p1.x, -p1.z); shape.lineTo(p0.x, -p0.z);
    } else {
      for(let i = 0; i <= 64; i++){
        const a = i / 64 * Math.PI * 2;
        const rr = f.r - discWig(f, a);
        const px = cl(f.x + Math.cos(a) * rr), pz = cl(f.z + Math.sin(a) * rr);
        i ? shape.lineTo(px, -pz) : shape.moveTo(px, -pz);
      }
    }
    const geo = new THREE.ShapeGeometry(shape);
    geo.rotateX(-Math.PI / 2);   // shapeの(x,-z)を世界の(x,z)へ。面は上向きになる
    const mesh = new THREE.Mesh(geo, waterMat);
    mesh.receiveShadow = true;   // 岸辺の建物・木の影が水面に落ちる
    mesh.position.y = -11.6 + 0.15 * li++;
    cityGroup.add(mesh);
  }
}

// 破壊の跡は起伏に完全に沿う地面テクスチャへ直接描き込む(3D残骸は斜面でz-fightする)。
// deadLots: 圧壊で消えた建物の基礎跡 / craters: 爆発で舗装が割れたクレーター
const deadLots = [];   // {x,z,sx,sz,rot}
const craters = [];    // {x,z,r,seed} 形はseedから再現するため時間帯の塗り直しでも変わらない
const FOUNDATION_STYLE = 'rgba(24,22,19,0.85)';
let deadLotsDrawn = 0, cratersDrawn = 0;   // gCanvasへ描き込み済みの件数
let groundStampAt = 0;                     // GPU転送の間引き用(連続爆撃で毎フレーム転送しない)
function stampFoundation(g, s, w2c, d){
  g.save();
  g.translate(w2c(d.x), w2c(d.z));
  g.rotate(-d.rot);
  g.fillRect(-d.sx / 2 * s, -d.sz / 2 * s, d.sx * s, d.sz * s);
  g.restore();
}
// 爆発クレーター: 地肌がのぞく不整形の穴 + 中心の深い穴。
// 焦げ跡デカールの中心はほぼ不透明の黒なので、その外側に見える大きさで描く
function stampCrater(g, s, w2c, G, c){
  const rand = mulberry32(c.seed), r = c.r * s;
  g.save();
  g.translate(w2c(c.x), w2c(c.z));
  // 半径の揺らぎを小さく・頂点を多めにして、星型ではなく丸みのある不整形の多角形にする
  const blob = rr => {
    const n = 12 + (rand() * 4 | 0), a0 = rand() * Math.PI * 2;
    g.beginPath();
    for(let i = 0; i < n; i++){
      const a = a0 + i / n * Math.PI * 2 + (rand() - 0.5) * 0.25;
      const rj = rr * (0.88 + rand() * 0.24);
      i ? g.lineTo(Math.cos(a) * rj, Math.sin(a) * rj) : g.moveTo(Math.cos(a) * rj, Math.sin(a) * rj);
    }
    g.closePath();
  };
  g.fillStyle = G.crater;            blob(r);        g.fill();
  g.fillStyle = 'rgba(10,9,8,0.55)'; blob(r * 0.45); g.fill();
  g.restore();
}
function addCrater(x, z, r){
  craters.push({ x, z, r, seed: (Math.random() * 2 ** 31) | 0 });
}
// 新しく増えた跡だけをテクスチャへ差分追記する(drawGroundの全再描画は重い)
function flushGroundStamps(){
  if((deadLotsDrawn >= deadLots.length && cratersDrawn >= craters.length) || simT < groundStampAt) return;
  groundStampAt = simT + 0.15;
  const TEX = 2048, WORLD = 5400, s = TEX / WORLD;
  const w2c = v => (v + WORLD / 2) * s;
  const G = TIMES[timeMode].ground;
  gCtx.fillStyle = FOUNDATION_STYLE;
  for(; deadLotsDrawn < deadLots.length; deadLotsDrawn++)
    stampFoundation(gCtx, s, w2c, deadLots[deadLotsDrawn]);
  for(; cratersDrawn < craters.length; cratersDrawn++)
    stampCrater(gCtx, s, w2c, G, craters[cratersDrawn]);
  gTex.needsUpdate = true;
}

// 地面テクスチャの描画(時間帯トグルで呼び直す)
function drawGround(){
  const TEX = 2048, WORLD = 5400, s = TEX / WORLD;
  const w2c = v => (v + WORLD / 2) * s;
  const G = TIMES[timeMode].ground, g = gCtx;
  // ポリラインをcanvasパスに起こす(塗り・道路・センターラインで共用)
  const trace = (pts, close) => {
    g.beginPath();
    pts.forEach((p, i) => i ? g.lineTo(w2c(p.x), w2c(p.z)) : g.moveTo(w2c(p.x), w2c(p.z)));
    if(close) g.closePath();
  };
  g.setLineDash([]);
  g.fillStyle = G.base; g.fillRect(0, 0, TEX, TEX);
  // 街区の塗り分け
  for(const poly of groundPolys){
    trace(poly.pts, true);
    g.fillStyle = poly.kind === 'park' ? G.park : poly.kind === 'house' ? G.house : (poly.v ? G.block1 : G.block2);
    g.fill();
  }
  // 質感ノイズを全体に重ねる
  if(noiseCanvas) g.drawImage(noiseCanvas, 0, 0, TEX, TEX);
  // 空き区画の装飾(駐車場 / ポケットパーク)
  for(const dcl of lotDecals){
    g.save();
    g.translate(w2c(dcl.x), w2c(dcl.z));
    g.rotate(-dcl.rot);
    g.fillStyle = dcl.kind === 'park' ? G.park : G.asphalt;
    g.fillRect(-dcl.w / 2 * s, -dcl.d / 2 * s, dcl.w * s, dcl.d * s);
    g.restore();
  }
  // 道路: 歩道の帯 → アスファルト → センターライン の順に重ねる
  const strokeRoad = (rp, width, style) => {
    g.strokeStyle = style; g.lineWidth = Math.max(1, width * s);
    g.lineJoin = 'round'; g.lineCap = 'round';
    trace(rp.pts, rp.loop);
    g.stroke();
  };
  for(const al of alleyPaths) strokeRoad(al, al.w, G.asphalt);   // 街区内の路地
  // 地形フィーチャ(山の緑 / 湾・水辺)。道路より先に描く
  // 川は全フィーチャの岸を先に、全フィーチャの水を後にまとめて描く。
  // 川同士が重なるとき、後描きの岸の帯が先描きの水面を横切って残らないようにするため
  const bankFills = [], waterFills = [];
  for(const f of cornerFeats){
    if(f.kind === 'band'){
      if(f.type === 'm'){
        // 1辺全体の山脈: 縁側は不透明、内側の裾でフェード
        const pe = bandPt(f, 0, -100), pi = bandPt(f, 0, f.depth);
        const grd = g.createLinearGradient(w2c(pe.x), w2c(pe.z), w2c(pi.x), w2c(pi.z));
        grd.addColorStop(0, G.mtn1);
        grd.addColorStop(0.78, G.mtn1);
        grd.addColorStop(1, G.mtn2);
        g.fillStyle = grd;
        const c0 = bandPt(f, -MAP_HALF, f.depth), c1 = bandPt(f, MAP_HALF, -200);
        g.fillRect(Math.min(w2c(c0.x), w2c(c1.x)), Math.min(w2c(c0.z), w2c(c1.z)),
          Math.abs(w2c(c1.x) - w2c(c0.x)), Math.abs(w2c(c1.z) - w2c(c0.z)));
      } else {
        // 1辺全体の水辺: 岸線は揺らぎ、縁側は全て水(対岸なし)
        const fillBand = (duFn, color) => {
          const pts = [];
          for(let t = -MAP_HALF; t <= MAP_HALF; t += 100) pts.push(bandPt(f, t, duFn(t)));
          pts.push(bandPt(f, MAP_HALF, -300), bandPt(f, -MAP_HALF, -300));
          trace(pts, true);
          g.fillStyle = color; g.fill();
        };
        bankFills.push(() => fillBand(t => f.off - bandWig(f, t) + 14, G.bank));
        waterFills.push(() => fillBand(t => f.off - bandWig(f, t), G.water));
      }
      continue;
    }
    const px = w2c(f.x), pz = w2c(f.z);
    if(f.type === 'm'){
      // 道路を削った跡が透けないよう、8割の半径までは完全不透明で塗る
      const grd = g.createRadialGradient(px, pz, f.r * 0.1 * s, px, pz, f.r * s);
      grd.addColorStop(0, G.mtn1);
      grd.addColorStop(0.78, G.mtn1);
      grd.addColorStop(1, G.mtn2);
      g.fillStyle = grd;
      g.beginPath(); g.arc(px, pz, f.r * s, 0, Math.PI * 2); g.fill();
    } else {
      // 湾: 揺らぐ岸線の内側が全て水(対岸なし)
      const fillBlob = (rFn, color) => {
        const pts = [];
        for(let i = 0; i <= 64; i++){
          const a = i / 64 * Math.PI * 2, rr = rFn(a);
          pts.push({ x: f.x + Math.cos(a) * rr, z: f.z + Math.sin(a) * rr });
        }
        trace(pts, true);
        g.fillStyle = color; g.fill();
      };
      bankFills.push(() => fillBlob(a => f.r - discWig(f, a) + 14, G.bank));
      waterFills.push(() => fillBlob(a => f.r - discWig(f, a), G.water));
    }
  }
  for(const d of bankFills) d();
  for(const d of waterFills) d();
  for(const rp of roadPaths) strokeRoad(rp, rp.w + 11, G.sidewalk);
  for(const rp of roadPaths) strokeRoad(rp, rp.w, G.asphalt);
  g.setLineDash([6, 8]);
  for(const rp of roadPaths) if(rp.major) strokeRoad(rp, 1 / s, G.lane);   // センターライン(1px)
  g.setLineDash([]);
  // 破壊済み建物の基礎跡と爆発クレーター(時間帯トグルの塗り直しでも復元する)
  g.fillStyle = FOUNDATION_STYLE;
  for(const d of deadLots) stampFoundation(g, s, w2c, d);
  deadLotsDrawn = deadLots.length;
  for(const c of craters) stampCrater(g, s, w2c, G, c);
  cratersDrawn = craters.length;
  gTex.needsUpdate = true;
}

// 倒壊: 基部の縁を支点に blast と反対側へ倒れる
const _tv = new THREE.Vector3();
const _tm1 = new THREE.Matrix4(), _tm2 = new THREE.Matrix4();
function toppleMatrix(b, ang, dirx, dirz){
  dummy.position.set(b.x, b.gy + b.h / 2 - 0.5, b.z);
  dummy.rotation.set(0, b.rot, 0);
  dummy.scale.set(b.sx, b.h, b.sz);
  dummy.updateMatrix();
  const ext = (Math.abs(dirx) * b.sx + Math.abs(dirz) * b.sz) / 2;
  const px = b.x + dirx * ext, py = b.gy, pz = b.z + dirz * ext;
  _tv.set(dirz, 0, -dirx).normalize();       // この軸まわりの+回転で頭が dir 方向へ倒れる
  _tm1.makeRotationAxis(_tv, ang);
  _tm2.makeTranslation(-px, -py, -pz);
  _tm1.multiply(_tm2);
  _tm2.makeTranslation(px, py, pz);
  _tm2.multiply(_tm1).multiply(dummy.matrix);
  bMeshes[b.k].setMatrixAt(b.mi, _tm2);
}

// ---------- パーティクル ----------
const P_VERT = `
  attribute float aSize; attribute float aAlpha; attribute vec3 aColor;
  varying float vA; varying vec3 vC;
  void main(){
    vA = aAlpha; vC = aColor;
    vec4 mv = modelViewMatrix * vec4(position, 1.0);
    gl_PointSize = aSize * (760.0 / max(1.0, -mv.z));
    gl_Position = projectionMatrix * mv;
  }`;
const P_FRAG = `
  varying float vA; varying vec3 vC;
  void main(){
    float d = length(gl_PointCoord - 0.5);
    float a = smoothstep(0.5, 0.06, d) * vA;
    if(a < 0.012) discard;
    gl_FragColor = vec4(vC, a);
  }`;

class ParticlePool {
  constructor(max, blending){
    this.max = max; this.parts = []; this.cursor = 0;
    this.owner = new Array(max).fill(null);   // slot → 現在の持ち主(プール飽和時の奪い合い検出)
    this.pos = new Float32Array(max * 3);
    this.col = new Float32Array(max * 3);
    this.size = new Float32Array(max);
    this.alpha = new Float32Array(max);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(this.pos, 3).setUsage(THREE.DynamicDrawUsage));
    geo.setAttribute('aColor', new THREE.BufferAttribute(this.col, 3).setUsage(THREE.DynamicDrawUsage));
    geo.setAttribute('aSize', new THREE.BufferAttribute(this.size, 1).setUsage(THREE.DynamicDrawUsage));
    geo.setAttribute('aAlpha', new THREE.BufferAttribute(this.alpha, 1).setUsage(THREE.DynamicDrawUsage));
    this.geo = geo;
    this.mesh = new THREE.Points(geo, new THREE.ShaderMaterial({
      vertexShader: P_VERT, fragmentShader: P_FRAG,
      blending, transparent: true, depthWrite: false }));
    this.mesh.frustumCulled = false;
    scene.add(this.mesh);
    this.clear();
  }
  clear(){ this.parts.length = 0; this.owner.fill(null); this.alpha.fill(0); this.geo.attributes.aAlpha.needsUpdate = true; }
  spawn(p){ // {x,y,z,vx,vy,vz,life,size,r,g,b,grav,drag,fadeIn}
    p.age = 0; p.slot = this.cursor;
    this.owner[p.slot] = p;   // スロットを奪われた古い個体はupdate側で除去する
    this.cursor = (this.cursor + 1) % this.max;
    this.parts.push(p);
    // 色は寿命を通じて不変なのでspawn時に1回だけ書く(毎フレームのバッファ転送を省く)
    this.col[p.slot*3] = p.r; this.col[p.slot*3+1] = p.g; this.col[p.slot*3+2] = p.b;
    this.colDirty = true;
  }
  update(dt){
    if(!this.parts.length) return;   // 空のときはGPU転送も省く
    // 順序はslotが持つので配列順は不問 → 除去はswap-remove(spliceのシフトを避ける)
    for(let i = this.parts.length - 1; i >= 0; i--){
      const p = this.parts[i];
      if(this.owner[p.slot] !== p){   // スロットを奪われた個体: alphaは新しい持ち主の管理なので触らない
        this.parts[i] = this.parts[this.parts.length - 1]; this.parts.pop(); continue;
      }
      p.age += dt;
      if(p.age >= p.life){
        this.alpha[p.slot] = 0; this.owner[p.slot] = null;
        this.parts[i] = this.parts[this.parts.length - 1]; this.parts.pop(); continue;
      }
      p.vy -= (p.grav || 0) * dt;
      const dr = p.drag ? Math.exp(-p.drag * dt) : 1;
      p.vx *= dr; p.vy *= dr; p.vz *= dr;
      p.x += p.vx * dt; p.y += p.vy * dt; p.z += p.vz * dt;
      const gnd = (p.gy || 0) + 1;
      if(p.y < gnd && p.vy < 0){ p.y = gnd; p.vy *= -0.3; p.vx *= 0.6; p.vz *= 0.6; }
      const k = p.age / p.life;
      const fade = p.fadeIn ? Math.min(1, p.age / p.fadeIn) : 1;
      const s = p.slot;
      this.pos[s*3] = p.x; this.pos[s*3+1] = p.y; this.pos[s*3+2] = p.z;
      this.size[s] = p.size * (p.growth ? (1 + k * p.growth) : 1);
      this.alpha[s] = (1 - k) * fade * (p.baseAlpha || 1);
    }
    const at = this.geo.attributes;
    at.position.needsUpdate = at.aSize.needsUpdate = at.aAlpha.needsUpdate = true;
    if(this.colDirty){ at.aColor.needsUpdate = true; this.colDirty = false; }
  }
}

// 注意: ライトをシーンにadd/removeするとライト数が変わり、Three.jsが全マテリアルの
// シェーダーを作り直して100ms級のスパイクになる。ライトは常設してintensityだけ動かすこと
const nukeLights = [];

  const L = nukeLights.find(l => l.intensity <= 0) || nukeLights[0];
  L.position.set(x, y, z);
  L.userData = { peak: peak * LIGHT_SCALE, age: 0 };
  L.intensity = peak * LIGHT_SCALE;
}
function updateBoomLights(dt){
  for(const L of boomLights){
    if(L.intensity <= 0) continue;
    L.userData.age += dt;
    L.intensity = Math.max(0, L.userData.peak * (1 - L.userData.age / 0.9));
  }
  for(const L of nukeLights){                       // 4秒かけて二乗カーブで減光
    if(L.intensity <= 0) continue;
    L.userData.age += dt;
    const k = Math.min(1, L.userData.age / 4);
    L.intensity = k >= 1 ? 0 : L.userData.peak * (1 - k) * (1 - k);
  }
}

function spawnDebris(x, y, z, pow){
  const a = Math.random() * Math.PI * 2, sp = (0.3 + Math.random() * 0.7) * pow;
  const d = {
    slot: debrisCursor, x, y, z,
    vx: Math.cos(a) * sp, vy: pow * (0.5 + Math.random() * 0.9), vz: Math.sin(a) * sp,
    rx: Math.random() * 3, ry: Math.random() * 3, rz: Math.random() * 3,

    size: 0.9 + Math.random() * 3.2, life: 2.2 + Math.random() * 2.4, age: 0
  };
  debrisMesh.setColorAt(d.slot, pick(debrisCols, Math.random));
  debrisMesh.instanceColor.needsUpdate = true;   // 色が変わるのはspawn時だけ
  debrisCursor = (debrisCursor + 1) % DEBRIS_N;

function updateDebris(dt){
  if(!debrisList.length) return;
  for(let i = debrisList.length - 1; i >= 0; i--){
    const d = debrisList[i];
    if(debrisOwner[d.slot] !== d){   // スロットを奪われた古い瓦礫(行列は新しい持ち主が上書き済み)
      debrisList[i] = debrisList[debrisList.length - 1]; debrisList.pop(); continue;
    }
    d.age += dt;
    if(d.age >= d.life){
      debrisMesh.setMatrixAt(d.slot, HIDDEN_MAT);
      debrisOwner[d.slot] = null;
      debrisList[i] = debrisList[debrisList.length - 1]; debrisList.pop();
      continue;
    }
    d.vy -= 260 * dt;
    d.x += d.vx * dt; d.y += d.vy * dt; d.z += d.vz * dt;
    const gnd = terrainH(d.x, d.z) + d.size / 2;
    if(d.y < gnd && d.vy < 0){
      d.y = gnd; d.vy *= -0.34;
      d.vx *= 0.6; d.vz *= 0.6; d.rvx *= 0.5; d.rvz *= 0.5;
    }
    d.rx += d.rvx * dt; d.rz += d.rvz * dt;
    const fade = Math.min(1, (d.life - d.age) / 0.4);   // 最後は縮んで消える
    setInstanceAt(debrisMesh, d.slot, d.x, d.y, d.z, d.rx, d.ry, d.rz,
      d.size * fade, d.size * fade, d.size * fade);
  }
  debrisMesh.instanceMatrix.needsUpdate = true;
}

const fxFree = new Map();   // プリセット名 → 待機中メッシュの配列
function acquireFx(key, geo, blending, side, color, opacity){
  let list = fxFree.get(key);
  if(!list) fxFree.set(key, list = []);
  let mesh = list.pop();
  if(!mesh){
    mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial(
      { transparent: true, depthWrite: false, blending, side }));
    mesh.userData.fxKey = key;
  }
  mesh.material.color.set(color);
  mesh.material.opacity = opacity;
  mesh.rotation.set(0, 0, 0);
  mesh.scale.set(1, 1, 1);
  return mesh;
}

function makeScorchMaterial(innerR, stops){
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const x = c.getContext('2d');
  const g = x.createRadialGradient(64, 64, innerR, 64, 64, 64);
  for(const [o, col] of stops) g.addColorStop(o, col);
  x.fillStyle = g; x.fillRect(0, 0, 128, 128);
  return new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(c),
    transparent: true, depthWrite: false, polygonOffset: true, polygonOffsetFactor: -2 });
}
