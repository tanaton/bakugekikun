// 表示中の焦げ跡(古い順)。個別メッシュのまま無制限に増やすとドローコールが蓄積するため、
// 直近の分だけ個別メッシュで保持し、あふれた分は複数枚を1メッシュに焼き込んで統合する。
// 統合後も含めて合計約1000発分が残る(超過分は統合メッシュ単位で古い順に破棄)
const scorchList = [];
const SCORCH_LIVE_MAX = 40;    // 個別メッシュのまま保持する枚数
const SCORCH_BAKE_SIZE = 48;   // この枚数たまるごとに1メッシュへ統合
const SCORCH_BAKED_MAX = 960;  // 統合メッシュ側に保持する合計枚数の上限
const scorchPending = new Map();   // material → 統合待ちの個別メッシュ
const scorchBatches = [];          // { mesh, count } 古い順
let scorchBakedCount = 0;
// 統合待ちの個別メッシュ群を1つのジオメトリへ焼き込む(頂点はワールド座標に変換済みで格納)
function bakeScorchBatch(mat, list){
  let vCount = 0, iCount = 0;
  for(const m of list){ vCount += m.geometry.getAttribute('position').count; iCount += m.geometry.index.count; }
  const pos = new Float32Array(vCount * 3), uv = new Float32Array(vCount * 2);
  const idx = vCount > 65535 ? new Uint32Array(iCount) : new Uint16Array(iCount);
  let vo = 0, io = 0;
  for(const m of list){
    const p = m.geometry.getAttribute('position'), u = m.geometry.getAttribute('uv'), ix = m.geometry.index;
    for(let i = 0; i < p.count; i++){
      pos[(vo + i) * 3]     = p.getX(i) + m.position.x;
      pos[(vo + i) * 3 + 1] = p.getY(i) + m.position.y;
      pos[(vo + i) * 3 + 2] = p.getZ(i) + m.position.z;
      uv[(vo + i) * 2] = u.getX(i); uv[(vo + i) * 2 + 1] = u.getY(i);
    }
    for(let i = 0; i < ix.count; i++) idx[io + i] = ix.getX(i) + vo;
    vo += p.count; io += ix.count;
    cityGroup.remove(m);
    m.geometry.dispose();
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
  g.setIndex(new THREE.BufferAttribute(idx, 1));
  const mesh = new THREE.Mesh(g, mat);
  cityGroup.add(mesh);
  scorchBatches.push({ mesh, count: list.length });
  scorchBakedCount += list.length;
  while(scorchBakedCount > SCORCH_BAKED_MAX){
    const b = scorchBatches.shift();
    cityGroup.remove(b.mesh);
    b.mesh.geometry.dispose();
    scorchBakedCount -= b.count;
  }
}
// 焦げ跡デカール: 内部にも頂点を持つ格子を地形に沿わせて密着させる
function addScorch(p, gy, size, segs, lift, mat){
  const sg = new THREE.PlaneGeometry(size, size, segs, segs);
  sg.rotateX(-Math.PI / 2);
  const spos = sg.getAttribute('position');
  for(let i = 0; i < spos.count; i++){
    const wx = spos.getX(i) + p.x, wz = spos.getZ(i) + p.z;
    // 水域にかかる頂点は水面下へ沈め、不透明な水面で隠す
    spos.setY(i, terrainH(wx, wz) - gy + (inWater(wx, wz) ? -3 : lift));
  }
  const mesh = new THREE.Mesh(sg, mat);
  mesh.position.set(p.x, gy, p.z);
  cityGroup.add(mesh);
  scorchList.push(mesh);
  if(scorchList.length > SCORCH_LIVE_MAX){
    const old = scorchList.shift();
    // 表示したまま統合待ちへ回し、規定枚数たまったら1メッシュに焼き込む(マテリアル別)
    let pend = scorchPending.get(old.material);
    if(!pend) scorchPending.set(old.material, pend = []);
    pend.push(old);
    if(pend.length >= SCORCH_BAKE_SIZE){
      bakeScorchBatch(old.material, pend);
      pend.length = 0;
    }
  }
}

const raycaster = new THREE.Raycaster();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

function requestStrike(px, py){
  const w = WEAPONS[weaponIdx];
  const ndc = new THREE.Vector2((px / innerWidth) * 2 - 1, -(py / innerHeight) * 2 + 1);
  raycaster.setFromCamera(ndc, camera);
  // 起伏のある地面と交差判定。外れたら(空クリック)水平面へフォールバック
  let hit = null;
  const hits = raycaster.intersectObject(ground);
  if(hits.length) hit = hits[0].point.clone();
  if(!hit){
    hit = new THREE.Vector3();
    if(!raycaster.ray.intersectPlane(groundPlane, hit)) return;
  }
  hit.x = THREE.MathUtils.clamp(hit.x, -MAP_HALF, MAP_HALF);
  hit.z = THREE.MathUtils.clamp(hit.z, -MAP_HALF, MAP_HALF);
  hit.y = terrainH(hit.x, hit.z);

  const a = Math.random() * Math.PI * 2;
  const start = new THREE.Vector3(hit.x + Math.cos(a) * 480, hit.y + 1600, hit.z + Math.sin(a) * 480);
  const vel = hit.clone().sub(start).normalize().multiplyScalar(w.speed);
  const mesh = new THREE.Mesh(missileGeo, missileMat);
  mesh.scale.setScalar(w.scale);
  mesh.position.copy(start);
  mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), vel.clone().normalize());
  scene.add(mesh);

  // 着弾点マーカー(マテリアルは武器ごとに1つを共有。点滅は全マーカー同位相)
  if(!w.markerMat) w.markerMat = glowMat(w.markerColor, 0.9, { side: THREE.DoubleSide });
  const marker = new THREE.Mesh(ringGeo, w.markerMat);
  marker.rotation.x = -Math.PI / 2;
  marker.position.set(hit.x, hit.y + 2.5, hit.z);
  scene.add(marker);

  missiles.push({ pos: start, vel, target: hit, impactY: hit.y, mesh, marker, trailT: 0,
    cluster: w.id === 'cluster', nuke: w.id === 'nuke', sub: false });
  stats.mCount++;
  playWhoosh();
  $('hint').classList.add('gone');
}

function updateMissiles(dt, now){
  for(let i = missiles.length - 1; i >= 0; i--){
    const m = missiles[i];
    m.pos.addScaledVector(m.vel, dt);
    m.mesh.position.copy(m.pos);
    // 噴射トレイル
    m.trailT += dt;
    while(m.trailT > 0.008){
      m.trailT -= 0.008;
      fireP.spawn({ x: m.pos.x + (Math.random()-0.5)*3, y: m.pos.y + (Math.random()-0.5)*3, z: m.pos.z + (Math.random()-0.5)*3,
        vx: 0, vy: 0, vz: 0, life: 0.5 + Math.random()*0.3, size: 9 + Math.random()*7,
        r: 1, g: 0.62, b: 0.25, baseAlpha: 0.8 });
      smokeP.spawn({ x: m.pos.x, y: m.pos.y, z: m.pos.z, vx: (Math.random()-0.5)*4, vy: 2, vz: (Math.random()-0.5)*4,
        life: 2.2, size: 14, growth: 2.5, r: 0.32, g: 0.32, b: 0.35, baseAlpha: 0.4 });
    }
    // マーカー点滅
    if(m.marker){
      m.marker.material.opacity = 0.5 + 0.45 * Math.sin(now * 0.02);
      const sc = 14 + 6 * Math.sin(now * 0.01);
      m.marker.scale.set(sc, sc, 1);
    }
    // クラスター弾: 上空で子弾に分裂(分裂後の親は即座に配列から消える)
    if(m.cluster && m.pos.y <= m.impactY + 380){
      removeMissile(m);
      for(let j = 0; j < 24; j++){                       // 分裂の閃光
        const a = Math.random() * Math.PI * 2, sp = 20 + Math.random() * 60;
        fireP.spawn({ x: m.pos.x, y: m.pos.y, z: m.pos.z,
          vx: Math.cos(a) * sp, vy: (Math.random() - 0.5) * 40, vz: Math.sin(a) * sp,
          life: 0.35 + Math.random() * 0.3, size: 7 + Math.random() * 8,
          r: 1, g: 0.8, b: 0.45 });
      }
      playPop();
      const n = 7 + Math.floor(Math.random() * 3);
      for(let j = 0; j < n; j++){
        const a = Math.random() * Math.PI * 2, rr = 25 + Math.random() * 150;
        const tx = THREE.MathUtils.clamp(m.target.x + Math.cos(a) * rr, -MAP_HALF, MAP_HALF);
        const tz = THREE.MathUtils.clamp(m.target.z + Math.sin(a) * rr, -MAP_HALF, MAP_HALF);
        const ty = terrainH(tx, tz);
        const sm = new THREE.Mesh(missileGeo, missileMat);
        sm.scale.set(0.5, 0.5, 0.5);
        const vel = new THREE.Vector3(tx - m.pos.x, ty - m.pos.y, tz - m.pos.z).normalize().multiplyScalar(560);
        sm.position.copy(m.pos);
        sm.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), vel.clone().normalize());
        scene.add(sm);
        missiles.push({ pos: m.pos.clone(), vel, target: new THREE.Vector3(tx, ty, tz), impactY: ty,
          mesh: sm, marker: null, trailT: Math.random() * 0.008, cluster: false, sub: true });
      }
      missiles.splice(i, 1);
      continue;
    }
    if(m.pos.y <= m.impactY + 2){
      removeMissile(m);
      missiles.splice(i, 1);
      const ip = new THREE.Vector3(m.target.x, m.impactY, m.target.z);
      if(m.nuke) detonateNuke(ip);
      else detonate(ip, m.sub ? 55 : 105);
    }
  }
}

function addFx(mesh, life, update){
  scene.add(mesh);
  fx.push({ mesh, life, age: 0, update });
}
// 拡大しながらフェードする球エフェクト: s = base + k^exp * grow(高さはys倍、riseで上昇)
function growFx(mesh, x, y, z, life, base, grow, exp, op0, ys = 1, rise = 0){
  mesh.position.set(x, y, z);
  addFx(mesh, life, (o, k) => {
    const s = base + Math.pow(k, exp) * grow;
    o.scale.set(s, s * ys, s);
    if(rise) o.position.y = y + k * rise;
    o.material.opacity = op0 * (1 - k);
  });
}
// 地面に伏せて拡大するリングエフェクト
function ringFx(mesh, x, y, z, life, base, grow, exp, op0){
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.set(x, y, z);
  addFx(mesh, life, (o, k) => {
    const s = base + Math.pow(k, exp) * grow;
    o.scale.set(s, s, 1);
    o.material.opacity = op0 * (1 - k);
  });
}

function detonate(p, R = 105){
  const f = R / 105;                 // 規模係数(クラスター子弾は小さめ)
  const sf = 0.55 + 0.45 * f;        // サイズ・速度の縮尺
  const gy = p.y || 0;
  flashLight(p.x, p.z, 7 * f, gy);
  // --- 閃光 ---
  growFx(fxSphereAdd(0xfff7e0, 1), p.x, gy + 10, p.z, 0.25, 12 * f, 300 * f, 1, 1);
  // --- 火球(白熱コア + 外炎の二層) ---
  growFx(fxSphereAdd(0xffd07a, 1), p.x, gy + 8, p.z, 0.6, 6 * f, 70 * f, 0.4, 1, 1.3);
  growFx(fxSphereAdd(0xff5a1c, 0.9), p.x, gy + 6, p.z, 1.0, 8 * f, 130 * f, 0.45, 0.9, 1.2, 45 * f);
  // --- 衝撃波リング(発光 + 土埃の二重) ---
  ringFx(fxRingAddD(0xffd9a8, 0.95), p.x, gy + 2.5, p.z, 0.7, 8 * f, 420 * f, 0.55, 0.95);
  ringFx(fxRingD(0x8a7458, 0.5), p.x, gy + 1.8, p.z, 1.5, 12 * f, 520 * f, 0.6, 0.5);
  // --- 焦げ跡と、舗装の割れたクレーター(水中への着弾は跡を残さない) ---
  if(!inWater(p.x, p.z)){
    addScorch(p, gy, R * 3.2, 16, 0.5, scorchMat);
    addCrater(p.x, p.z, R * 0.7);   // 地肌の露出は破壊半径より狭く
  }
  // --- 火球パーティクル(白核 → 橙 → 深紅の三層) ---
  const cnt = n => Math.max(4, Math.round(n * f));
  for(let i = 0; i < cnt(45); i++){
    const a = Math.random() * Math.PI * 2, sp = Math.random() * 50 * sf;
    fireP.spawn({ x: p.x, y: gy + 6, z: p.z, gy,
      vx: Math.cos(a) * sp, vy: (60 + Math.random() * 120) * sf, vz: Math.sin(a) * sp,
      life: 0.35 + Math.random() * 0.3, size: (20 + Math.random() * 18) * sf, drag: 1.2,
      r: 1, g: 0.93, b: 0.72 });
  }
  for(let i = 0; i < cnt(150); i++){
    const a = Math.random() * Math.PI * 2, up = Math.random();
    const sp = (30 + Math.random() * 140) * sf;
    fireP.spawn({ x: p.x, y: gy + 5, z: p.z, gy,
      vx: Math.cos(a) * sp * (1 - up * 0.5), vy: (40 + up * 200) * sf, vz: Math.sin(a) * sp * (1 - up * 0.5),
      life: 0.6 + Math.random() * 0.8, size: (14 + Math.random() * 16) * sf, drag: 1.0, growth: 1.2,
      r: 1, g: 0.45 + Math.random() * 0.25, b: 0.1 });
  }
  for(let i = 0; i < cnt(90); i++){
    const a = Math.random() * Math.PI * 2, rr = Math.random() * 25 * f;
    fireP.spawn({ x: p.x + Math.cos(a) * rr, y: gy + 8, z: p.z + Math.sin(a) * rr, gy,
      vx: Math.cos(a) * 18, vy: (70 + Math.random() * 130) * sf, vz: Math.sin(a) * 18,
      life: 1.0 + Math.random() * 0.9, size: (18 + Math.random() * 20) * sf, drag: 1.4, growth: 1.6,
      r: 0.85, g: 0.22, b: 0.06 });
  }
  // --- 火の粉スパーク ---
  for(let i = 0; i < cnt(160); i++){
    const a = Math.random() * Math.PI * 2, up = Math.random();
    const sp = (60 + Math.random() * 220) * sf;
    fireP.spawn({ x: p.x, y: gy + 4, z: p.z, gy,
      vx: Math.cos(a) * sp * (1 - up * 0.6), vy: (60 + up * 260) * sf, vz: Math.sin(a) * sp * (1 - up * 0.6),
      life: 0.9 + Math.random() * 1.6, size: 3.5 + Math.random() * 5, grav: 220, drag: 0.5,
      r: 1, g: 0.6 + Math.random() * 0.3, b: 0.18 });
  }
  // --- 3D瓦礫 ---
  for(let i = 0; i < cnt(55); i++)
    spawnDebris(p.x + (Math.random() - 0.5) * 14, gy + 4 + Math.random() * 10,
      p.z + (Math.random() - 0.5) * 14, (130 + Math.random() * 130) * sf);
  // --- 地を這う土煙 ---
  for(let i = 0; i < cnt(70); i++){
    const a = Math.random() * Math.PI * 2;
    const sp = (55 + Math.random() * 110) * sf;
    smokeP.spawn({ x: p.x + Math.cos(a) * 18 * f, y: gy + 2 + Math.random() * 6, z: p.z + Math.sin(a) * 18 * f, gy,
      vx: Math.cos(a) * sp, vy: 4 + Math.random() * 10, vz: Math.sin(a) * sp,
      life: 1.6 + Math.random() * 1.6, size: (20 + Math.random() * 22) * sf, growth: 2.6, drag: 1.1, fadeIn: 0.1,
      r: 0.4, g: 0.35, b: 0.29, baseAlpha: 0.55 });
  }
  // --- 煙柱(きのこ雲) ---
  for(let i = 0; i < cnt(85); i++){
    const a = Math.random() * Math.PI * 2, rr = Math.random() * R * 0.4;
    smokeP.spawn({ x: p.x + Math.cos(a) * rr, y: gy + 6 + Math.random() * 26, z: p.z + Math.sin(a) * rr, gy,
      vx: Math.cos(a) * 10, vy: (34 + Math.random() * 62) * sf, vz: Math.sin(a) * 10,
      life: 4 + Math.random() * 3.5, size: (30 + Math.random() * 36) * sf, growth: 2.6,
      drag: 0.3, fadeIn: 0.3, r: 0.2, g: 0.185, b: 0.18, baseAlpha: 0.66 });
  }
  // --- 二次爆発の予約(大型弾のみ) ---
  if(f > 0.75){
    const n2 = 3 + Math.floor(Math.random() * 3);
    for(let i = 0; i < n2; i++){
      const a = Math.random() * Math.PI * 2, rr = 30 + Math.random() * R * 1.1;
      delayedBooms.push({ t: simT + 0.15 + Math.random() * 0.9,
        x: p.x + Math.cos(a) * rr, z: p.z + Math.sin(a) * rr });
    }
  }

  destroyAround(p, R);
  const dc = camera.position.distanceTo(new THREE.Vector3(p.x, gy, p.z));
  shake += Math.min(26, 9000 / Math.max(220, dc)) * f;
  playBoom(dc / f);
}

}

// ---------- 戦術核 ----------
const nukeEmitters = [];   // キノコ雲を数秒かけて生成し続ける
function updateNukeEmitters(dt){
  for(let i = nukeEmitters.length - 1; i >= 0; i--){
    const e = nukeEmitters[i];
    e.t += dt;
    if(e.t >= e.dur){ nukeEmitters.splice(i, 1); continue; }
    const k = e.t / e.dur;
    // 柱(ステム): 熱で吸い上げられる土煙
    const nStem = e.t < e.dur * 0.7 ? 3 : 1;
    for(let j = 0; j < nStem; j++){
      const a = Math.random() * Math.PI * 2, rr = Math.random() * 55;
      smokeP.spawn({ x: e.x + Math.cos(a) * rr, y: e.gy + 10 + Math.random() * 90, z: e.z + Math.sin(a) * rr, gy: e.gy,
        vx: Math.cos(a) * 6, vy: 95 + Math.random() * 85, vz: Math.sin(a) * 6,
        life: 5 + Math.random() * 3, size: 42 + Math.random() * 40, growth: 1.8, drag: 0.12, fadeIn: 0.3,
        r: 0.34 + Math.random() * 0.06, g: 0.29, b: 0.25, baseAlpha: 0.7 });
    }
    // 傘(キャップ): 上空でドーナツ状に広がる
    for(let j = 0; j < 2; j++){
      const a = Math.random() * Math.PI * 2, rr = 40 + Math.random() * 90 + k * 140;
      smokeP.spawn({ x: e.x + Math.cos(a) * rr, y: e.gy + 430 + Math.random() * 130, z: e.z + Math.sin(a) * rr, gy: e.gy,
        vx: Math.cos(a) * (26 + k * 12), vy: 12 + Math.random() * 22, vz: Math.sin(a) * (26 + k * 12),
        life: 6 + Math.random() * 4, size: 62 + Math.random() * 55, growth: 1.5, drag: 0.25, fadeIn: 0.5,
        r: 0.3, g: 0.27, b: 0.25, baseAlpha: 0.62 });
    }
    // 内部の発光(最初の3秒は雲が中から焼ける)
    if(e.t < 3){
      const gh = e.gy + 80 + Math.random() * 380 * Math.min(1, e.t / 2);
      fireP.spawn({ x: e.x + (Math.random() - 0.5) * 70, y: gh, z: e.z + (Math.random() - 0.5) * 70, gy: e.gy,
        vx: 0, vy: 40 + Math.random() * 50, vz: 0,
        life: 0.5 + Math.random() * 0.4, size: 30 + Math.random() * 40,
        r: 1, g: 0.5, b: 0.16, baseAlpha: 0.55 });
    }
  }
}

function detonateNuke(p){
  const R = 420;                     // 全壊半径
  const gy = p.y || 0;
  // --- 画面全体が白く飛ぶ ---
  const nf = $('nukeFlash');
  nf.style.transition = 'none';
  nf.style.opacity = '0.95';
  void nf.offsetWidth;
  nf.style.transition = 'opacity 2.4s ease-out';
  nf.style.opacity = '0';
  // --- 巨大な光源(街全体が照らされる) ---
  nukeFlashLight(p.x, gy + 220, p.z, 18);
  flashLight(p.x, p.z, 10, gy);
  // --- 白熱コア ---
  growFx(fxSphereAdd(0xfffbee, 1), p.x, gy + 40, p.z, 1.2, 20, 190, 0.4, 1);
  // --- 上昇する大火球(白 → 橙 → 赤黒) ---
  const fbC1 = new THREE.Color(0xffe6a0), fbC2 = new THREE.Color(0xff3c08);
  const fb = fxSphereAdd(0xffe6a0, 0.95);
  fb.position.set(p.x, gy + 40, p.z);
  addFx(fb, 4.5, (o, k) => {
    const s = 40 + Math.pow(k, 0.5) * 260;
    o.scale.set(s, s * 1.1, s);
    o.position.y = gy + 40 + k * 320;
    o.material.color.copy(fbC1).lerp(fbC2, Math.min(1, k * 1.6));

// 崩壊開始時の粉塵
function collapseDust(b){

    smokeP.spawn({ x: b.x + (Math.random() - 0.5) * b.sx, y: b.gy + 3, z: b.z + (Math.random() - 0.5) * b.sz, gy: b.gy,

// 建物を破壊状態にして崩壊(倒壊 or 圧壊)を開始する。delayで崩壊ウェーブを表現
function startCollapse(b, dirx, dirz, canTopple, delay = 0){
  b.state = 1;
  stats.bDead++;
  stats.damage += b.value;
  const base = { b, t: 0, delay: delay > 0 ? delay : 0.0001 };
  if(canTopple && b.h > 32 && Math.random() < 0.6){
    collapsing.push({ ...base, mode: 't', dur: 0.9 + Math.random() * 0.7,
      dirx, dirz, amax: Math.PI / 2 * (0.85 + Math.random() * 0.12) });
  } else {
    collapsing.push({ ...base, mode: 'c', dur: 0.7 + Math.random() * 0.5,
      ax: (Math.random() - 0.5) * 0.3, az: (Math.random() - 0.5) * 0.3 });
  }
  if(burnSites.length < 140 && Math.random() < 0.55)   // 跡地がしばらく燃え続ける
    burnSites.push({ x: b.x, z: b.z, gy: b.gy, until: simT + delay + 5 + Math.random() * 7, next: simT + delay + Math.random() * 0.4 });
}

const _treeHit = new Set();   // 行列を書き換えたチャンクメッシュだけGPUへ再アップロード
function destroyAround(p, R, depth = 0, wave = 0){
  // 建物(空間ハッシュで近傍のみ走査)
  const R2 = R * 1.55;
  forEachNear(grid, p.x, p.z, R2, b => {
    if(b.state !== 0 && b.state !== 3) return;           // 3=延焼中は直撃なら壊せる
    const d = Math.hypot(b.x - p.x, b.z - p.z);
    if(d <= R || (d <= R2 && Math.random() < 0.45)){
      const dd = d || 1;
      // 爆心から遠い高層ビルは反対側へ倒れ込む(巻き添え倒壊は倒れない)
      startCollapse(b, (b.x - p.x) / dd, (b.z - p.z) / dd,
        depth === 0 && d > R * 0.3, wave ? d / wave : 0);
    } else if(b.state === 0 && depth === 0 && d <= R2 * 1.35 &&
              Math.random() < 0.4 && burningBldgs.length < 70){
      // 爆風の外縁: 炎上して時間差で崩れる
      b.state = 3;
      burningBldgs.push({ b, collapseAt: simT + 2 + Math.random() * 5, next: simT });
    }
  });
  // 車(位置はupdateCarsがキャッシュ済み。ループ順は updateCars → updateMissiles なので必ず設定されている)。
  // 空間ハッシュがないぶん全数走査なので、軸別の早期棄却と距離二乗比較で1台あたりを安くする
  const CR = R * 1.25, CRsq = CR * CR;
  for(const c of cars){
    if(!c.alive) continue;
    const dx = c.px - p.x, dz = c.pz - p.z;
    if(dx > CR || dx < -CR || dz > CR || dz < -CR) continue;
    if(dx * dx + dz * dz <= CRsq){
      c.alive = false;
      carMesh.setMatrixAt(c.i, HIDDEN_MAT);
      // 駐車車両は毎フレームの転送範囲外なので、この行列変更だけ個別に転送予約する
      if(c.i >= movingCars) carMesh.instanceMatrix.addUpdateRange(c.i * 16, 16);
      stats.cDead++;
      stats.damage += CAR_VALUE;
    }
  }
  // 木(空間ハッシュで近傍セルのみ走査)
  const TR = R * 1.2, TRsq = TR * TR;
  _treeHit.clear();
  forEachNear(treeGrid, p.x, p.z, TR, t => {
    if(!t.alive) return;
    const dx = t.x - p.x, dz = t.z - p.z;
    if(dx * dx + dz * dz <= TRsq){
      t.alive = false;
      t.mesh.setMatrixAt(t.mi, HIDDEN_MAT);
      _treeHit.add(t.mesh);
      stats.tDead++;
    }
  });
  for(const m of _treeHit) m.instanceMatrix.needsUpdate = true;
}

const FALLEN_COL = new THREE.Color(0x5c564e);
const touched = new Set();   // 行列を書き換えたメッシュだけGPUへ再アップロード
function updateCollapses(dt){
  if(!collapsing.length) return;
  touched.clear();
  for(let i = collapsing.length - 1; i >= 0; i--){
    const c = collapsing[i];
    const b = c.b;
    if(c.delay > 0){                            // 崩壊ウェーブ: 到達するまで待つ
      c.delay -= dt;
      if(c.delay > 0) continue;
      collapseDust(b);
    }
    touched.add(b.k);
    c.t += dt / c.dur;
    if(c.mode === 't'){
      // 倒壊: 基部を支点に加速しながら傾く
      if(c.t >= 1){
        toppleMatrix(b, c.amax, c.dirx, c.dirz);
        b.state = 2;
        const mesh = bMeshes[b.k];
        mesh.setColorAt(b.mi, FALLEN_COL);
        mesh.instanceColor.needsUpdate = true;
        deadLots.push({ x: b.x, z: b.z, sx: b.sx, sz: b.sz, rot: b.rot });   // 根本の基礎跡
        // 着地の粉塵が倒れた方向に走る
        for(let j = 0; j < 16; j++){
          const dd = b.h * (0.15 + Math.random() * 0.85);
          const px = b.x + c.dirx * dd + (Math.random() - 0.5) * b.sx * 1.5;
          const pz = b.z + c.dirz * dd + (Math.random() - 0.5) * b.sz * 1.5;
          const py = terrainH(px, pz);
          smokeP.spawn({ x: px, y: py + 2, z: pz, gy: py,
            vx: (Math.random() - 0.5) * 30, vy: 10 + Math.random() * 24, vz: (Math.random() - 0.5) * 30,
            life: 2.5 + Math.random() * 2, size: 18 + Math.random() * 20, growth: 2.4, drag: 0.6, fadeIn: 0.15,
            r: 0.42, g: 0.38, b: 0.32, baseAlpha: 0.6 });
        }
        const ix = b.x + c.dirx * b.h * 0.55, iz = b.z + c.dirz * b.h * 0.55;
        const iy = terrainH(ix, iz);
        for(let j = 0; j < 10; j++)
          spawnDebris(ix + (Math.random() - 0.5) * 20, iy + 3, iz + (Math.random() - 0.5) * 20, 50 + Math.random() * 60);
        shake += Math.min(4, b.h * 0.02);
        if(Math.random() < 0.2) playPop();     // 大量倒壊時に音が飽和しないよう間引く
        destroyAround({ x: ix, z: iz }, Math.min(45, b.h * 0.35), 1);  // 倒れ込んだ先を巻き添え
        collapsing.splice(i, 1);
        continue;
      }
      toppleMatrix(b, c.amax * c.t * c.t, c.dirx, c.dirz);
    } else {
      // 圧壊: その場に沈み、沈みきったら本体を隠して基礎跡だけを地面に残す
      if(c.t >= 1){
        b.state = 2;
        bMeshes[b.k].setMatrixAt(b.mi, HIDDEN_MAT);
        deadLots.push({ x: b.x, z: b.z, sx: b.sx, sz: b.sz, rot: b.rot });
        collapsing.splice(i, 1);
        continue;
      }
      const k = c.t * c.t;                      // 加速しながら崩れる
      const jitter = Math.sin(c.t * 40) * 0.02 * (1 - c.t);
      setBuildingMatrix(b, Math.max(0.045, 1 - k * 0.96), c.ax * k + jitter, c.az * k + jitter);
    }
  }
  for(const k of touched) bMeshes[k].instanceMatrix.needsUpdate = true;
}

// 炎上中の建物: 燃えながら、時間が来たら崩れ落ちる
const burningBldgs = [];
function updateBurningBldgs(){
  for(let i = burningBldgs.length - 1; i >= 0; i--){
    const s = burningBldgs[i], b = s.b;
    if(b.state !== 3){ burningBldgs.splice(i, 1); continue; }  // 先に別の爆撃で破壊された
    if(simT >= s.collapseAt){
      burningBldgs.splice(i, 1);
      const a = Math.random() * Math.PI * 2;
      startCollapse(b, Math.cos(a), Math.sin(a), true);        // ランダムな方向に倒壊
      playPop();
      continue;
    }
    if(simT < s.next) continue;
    s.next = simT + 0.09 + Math.random() * 0.18;
    // 壁面のあちこちから火の手
    const ex = b.x + (Math.random() - 0.5) * b.sx * 1.05;
    const ez = b.z + (Math.random() - 0.5) * b.sz * 1.05;
    const ey = b.gy + b.h * (0.25 + Math.random() * 0.75);
    fireP.spawn({ x: ex, y: ey, z: ez, gy: b.gy,
      vx: (Math.random() - 0.5) * 5, vy: 10 + Math.random() * 18, vz: (Math.random() - 0.5) * 5,
      life: 0.4 + Math.random() * 0.5, size: 7 + Math.random() * 10,
      r: 1, g: 0.55 + Math.random() * 0.25, b: 0.14, baseAlpha: 0.9 });
    if(Math.random() < 0.5)
      smokeP.spawn({ x: b.x + (Math.random() - 0.5) * b.sx * 0.5, y: b.gy + b.h + 3,
        z: b.z + (Math.random() - 0.5) * b.sz * 0.5, gy: b.gy,
        vx: (Math.random() - 0.5) * 4, vy: 14 + Math.random() * 16, vz: (Math.random() - 0.5) * 4,
        life: 2.5 + Math.random() * 2.5, size: 12 + Math.random() * 16, growth: 2.6, drag: 0.2, fadeIn: 0.3,
        r: 0.16, g: 0.15, b: 0.15, baseAlpha: 0.6 });
  }
}

function updateFx(dt){
  for(let i = fx.length - 1; i >= 0; i--){
    const f = fx[i];
    f.age += dt;
    if(f.age >= f.life){
      releaseFx(f);
      fx.splice(i, 1);
      continue;
    }
    f.update(f.mesh, f.age / f.life);
  }
}

// ---------- 車の走行(道路パスに沿う) ----------
function updateCars(dt){
  // Y軸回転+平行移動のみなので行列要素を直接書く(Euler→行列変換とsetMatrixAtのコピーを回避)。
  // 残りの要素は生成時の単位行列のまま変わらない
  const arr = carMesh.instanceMatrix.array;
  for(let ci = 0; ci < movingCars; ci++){   // 先頭movingCars台だけが走行車両(以降は駐車車両で不変)
    const c = cars[ci];
    if(!c.alive) continue;
    c.s += c.speed * c.dir * dt;
    const p = carPose(roadPaths[c.road], c.s);
    const px = p.x + p.dz * c.lane, pz = p.z - p.dx * c.lane;   // 進行方向の横にレーンオフセット
    c.px = px; c.pz = pz;   // destroyAroundの被弾判定用にキャッシュ(carPoseの再計算を避ける)
    const hx = p.dx * c.dir, hz = p.dz * c.dir;   // 正規化済みの進行方向
    const o = c.i * 16;
    arr[o] = hx;      arr[o + 2] = hz;
    arr[o + 8] = -hz; arr[o + 10] = hx;
    arr[o + 12] = px;
    arr[o + 13] = p.h + p.hs * c.lane + 1.1;   // 事前計算した路面高+横断勾配
    arr[o + 14] = pz;
  }
  // 毎フレーム変わるのは走行車両の領域だけ。駐車車両ぶんのGPU転送を省く
  // (updateRangesはアップロード後に自動クリアされるので毎フレーム指定し直す)
  carMesh.instanceMatrix.addUpdateRange(0, movingCars * 16);
  carMesh.instanceMatrix.needsUpdate = true;
}

// ---------- サウンド(WebAudioで合成) ----------
let actx = null, soundOn = true;
function initAudio(){
  if(!actx){
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  }
  if(actx && actx.state === 'suspended') actx.resume();
}
// 減衰つきノイズバースト → ローパス(f0→f1) → ゲイン減衰(全爆発音の基本要素)
function noiseBurst(t, start, dur, f0, f1, g0, decayPow){
  const len = Math.floor(actx.sampleRate * dur);
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decayPow);
  const src = actx.createBufferSource(); src.buffer = buf;
  const lp = actx.createBiquadFilter(); lp.type = 'lowpass';
  lp.frequency.setValueAtTime(f0, t + start);
  lp.frequency.exponentialRampToValueAtTime(f1, t + start + dur * 0.9);
  const gn = actx.createGain(); gn.gain.setValueAtTime(g0, t + start);
  gn.gain.exponentialRampToValueAtTime(0.001, t + start + dur);
  src.connect(lp).connect(gn).connect(actx.destination);
  src.start(t + start);
}
// 低音のドン(サイン波のピッチと音量を落としていく)
function subBass(t, f0, f1, fDur, g0, gDur){
  const osc = actx.createOscillator(); osc.type = 'sine';
  osc.frequency.setValueAtTime(f0, t);
  osc.frequency.exponentialRampToValueAtTime(f1, t + fDur);
  const og = actx.createGain(); og.gain.setValueAtTime(g0, t);
  og.gain.exponentialRampToValueAtTime(0.001, t + gDur);
  osc.connect(og).connect(actx.destination); osc.start(t); osc.stop(t + gDur + 0.05);
}
function playBoom(dist){
  if(!actx || !soundOn) return;
  const vol = Math.min(0.55, 220 / Math.max(150, dist));
  const t = actx.currentTime;
  noiseBurst(t, 0, 1.6, 900, 70, vol, 2.2);
  subBass(t, 72, 26, 0.9, vol * 1.2, 1);
}
function playNuke(dist){
  if(!actx || !soundOn) return;
  const vol = Math.min(0.85, 2000 / Math.max(300, dist));
  const t = actx.currentTime;
  noiseBurst(t, 0, 0.25, 6000, 1200, vol * 0.7, 1.5);   // 鋭いクラック
  noiseBurst(t, 0.02, 4.5, 550, 40, vol, 2.0);          // 主爆音
  noiseBurst(t, 1.1, 3.5, 220, 50, vol * 0.45, 1.5);    // 遅れてくる残響
  subBass(t, 52, 14, 3.2, vol * 1.5, 3.4);              // 地鳴り
}
function playPop(){
  if(!actx || !soundOn) return;
  noiseBurst(actx.currentTime, 0, 0.5, 1400, 1400, 0.16, 3);
}
function playWhoosh(){
  if(!actx || !soundOn) return;
  const t = actx.currentTime;
  const len = actx.sampleRate * 1.2;
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (i / len);
  const src = actx.createBufferSource(); src.buffer = buf;
  const bp = actx.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 1.2;
  bp.frequency.setValueAtTime(400, t); bp.frequency.exponentialRampToValueAtTime(2400, t + 1.1);
  const gn = actx.createGain(); gn.gain.setValueAtTime(0.0001, t);
  gn.gain.exponentialRampToValueAtTime(0.12, t + 1.0);
  gn.gain.exponentialRampToValueAtTime(0.0001, t + 1.25);
  src.connect(bp).connect(gn).connect(actx.destination); src.start(t);
}

// ---------- HUD ----------
function yen(v){
  if(v >= 1e12) return '¥' + (v / 1e12).toFixed(2) + '兆';
  if(v >= 1e8)  return '¥' + (v / 1e8).toFixed(1) + '億';
  if(v >= 1e4)  return '¥' + Math.round(v / 1e4).toLocaleString() + '万';
  return '¥' + Math.round(v).toLocaleString();
}
const hudShown = {};   // 前回表示した生の値。変化した項目だけフォーマットしてDOMを書き換える
function setHud(id, value, fmt){
  if(hudShown[id] === value) return;
  hudShown[id] = value;
  $(id).textContent = fmt ? fmt(value) : value.toLocaleString();
}

  setHud('bDead', stats.bDead);

  setHud('cDead', stats.cDead);
  setHud('cTotal', stats.cTotal);
  setHud('tDead', stats.tDead);
  setHud('tTotal', stats.tTotal);
  setHud('mCount', stats.mCount);

}

  const hot = WEAPONS[weaponIdx].id === 'nuke';
  e.target.style.color = hot ? 'var(--red)' : '';
  e.target.style.borderColor = hot ? 'var(--red)' : '';
});
$('rand').addEventListener('click', () => {
  const s = 'CITY-' + Math.floor(Math.random() * 99999).toString().padStart(5, '0');
  $('seed').value = s;
  generateCity(s);
});
$('seed').addEventListener('keydown', e => { if(e.key === 'Enter') generateCity(e.target.value || 'DEFAULT'); });

// ---------- 処理時間プロファイラ (Pキーで表示切替) ----------
// pt(name)をループ内の各処理の直後に置き、直前のチェックポイントからの経過を区間名に積算する。
// 表示OFF中は即returnするので計測オーバーヘッドはほぼゼロ。
let profOn = false;
const profSum = new Map();
let profMark = 0;
function ptBegin(){ if(profOn) profMark = performance.now(); }
function pt(name){
  if(!profOn) return;
  const t = performance.now();
  profSum.set(name, (profSum.get(name) || 0) + (t - profMark));
  profMark = t;
}
function profShow(frames){
  const rows = [...profSum].sort((a, b) => b[1] - a[1]);
  let js = 0;
  for(const r of rows) js += r[1];
  const lines = rows.map(([k, v]) => k.padEnd(10) + (v / frames).toFixed(2).padStart(6) + 'ms');
  lines.push('-'.repeat(18));
  lines.push('js total'.padEnd(10) + (js / frames).toFixed(2).padStart(6) + 'ms');
  const info = renderer.info.render;
  lines.push(`draw:${info.calls}  tri:${Math.round(info.triangles / 1000)}k`);
  $('prof').textContent = lines.join('\n');
  profSum.clear();
}
addEventListener('keydown', e => {
  if(e.code !== 'KeyP' || e.target.tagName === 'INPUT') return;
  profOn = !profOn;
  profSum.clear();
  $('prof').style.display = profOn ? 'block' : 'none';
});

// ---------- メインループ ----------
function resize(){
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
}
addEventListener('resize', resize);
resize();

generateCity($('seed').value);

let last = performance.now();
// FPS表示: 0.5秒ごとに更新
let perfFrames = 0, perfLastT = performance.now();
function loop(now){
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  simT += dt;
  ptBegin();
  updateCamera(dt);        pt('camera');
  updateCars(dt);          pt('cars');
  updateMissiles(dt, now);
  for(let i = delayedBooms.length - 1; i >= 0; i--){   // 二次爆発の発火
    if(simT >= delayedBooms[i].t){
      const d = delayedBooms[i];
      delayedBooms.splice(i, 1);
      miniBoom(d);
    }
  }
  pt('missiles');
  updateBurning();         pt('burning');
  updateBurningBldgs();    pt('brnBldgs');
  updateNukeEmitters(dt);  pt('nukeEmit');
  updateCollapses(dt);
  flushGroundStamps();     pt('collapse');
  updateFx(dt);            pt('fx');
  updateDebris(dt);        pt('debris');
  updateBoomLights(dt);    pt('boomLight');
  fireP.update(dt);
  smokeP.update(dt);       pt('particles');
  // 川の水面: さざ波テクスチャをゆっくり流し、わずかに揺らす
  if(waterTex){
    waterTex.offset.set(
      simT * 0.008 + 0.02 * Math.sin(simT * 0.5),
      simT * 0.005 + 0.02 * Math.cos(simT * 0.34));
  }
  updateHUD();             pt('hud');
  renderer.render(scene, camera);
  pt('render');
  perfFrames++;
  if(now - perfLastT >= 500){
    $('perf').textContent = `${Math.round(perfFrames * 1000 / (now - perfLastT))} fps`;
    if(profOn) profShow(perfFrames);
    perfFrames = 0; perfLastT = now;
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
