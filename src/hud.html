<title>爆撃くん — GOD'S EYE STRIKE</title>
<style>
  :root{
    --panel: rgba(9,13,17,.84);
    --line: rgba(255,176,82,.30);
    --line-dim: rgba(255,176,82,.14);
    --amber: #ffb454;
    --red: #ff7a45;
    --text: #e9e4d8;
    --dim: #8f96a3;
    --mono: ui-monospace, "Cascadia Mono", Consolas, "Courier New", monospace;
  }
  html,body{ height:100%; margin:0; overflow:hidden; background:#1c2438; }
  #gl{ position:fixed; inset:0; width:100%; height:100%; display:block; cursor:crosshair; }
  #hud{ position:fixed; inset:0; pointer-events:none; font-family:var(--mono); color:var(--text); z-index:2; }
  .panel{
    position:absolute; pointer-events:auto;
    background:var(--panel); border:1px solid var(--line);
    padding:12px 14px; backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  .label{ font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--dim); }
  /* ---- command panel (top left) ---- */
  #cmd{ top:14px; left:14px; border-top:2px solid var(--amber); min-width:238px; }
  #cmd h1{ margin:0 0 2px; font-size:15px; font-weight:700; letter-spacing:.28em; color:var(--amber); }
  #cmd .sub{ font-size:10px; letter-spacing:.2em; color:var(--dim); margin-bottom:10px; }
  .seedrow{ display:flex; gap:6px; margin-top:4px; }
  #seed{
    flex:1; min-width:0; background:rgba(255,255,255,.05); border:1px solid var(--line-dim);
    color:var(--text); font-family:var(--mono); font-size:12px; padding:5px 7px; letter-spacing:.06em;
  }
  #seed:focus{ outline:1px solid var(--amber); outline-offset:-1px; }
  button{
    background:transparent; border:1px solid var(--line); color:var(--amber);
    font-family:var(--mono); font-size:11px; letter-spacing:.1em; padding:5px 9px; cursor:pointer;
  }
  button:hover{ background:rgba(255,176,82,.12); }
  button:focus-visible{ outline:1px solid var(--amber); outline-offset:1px; }
  /* ---- profiler (Pキーで表示) ---- */
  #prof{
    display:none; margin-top:6px; padding-top:6px; border-top:1px solid var(--line-dim);
    font-size:10px; line-height:1.55; color:var(--dim); white-space:pre;
    font-variant-numeric:tabular-nums;
  }
  /* ---- damage report (top right) ---- */
  #report{ top:14px; right:14px; min-width:250px; border-top:2px solid var(--red); }
  #report .row{ display:flex; justify-content:space-between; align-items:baseline; gap:16px; margin-top:7px; }
  #report .row:first-of-type{ margin-top:2px; }
  .num{ font-variant-numeric:tabular-nums; font-size:15px; color:var(--text); }
  .num small{ font-size:10px; color:var(--dim); margin-left:2px; }
  #dmgTotal{ font-size:21px; color:var(--red); font-weight:700; }
  #report .divider{ border-top:1px solid var(--line-dim); margin:9px 0 2px; }
  /* ---- controls (bottom left) ---- */
  #help{ bottom:14px; left:14px; font-size:11px; line-height:1.9; color:var(--dim); }
  #help b{ color:var(--text); font-weight:600; }
  #help .key{
    display:inline-block; border:1px solid var(--line-dim); padding:0 5px; margin-right:7px;
    color:var(--amber); font-size:10px; letter-spacing:.08em;
  }
  /* ---- sound (bottom right) ---- */
  #soundWrap{ bottom:14px; right:14px; padding:8px 10px; }
  /* ---- center hint ---- */
  #hint{
    position:absolute; left:50%; bottom:64px; transform:translateX(-50%);
    font-size:12px; letter-spacing:.22em; color:var(--amber);
    background:var(--panel); border:1px solid var(--line); padding:9px 18px;
    animation:pulse 1.6s ease-in-out infinite; white-space:nowrap;
  }
  @keyframes pulse{ 0%,100%{opacity:.95} 50%{opacity:.45} }
  @media (prefers-reduced-motion: reduce){ #hint{ animation:none; } }
  #hint.gone{ display:none; }
  /* ---- 核爆発の全画面閃光 ---- */
  #nukeFlash{
    position:fixed; inset:0; background:#fff6e4; opacity:0;
    pointer-events:none; z-index:5;
  }
  @media (max-width:640px){
    #report{ top:auto; bottom:64px; right:14px; min-width:0; }
    #help{ display:none; }
  }
</style>

<canvas id="gl"></canvas>
<div id="hud">
  <div class="panel" id="cmd">
    <h1>爆撃くん</h1>
    <div class="sub">GOD'S EYE STRIKE CONSOLE</div>
    <div class="label">City Seed</div>
    <div class="seedrow">
      <input id="seed" value="BAKUGEKI-01" spellcheck="false" aria-label="シード値">
      <button id="regen" title="このシードで街を再生成">生成</button>
      <button id="rand" title="ランダムなシードで生成">乱数</button>
    </div>
    <div class="seedrow"><button id="timeBtn" style="flex:1" title="昼と夕暮れを切り替え">時間帯: 昼</button></div>
    <div class="seedrow"><button id="weaponBtn" style="flex:1" title="右クリックで発射する弾種を切り替え">弾種: 単弾頭ミサイル</button></div>
    <div class="label" id="planName" style="margin-top:8px">都市プラン: —</div>
    <div class="label" id="perf" style="margin-top:4px">— fps</div>
    <div id="prof"></div>
  </div>

  <div class="panel" id="report">
    <div class="label">Damage Report — 被害報告</div>
    <div class="row"><span class="label">破壊建物</span><span class="num"><span id="bDead">0</span> / <span id="bTotal">0</span><small>棟</small></span></div>
    <div class="row"><span class="label">破壊車両</span><span class="num"><span id="cDead">0</span> / <span id="cTotal">0</span><small>台</small></span></div>
    <div class="row"><span class="label">破壊樹木</span><span class="num"><span id="tDead">0</span> / <span id="tTotal">0</span><small>本</small></span></div>
    <div class="row"><span class="label">出撃ミサイル</span><span class="num"><span id="mCount">0</span><small>発</small></span></div>
    <div class="divider"></div>
    <div class="row"><span class="label">被害総額</span><span class="num" id="dmgTotal">¥0</span></div>
  </div>

  <div class="panel" id="help">
    <div class="label" style="margin-bottom:4px">Controls</div>
    <div><span class="key">W A S D</span><b>移動</b></div>
    <div><span class="key">左ドラッグ</span><b>視点回転</b></div>
    <div><span class="key">ホイール</span><b>ズーム</b></div>
    <div><span class="key">右クリック</span><b style="color:var(--red)">爆撃指定</b></div>
    <div><span class="key">P</span><b>処理時間計測</b></div>
  </div>

  <div class="panel" id="soundWrap"><button id="soundBtn">SOUND: ON</button></div>
  <div id="hint">右クリックで爆撃地点を指定せよ</div>
  <div id="nukeFlash"></div>
</div>

<script>
